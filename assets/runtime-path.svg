    <rect x="830" y="314" width="230" height="44" rx="9" fill="#FFFFFF" stroke="#06968C" stroke-opacity="0.4"/>
    <circle cx="848" cy="336" r="3.4" fill="none" stroke="#06968C"/><circle cx="848" cy="336" r="1.2" fill="#06968C"/>
