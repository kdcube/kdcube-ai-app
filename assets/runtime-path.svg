    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F6F6"/><stop offset="100%" stop-color="#E3EDEE"/>
    </linearGradient>
    <linearGradient id="plinth" x1="0" y1="0" x2="0" y2="1">
