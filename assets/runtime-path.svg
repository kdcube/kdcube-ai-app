  <text x="550" y="568" font-size="9.5" letter-spacing="0.22em" fill="#8AA2B4" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, Menlo, monospace">YOUR AGENT DECIDES · KDCUBE MAKES IT PERCEIVE, ACT, AND SHIP</text>
</svg>
