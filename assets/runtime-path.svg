    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#FFC978" stop-opacity="0.34"/>
      <stop offset="45%" stop-color="#F0BC2E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F0BC2E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tick" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06968C"/><stop offset="1" stop-color="#D9A945"/>
    </linearGradient>
  </defs>

