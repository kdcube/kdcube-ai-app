bundle:
  repo: "https://github.com/kdcube/kdcube-ai-app.git"
  ref: "2026.5.27.144"
  description: |
    Built-in admin storage API interface.

    Highlights

    - Historically added the `bundle_storage` privileged widget. Current
      ownership is `kdcube-services@1-0`; the widget source lives at
      `sdk://solutions/storage/ui.widget.storage`.
    - Add ingress storage control-plane APIs for listing storage roots,
      browsing local storage paths, exporting selected paths as zip, and
      deleting selected paths after confirmation.
    - Add the processor registry read API used by the widget to compare active
      bundle registry entries with managed bundle folders.
    - Document the admin bundle interface with an OpenAPI contract.
