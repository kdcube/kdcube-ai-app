openapi: 3.0.3
info:
  title: KDCube Admin Storage API Interface
  version: 0.1.0
  description: >
    Privileged storage browser, export, deletion, and app-registry
    inspection contract consumed by the kdcube-services bundle_storage widget.
paths:
  /api/admin/control-plane/storage/roots:
    get:
      summary: List available storage roots
      description: Returns bundle storage, managed bundles, and shared storage descriptors.
      x-kdcube-visibility: super-admin
      responses:
        "200":
          description: Available storage roots and capabilities
          content:
            application/json:
              schema:
                type: object
                required: [roots]
                properties:
                  roots:
                    type: array
                    items:
                      $ref: "#/components/schemas/StorageRoot"
        default:
          $ref: "#/components/responses/Error"
  /api/admin/control-plane/storage/tenants-projects:
    get:
      summary: List tenant/project scopes for a storage root
      description: Returns tenant/project folders discovered under a local storage root.
      x-kdcube-visibility: super-admin
      parameters:
        - $ref: "#/components/parameters/RootId"
      responses:
        "200":
          description: Tenant/project scope list
          content:
            application/json:
              schema:
                type: object
                required: [root, tenants]
                properties:
                  root:
                    $ref: "#/components/schemas/StorageRoot"
                  tenants:
                    type: array
                    items:
                      $ref: "#/components/schemas/TenantProjects"
        default:
          $ref: "#/components/responses/Error"
  /api/admin/control-plane/storage/list:
    get:
      summary: List a storage path
      description: Lists files/directories under a selected local storage root and scope.
      x-kdcube-visibility: super-admin
      parameters:
        - $ref: "#/components/parameters/RootId"
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - name: path
          in: query
          required: false
          schema:
            type: string
            default: ""
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 500
      responses:
        "200":
          description: Current path and children
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/admin/control-plane/storage/export:
    post:
      summary: Export selected storage paths
      description: Exports selected files/directories as a zip archive.
      x-kdcube-visibility: super-admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageExportRequest"
      responses:
        "200":
          description: Zip archive of selected paths
          content:
            application/zip:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/Error"
  /api/admin/control-plane/storage/delete:
    post:
      summary: Delete selected storage paths
      description: Deletes selected files/directories after explicit confirmation.
      x-kdcube-visibility: super-admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageDeleteRequest"
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageDeleteResponse"
        default:
          $ref: "#/components/responses/Error"
  /admin/integrations/bundles/storage-registry:
    get:
      summary: Read active bundle registry storage references
      description: Returns active bundles and managed bundle folders referenced by the registry.
      x-kdcube-visibility: super-admin
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
      responses:
        "200":
          description: Active registry bundles and managed folder references
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistryResponse"
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    RootId:
      name: root_id
      in: query
      required: true
      schema:
        type: string
        enum: [bundle_storage, managed_bundles, shared_storage]
    Tenant:
      name: tenant
      in: query
      required: false
      schema:
        type: string
    Project:
      name: project
      in: query
      required: false
      schema:
        type: string
  responses:
    Error:
      description: Storage control-plane error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    StorageRoot:
      type: object
      required:
        - id
        - label
        - description
        - kind
        - uri
        - exists
        - writable
        - tenant_project_mode
        - capabilities
      properties:
        id:
          type: string
          enum: [bundle_storage, managed_bundles, shared_storage]
        label:
          type: string
        description:
          type: string
        kind:
          type: string
          enum: [local-fs, remote, unconfigured]
        uri:
          type: string
        path:
          type: string
          nullable: true
        exists:
          type: boolean
        writable:
          type: boolean
        tenant_project_mode:
          type: string
          enum: [required, optional, none]
        capabilities:
          type: array
          items:
            type: string
            enum: [list, export, delete]
    TenantProjects:
      type: object
      required: [tenant, projects]
      properties:
        tenant:
          type: string
        projects:
          type: array
          items:
            type: string
    StorageEntry:
      type: object
      required:
        - name
        - path
        - kind
        - deletable
        - exportable
      properties:
        name:
          type: string
        path:
          type: string
        kind:
          type: string
          enum: [directory, file, symlink, other]
        size_bytes:
          type: integer
          nullable: true
        modified_at:
          type: number
          nullable: true
        child_count:
          type: integer
          nullable: true
        deletable:
          type: boolean
        exportable:
          type: boolean
        symlink_target:
          type: string
          nullable: true
    StorageListResponse:
      type: object
      required: [root, base_path, path, current, entries, generated_at]
      properties:
        root:
          $ref: "#/components/schemas/StorageRoot"
        tenant:
          type: string
          nullable: true
        project:
          type: string
          nullable: true
        base_path:
          type: string
        path:
          type: string
        current:
          $ref: "#/components/schemas/StorageEntry"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/StorageEntry"
        generated_at:
          type: number
    StorageExportRequest:
      type: object
      required: [root_id, paths]
      properties:
        root_id:
          type: string
          enum: [bundle_storage, managed_bundles, shared_storage]
        tenant:
          type: string
          nullable: true
        project:
          type: string
          nullable: true
        paths:
          type: array
          minItems: 1
          items:
            type: string
    StorageDeleteRequest:
      type: object
      required: [root_id, paths, confirm]
      properties:
        root_id:
          type: string
          enum: [bundle_storage, managed_bundles, shared_storage]
        tenant:
          type: string
          nullable: true
        project:
          type: string
          nullable: true
        paths:
          type: array
          minItems: 1
          items:
            type: string
        confirm:
          type: boolean
          enum: [true]
    StorageDeleteResponse:
      type: object
      required: [root, deleted, deleted_count, generated_at]
      properties:
        root:
          $ref: "#/components/schemas/StorageRoot"
        tenant:
          type: string
          nullable: true
        project:
          type: string
          nullable: true
        deleted:
          type: array
          items:
            type: object
            required: [path, status]
            properties:
              path:
                type: string
              kind:
                type: string
                nullable: true
              status:
                type: string
                enum: [deleted, missing]
        deleted_count:
          type: integer
        generated_at:
          type: number
    RegistryBundle:
      type: object
      required: [id, singleton, default]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        module:
          type: string
          nullable: true
        singleton:
          type: boolean
        version:
          type: string
          nullable: true
        repo:
          type: string
          nullable: true
        ref:
          type: string
          nullable: true
        subdir:
          type: string
          nullable: true
        git_commit:
          type: string
          nullable: true
        managed_folder:
          type: string
          nullable: true
        default:
          type: boolean
    RegistryResponse:
      type: object
      required: [tenant, project, bundles, active_managed_folders, count]
      properties:
        tenant:
          type: string
        project:
          type: string
        bundles:
          type: array
          items:
            $ref: "#/components/schemas/RegistryBundle"
        active_managed_folders:
          type: array
          items:
            type: string
        default_bundle_id:
          type: string
          nullable: true
        count:
          type: integer
        authority:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: object
              properties:
                code:
                  type: string
                message:
                  type: string
