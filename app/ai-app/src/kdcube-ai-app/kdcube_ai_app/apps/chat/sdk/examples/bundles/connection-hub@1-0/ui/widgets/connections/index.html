<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <title>Connections</title>
    <script data-kdcube-resize-reporter="opt-out">
      // This app is viewport-bound (.page-viewport fills 100vh), so it has no
      // intrinsic content height to report — its measured height is, by
      // construction, whatever height the host already gave it. The platform
      // skips injecting its resize reporter when this attribute is present.
      // Without the opt-out, a scene host that honors kdcube-resize clamps the
      // frame to the height of the brief "Loading…" page (~150px) and the
      // 100vh layout then re-measures exactly that clamp forever — tabs row 2,
      // the tab guide, and the whole panel body render but stay clipped.
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
