bundle:
  repo: "https://github.com/kdcube/kdcube-ai-app.git"
  ref: "2026.5.15.1"
  description: |
    User-memory, Telegram WebApp, and economics release for kdcube.copilot.

    Highlights

    - Derives the Copilot bundle from the memory + economics entrypoint stack so
      the bundle can expose durable user memory, cost accounting, and the normal
      ReAct workflow in one surface.
    - Adds a single `copilot_webapp` source-folder widget with two sections:
      User Memory and Telegram Admin. It works as a normal KDCube widget and as
      the Telegram Mini App entrypoint.
    - Reuses the shared memory widget source directly inside the Copilot WebApp
      build through `shared_sources`, avoiding iframe composition.
    - Adds public Telegram WebApp routes for memory operations and Telegram user
      administration, scoped through verified Telegram `initData`.
    - Wires memory tools into the Copilot ReAct tool descriptor so configured
      agents can search/read and, when policy allows, write durable user memory.

    Known follow-ups

    - Validate the Copilot Telegram WebApp with a real BotFather WebApp button
      and deployed public origin.
    - Add fuller Copilot bundle maintainer docs after the first field test of
      the Telegram + memory workflow.
