tools:
  - id: memory.search_memory
    role: load stored user memory before personalized or memory-check answers
    why: Use this first when city, location, timezone, preferred name, style, diet, interests, or recurring choices might matter.
  - id: memory.recent_memories
    role: inspect recent durable user memory
    why: Use this when the user asks broadly what is remembered.
  - id: memory.record_memory
    role: save or refine durable user memory
    why: Persist newly revealed profile facts, durable choices, and explicit corrections in the same turn.
  - id: memory.confirm_memory
    role: confirm an existing durable memory
    why: Use this when a new user statement reinforces a specific existing memory.
  - id: memory.retire_memory
    role: retire stale or invalid durable memory
    why: Use this when the user asks to forget a remembered fact or says an existing memory is no longer true.
