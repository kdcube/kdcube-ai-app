bundle:
  repo: "https://github.com/kdcube/kdcube-ai-app.git"
  ref: "2026.5.15.1"
  description: |
    User-memory and Telegram WebApp release for versatile@2026-03-31-13-36.

    Highlights

    - Replaces the old preference-demo surface with the durable user-memory
      subsystem: widget CRUD, pin/confirm/retire flows, snapshots, restore
      preview/apply, and reconciliation job controls.
    - Keeps the reference `versatile_webapp` usable both as a KDCube widget and
      as a Telegram WebApp by materializing the shared memory widget source into
      the bundle widget build.
    - Registers Telegram SDK helpers with bundle-scoped configuration so
      multiple Telegram-enabled bundles can run in the same processor without
      import-time config collisions.
    - Wires memory tools into the ReAct tool surface so configured bundles can
      read and, when policy allows, write durable user memory.
    - Documents the memory configuration shape and shared-widget build pattern
      in the bundle SDK docs.

    Known follow-ups

    - Continue end-to-end Telegram Mini App validation against a deployed public
      origin after descriptor reloads.
    - Keep expanding reference scenarios that show memory search, snapshots, and
      reconciliation from a bundle-builder perspective.
