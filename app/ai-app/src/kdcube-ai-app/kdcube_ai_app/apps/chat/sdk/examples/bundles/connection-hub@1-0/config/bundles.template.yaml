bundles:
  version: "1"
  default_bundle_id: "connection-hub@1-0"
  items:
  - id: "connection-hub@1-0"
    name: "Connection Hub"
    path: "<LOCAL_HOST_BUNDLE_ROOT>"
    module: "entrypoint"
    singleton: false
    config:
      surfaces:
        as_provider:
          bundle:
            visibility:
              allowed_roles: []
          api:
            operations:
              named_service:
                visibility: &default_visibility
                  user_types: []
                  roles: []
              connections_catalog:
                visibility: *default_visibility
              connections_start_oauth:
                visibility: *default_visibility
              connections_disconnect:
                visibility: *default_visibility
              connection_edges_list:
                visibility: *default_visibility
              connection_edge_upsert:
                visibility: *default_visibility
              connection_edge_remove:
                visibility: *default_visibility
              connection_edge_challenge_create:
                visibility: *default_visibility
              connection_edge_challenge_claim:
                visibility: *default_visibility
              connection_edge_challenge_status:
                visibility: *default_visibility
              identity_resolve:
                visibility: *default_visibility
              identity_family_resolve:
                visibility: *default_visibility
              delegated_identity_scope_resolve:
                visibility: *default_visibility
              delegated_access_list:
                visibility: *default_visibility
              delegated_access_create:
                visibility: *default_visibility
              delegated_access_revoke:
                visibility: *default_visibility
              delegated_to_kdcube_catalog:
                visibility: *default_visibility
              delegated_to_kdcube_start_oauth:
                visibility: *default_visibility
              delegated_to_kdcube_connect_credential:
                visibility: *default_visibility
              delegated_to_kdcube_disconnect:
                visibility: *default_visibility
              delegated_to_kdcube_resolve:
                visibility: *default_visibility
              email_accounts_status:
                visibility: *default_visibility
              email_connect_app_password:
                visibility: *default_visibility
              email_disconnect_account:
                visibility: *default_visibility
              connections_settings:
                visibility: *default_visibility
          widget:
            connections_settings:
              visibility: *default_visibility

      connections:
        oauth:
            # Public base for Connection Hub browser callbacks when a flow does
            # not have a more specific public_base_url.
            # Empty -> derived from the request host at runtime.
          public_base_url: "https://<PUBLIC_HOST>"
        delegated_credentials:
          oauth:
            enabled: false
            brand: "KDCube"
              # Optional: render delegated credential consent in a bundle-hosted
              # UI declared on an authority provider. Connection Hub still owns
              # approve/deny validation and token issuance.
              # consent_ui:
              #   authority_ref:
              #     authority_id: "kdcube.platform"
              #     provider_id: "<platform_provider_id>"
              #     entrypoint: "consent"
            issuer: ""
            public_clients:
            - client_id: "claude"
              redirect_uris:
              - "http://localhost/callback"
              - "http://127.0.0.1/callback"
              - "https://claude.ai/api/mcp/auth_callback"
            dynamic_client_registration:
              allowed_redirect_uris:
              - "https://claude.ai/api/mcp/auth_callback"
              - "http://localhost/callback"
              - "http://127.0.0.1/callback"
            capabilities:
            - grant: "kdcube:role:super-admin"
              label: "Use all platform and application APIs"
              description: "Admin-only delegated automation access to platform and application APIs."
              delegable_roles:
              - "kdcube:role:super-admin"
            - grant: "conversations:read"
              label: "Read your conversations"
              description: "Read the approving user's own KDCube conversations through delegated named-service tools."
              delegable_roles:
              - "kdcube:role:registered"
              - "kdcube:role:paid"
              - "kdcube:role:privileged"
              - "kdcube:role:super-admin"
              delegable_permissions:
              - "kdcube:*:conversations:*;read"
            - grant: "conversations:read:any_user"
              label: "Read any user's conversations"
              description: "Admin: read a selected user's conversations through the conv named service."
              delegable_roles:
              - "kdcube:role:super-admin"
              delegable_permissions:
              - "kdcube:*:conversations:*;read:any_user"
            - grant: "memories:read"
              label: "Read memories"
              description: "Read memory notes visible to the KDCube user who approves the connection."
              delegable_roles:
              - "kdcube:role:registered"
              - "kdcube:role:paid"
              - "kdcube:role:privileged"
              - "kdcube:role:super-admin"
              delegable_permissions:
              - "memories:read"
            - grant: "knowledge:read"
              label: "Read KDCube knowledge"
              description: "Read KDCube knowledge notes through delegated MCP tools."
              delegable_roles:
              - "kdcube:role:registered"
              - "kdcube:role:paid"
              - "kdcube:role:privileged"
              - "kdcube:role:super-admin"
              delegable_permissions:
              - "knowledge:read"
            - grant: "named_services:use"
              label: "Use KDCube named services"
              description: "Discover and call configured KDCube named-service namespaces through delegated MCP tools."
              delegable_roles:
              - "kdcube:role:registered"
              - "kdcube:role:paid"
              - "kdcube:role:privileged"
              - "kdcube:role:super-admin"
              delegable_permissions:
              - "named_services:use"
            - grant: "mail:read"
              label: "Read connected mail"
              description: "Search and read messages and attachments from mail accounts connected to KDCube."
              delegable_roles:
              - "kdcube:role:registered"
              - "kdcube:role:paid"
              - "kdcube:role:privileged"
              - "kdcube:role:super-admin"
              delegable_permissions:
              - "mail:read"
            - grant: "mail:send"
              label: "Send connected mail"
              description: "Send or forward messages through mail accounts connected to KDCube."
              delegable_roles:
              - "kdcube:role:registered"
              - "kdcube:role:paid"
              - "kdcube:role:privileged"
              - "kdcube:role:super-admin"
              delegable_permissions:
              - "mail:send"
            resources:
            - resource: "*"
              label: "All platform and application APIs"
              admin_only: true
              grants:
              - "kdcube:role:super-admin"
            - resource: "*/api/integrations/bundles/*/*/user-memories@2026-06-26/public/mcp/memories*"
              label: "User memories MCP"
              identity_scope: "grantor_identity_family"
              tools:
                memory_search:
                  label: "Search memories"
                  description: "Search the user's memory notes."
                  grants:
                  - "memories:read"
                memory_get:
                  label: "Read memory"
                  description: "Read one memory note by id."
                  grants:
                  - "memories:read"
            - resource: "*/api/integrations/bundles/*/*/knowledge@1-0/public/mcp/knowledge_managed*"
              label: "KDCube knowledge MCP"
              tools:
                get_access_context:
                  label: "Get access context"
                  description: "Inspect the current knowledge access context."
                  grants:
                  - "knowledge:read"
                about:
                  label: "About KDCube knowledge"
                  description: "Explain when and how to use the KDCube knowledge server."
                  grants:
                  - "knowledge:read"
                search:
                  label: "Search knowledge"
                  description: "Search KDCube knowledge visible to this delegated connection."
                  grants:
                  - "knowledge:read"
                read_refs:
                  label: "Read references"
                  description: "Read exact knowledge or source references returned by search."
                  grants:
                  - "knowledge:read"
            - resource: "*/api/integrations/bundles/*/*/kdcube-services@1-0/public/mcp/named_services*"
              label: "KDCube named services MCP"
              tools:
                named_services_list:
                  label: "List named services"
                  description: "List configured named-service namespaces and operation grants."
                  grants:
                  - "named_services:use"
                named_services_about:
                  label: "Named service about"
                  description: "Read a provider about payload for a configured namespace."
                  grants:
                  - "named_services:use"
                named_services_capabilities:
                  label: "Named service capabilities"
                  description: "Read provider capabilities for a configured namespace."
                  grants:
                  - "named_services:use"
                named_services_schema:
                  label: "Named service schema"
                  description: "Read an object schema for a configured namespace."
                  grants:
                  - "named_services:use"
                named_services_search:
                  label: "Named service search"
                  description: "Search objects in a configured namespace."
                  grants:
                  - "named_services:use"
                named_services_get:
                  label: "Named service get"
                  description: "Read one object from a configured namespace."
                  grants:
                  - "named_services:use"
                named_services_action:
                  label: "Named service action"
                  description: "Run a bounded provider action on one object."
                  grants:
                  - "named_services:use"
                named_services_call:
                  label: "Named service call"
                  description: "Run a generic call against a configured namespace."
                  grants:
                  - "named_services:use"
              named_services:
                namespaces:
                  mail:
                    label: "Mail"
                    description: "Search, read, download attachments from, send, and forward messages through connected mail accounts."
                    authority_id: "delegated_client"
                    tools:
                      about:
                        operation: "provider.about"
                        label: "About mail"
                        description: "Explain the mail namespace and connected-account model."
                        grants:
                        - "mail:read"
                      capabilities:
                        operation: "provider.capabilities"
                        label: "Mail capabilities"
                        description: "Read provider capabilities for connected mail accounts."
                        grants:
                        - "mail:read"
                      list:
                        operation: "object.list"
                        label: "List mail accounts"
                        description: "List connected mail accounts available to the delegated connection."
                        grants:
                        - "mail:read"
                      schema:
                        operation: "object.schema"
                        label: "Mail schema"
                        description: "Read the mail object schema and ref format."
                        grants:
                        - "mail:read"
                      search:
                        operation: "object.search"
                        label: "Search mail"
                        description: "Search messages in connected mail accounts."
                        grants:
                        - "mail:read"
                      get:
                        operation: "object.get"
                        label: "Read mail message"
                        description: "Read one mail message and its attachment metadata by ref."
                        grants:
                        - "mail:read"
                      action:
                        operation: "object.action"
                        label: "Mail action"
                        description: "Download attachments, send mail, or forward a message through a connected mail account."
                        operations:
                          object.action:
                            label: "Mail action"
                            description: "Run a bounded mail action. download_attachments requires mail:read; send requires mail:send; forward requires mail:read and mail:send."
                            grants:
                            - "mail:read"
                            - "mail:send"
                      call:
                        label: "Generic mail call"
                        description: "Generic mail namespace call with per-operation grants."
                        operations:
                          provider.about:
                            label: "About mail"
                            description: "Explain the mail namespace and connected-account model."
                            grants:
                            - "mail:read"
                          provider.capabilities:
                            label: "Mail capabilities"
                            description: "Read provider capabilities for connected mail accounts."
                            grants:
                            - "mail:read"
                          object.list:
                            label: "List mail accounts"
                            description: "List connected mail accounts available to the delegated connection."
                            grants:
                            - "mail:read"
                          object.schema:
                            label: "Mail schema"
                            description: "Read the mail object schema and ref format."
                            grants:
                            - "mail:read"
                          object.search:
                            label: "Search mail"
                            description: "Search messages in connected mail accounts."
                            grants:
                            - "mail:read"
                          object.get:
                            label: "Read mail message"
                            description: "Read one mail message and its attachment metadata by ref."
                            grants:
                            - "mail:read"
                          object.action:
                            label: "Mail action"
                            description: "Download attachments, send mail, or forward a message through a connected mail account."
                            grants:
                            - "mail:read"
                            - "mail:send"
          # Legacy connection-provider app registry. New per-user delegated
          # external credentials live under delegated_to_kdcube below.
        providers: {}

      delegated_to_kdcube:
        enabled: false
        oauth:
            # Public base for the delegated_to_kdcube_oauth_callback route.
            # Empty -> derived from the request host at runtime.
          public_base_url: "https://<PUBLIC_HOST>"
        providers:
          google:
            label: "Google"
            adapter: "google.oauth"
            enabled: true
            connector_apps:
              gmail:
                label: "Gmail"
                enabled: true
                client_id: "<GOOGLE_OAUTH_CLIENT_ID>"
                client_secret_ref: "connections.delegated_to_kdcube.providers.google.connector_apps.gmail.client_secret"
                allowed_claims:
                - "gmail:read"
                - "gmail:send"
            claims:
              gmail:read:
                label: "Read Gmail"
                description: "Search and read Gmail messages for the approving user."
                provider_scopes:
                - "openid"
                - "email"
                - "profile"
                - "https://www.googleapis.com/auth/gmail.readonly"
              gmail:send:
                label: "Send Gmail"
                description: "Send email through the approving user's Gmail account."
                provider_scopes:
                - "openid"
                - "email"
                - "profile"
                - "https://www.googleapis.com/auth/gmail.send"
          slack:
            label: "Slack"
            adapter: "slack.oauth_user_token"
            enabled: true
            connector_apps:
              demo:
                label: "KDCube Slack"
                enabled: true
                client_id: "<SLACK_OAUTH_CLIENT_ID>"
                client_secret_ref: "connections.delegated_to_kdcube.providers.slack.connector_apps.demo.client_secret"
                allowed_claims:
                - "slack:search"
                - "slack:post"
            claims:
              slack:search:
                label: "Search Slack"
                description: "Search Slack content visible to the approving user."
                provider_scopes:
                  - "search:read"
              slack:post:
                label: "Post to Slack"
                description: "Post messages into Slack destinations allowed by the approving user."
                provider_scopes:
                - "chat:write"
          icloud_mail:
            label: "iCloud Mail"
            adapter: "email.imap_smtp_app_password"
            enabled: true
            connector_apps:
              app_password:
                label: "iCloud app-specific password"
                enabled: true
                allowed_claims:
                - "email:read"
                - "email:send"

            claims:
              email:read:
                label: "Read mail"
                description: "Read mail through IMAP for the connected mailbox."
              email:send:
                label: "Send mail"
                description: "Send mail through SMTP for the connected mailbox."
      identity:
        enabled: true
        authenticator_selector_cache:
          enabled: true
          ttl_seconds: 30
          # Target architecture:
          #   verified external identity -> Connection Hub connection edge
          #   -> platform principal/role resolver
          #
          # This template keeps role_resolver.mode=platform so the hub does NOT
          # decide entitlements itself. For local demos only, set mode=configured
          # and add role_bindings below.
        role_resolver:
          mode: "platform"
        role_bindings:
            # "<PLATFORM_USER_ID>":
            #   roles:
            #     - "kdcube:role:admin"
            #   permissions:
            #     - "connection-hub:*"
          # Descriptor-defined request authenticators are immutable deployment
          # rows. The Connections widget can add more rows into Postgres, but
          # both shapes carry metadata only. Secret values live in
          # bundles.secrets.yaml at each row's secret_ref.
        authenticators:
        - id: "telegram.kdcube_ref"
          provider: "telegram"
          authority_id: "telegram.kdcube_ref"
          where: "built-in"
          enabled: true
          role_providing: false
              # subject_namespace is optional for provider-native subjects
              # such as Telegram; it defaults to provider. Use it for generic
              # providers like OIDC/webhook/api-key when the subject namespace
              # is not the same as the verifier provider.
          secret_ref: "identity.authenticators.telegram_kdcube_ref.bot_token"
          definition:
            label: "KDCube Ref Telegram bot"
            bot_name: "kdcube-ref"
            bot_username: "kdcube_doc_bot"
            web_app_auth_max_age_seconds: 86400
        link_flows:
          telegram:
            enabled: true
            challenge_ttl_seconds: 600
              # Optional URL used by Telegram-first flows after Telegram proof is
              # created. Empty -> derived as public/widgets/connections_settings.
              # Supported replacement: {challenge_id}.
            platform_claim_url: ""

      ui:
        widgets:
          connections_settings:
            enabled: true
            src_folder: "ui/widgets/connections"
            build_command: "npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build"
