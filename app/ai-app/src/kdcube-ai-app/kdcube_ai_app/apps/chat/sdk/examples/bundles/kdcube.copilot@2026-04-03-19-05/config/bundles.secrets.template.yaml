bundles:
  version: "1"
  items:
    - id: "kdcube.copilot@2026-04-03-19-05"
      secrets:
        mcp:
          doc_reader:
            auth:
              # Required for the authenticated operations MCP route.
              shared_token: "<RANDOM_COPILOT_MCP_TOKEN>"
        telemetry_sink:
          auth:
            # Required when telemetry_sink.endpoint_url is configured.
            # The SDK sink sends this as Authorization: Bearer <token>.
            token: "<RANDOM_TELEMETRY_SINK_BEARER_TOKEN>"
        integrations:
          telegram:
            # Required only when enabling Telegram webhook or Mini App routes.
            bot_token: "<TELEGRAM_BOT_TOKEN>"
            webhook_secret: "<RANDOM_TELEGRAM_WEBHOOK_SECRET>"
