bundle:
  repo: "https://github.com/kdcube/kdcube-ai-app.git"
  ref: "2026.6.25.255"
  description: |
    Release for connection-hub@1-0.

    Highlights

    - Implements the public `connections` named-service contract
      (kdcube_ai_app.apps.chat.sdk.solutions.connections): exposes
      `connection.catalog`, `connection.status`, `connection.get_token`,
      `connection.disconnect`, and `oauth.start` over the local and API
      transports. Serves the whole contract over HTTP via the `named_service`
      API alias and registers the registry to Redis discovery on bundle load.
    - Three-level connection model: provider (OAuth mechanics, no creds) ->
      client app (admin credentials, many per provider, carries the scope
      ceiling) -> user account (one user token, records its app_id). Tokens are
      user-scoped via the reusable `integrations/connections` `ConnectionStore`.
    - Owns the single public `connection_oauth_callback` browser-redirect route
      shared by all providers (the provider + client app are read from the signed
      `state`), plus thin `connections_catalog` / `connections_start_oauth` /
      `connections_disconnect` widget helper ops.
    - Providers: Slack (user-token OAuth via `user_scope`, for any workspace under
      Public Distribution) and Gmail (Google OAuth with refresh-on-expiry in
      `connection.get_token`). Per-connect scope override is clamped to the client
      app's configured ceiling.
    - Email integration is iCloud-only (app-password via `email_*` ops); Gmail was
      migrated onto the connections framework, so a cross-bundle
      `connection.get_token("google")` resolves the user's Gmail token.
    - Real React + Redux Connections settings widget (kdcube design system): app
      picker, per-connect scope checkboxes, connect/disconnect, iCloud app-password
      form. Builds to a static widget under `ui/widgets/connections`.

    Validation

    - Bundle suite (run_bundle_suite) passes: 242 passed, 104 skipped.
    - Connections SDK contract tests pass (40).
    - Connections settings widget builds to an explicit OUTDIR (index.html emitted).

    Known follow-ups

    - Embed the Connections widget in the scene host (planned).
