bundles:
  version: "1"
  items:
    - id: "ported-langgraph-agents@2026-07-13"
      secrets:
        # These are the two vendored agents' OWN environment, surfaced here as
        # deployment secrets. The agents read them from the process environment
        # (solution/lg_solution/config.py, solution/lg_prebuilt/config.py).
        # Placeholders only — never commit real values.
        #
        # OPENAI_API_KEY  — the model both agents talk to. Absent -> each agent runs
        #                   its deterministic offline stub (lg-solution: canned
        #                   answers; lg-react: the create_react loop + tools still
        #                   run on the stub model).
        # DATABASE_URL    — the agents' OWN Postgres when standalone (lg-solution's
        #                   long-term memory + both checkpointers). Hosted, each
        #                   agent's store is instead routed onto KDCube's shared
        #                   Postgres in its own per-agent schema (pg_target.py).
        #                   Absent / unreachable -> empty retrieval + an in-memory
        #                   checkpointer, matching the standalone CLIs.
        # LG_MEMORY_BACKEND — lg-solution's long-term memory backend (non-secret;
        #                   optional). "custom" (default) -> a pgvector `memories`
        #                   table; "langgraph_store" -> LangGraph's native
        #                   AsyncPostgresStore. Graph-transparent. Omit to keep default.
        # ANTHROPIC_API_KEY / LG_PREBUILT_PROVIDER — lg-react's provider select
        #                   (openai default | anthropic). LG_PREBUILT_CTX_TOKENS —
        #                   lg-react's per-turn model-input token budget (default
        #                   3000). All non-secret/optional.
        OPENAI_API_KEY: "<OPENAI_API_KEY>"
        DATABASE_URL: "<AGENTS_POSTGRES_CONNECTION_STRING>"
        # LG_MEMORY_BACKEND: "custom"
        # ANTHROPIC_API_KEY: "<ANTHROPIC_API_KEY>"
        # LG_PREBUILT_PROVIDER: "openai"
        # LG_PREBUILT_CTX_TOKENS: "3000"
        # Optional MCP tool set for lg-react (config.tools.mode = mcp | both). A
        # bearer token for a protected KDCube-served MCP endpoint, referenced from
        # config.tools.mcp.servers.<name>.headers.Authorization.
        # MCP_ACCESS_TOKEN: "<MCP_ACCESS_TOKEN>"
        #
        # Telegram ingress (the Bot API webhook). Both are created OUTSIDE the code
        # — see docs/integrations/admin-integrational-homework.md. Placeholders
        # only; never commit real values. Keep these keyed under the same
        # integration id as config (`telegram.default`).
        #   bot_token      — from BotFather; the bundle's Bot API credential.
        #   webhook_secret — a random token you generate; Telegram echoes it in the
        #                    X-Telegram-Bot-Api-Secret-Token header and the SDK
        #                    verifies it before processing any update.
        integrations:
          telegram.default:
            definition:
              bot_token: "<TELEGRAM_BOT_TOKEN>"
              webhook_secret: "<TELEGRAM_WEBHOOK_SECRET>"
