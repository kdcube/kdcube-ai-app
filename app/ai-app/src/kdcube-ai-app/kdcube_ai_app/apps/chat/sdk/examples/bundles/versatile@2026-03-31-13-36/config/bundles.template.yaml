bundles:
  version: "1"
  items:
    - id: "versatile@2026-03-31-13-36"
      config:
        memory:
          enabled: true
          announce:
            enabled: true
            limit: 8
            scope_filter: all_user_memories
          tools:
            enabled: true
            allow_write: true
            default_scope_filter: current_bundle
          widget:
            enabled: true
            allow_write: true
            default_scope_filter: current_bundle
            allow_all_user_memories: true
            limit: 30
        canvas:
          artifact_prefix: canvas
          origin_prefix: canvas
          state_event_source_id: canvas.state
          ui_event_type: canvas.patch.applied
          artifact_resolver_name: canvas.bundle_artifact_storage
          data_bus_subject: canvas.patch
          revision_retention: 80
        execution:
          runtime:
            mode: docker
        telemetry_sink:
          # Plain POST endpoint. Paste the receiver URL exactly as it should be
          # called. When configured, the bundle records selected comm events
          # during chat turns and posts them as one bounded batch after the turn.
          endpoint_url: ""
        integrations:
          telegram:
            enabled: false
            webhook_url: "<domain name>/assembly.yaml service route/<tenant>/<project>/api/public/<alias>"
            send_responses: true
            stream_activity: true
            web_app_auth_max_age_seconds: 86400
        visibility:
          bundle:
            allowed_roles: []
        ui:
          main_view:
            src_folder: ui/scene
            build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
            shared_sources:
              canvas_component:
                src_folder: sdk://solutions/canvas/ui/component
                target: _shared/canvas-component
          widgets:
            versatile_chat:
              src_folder: sdk://solutions/chat/ui/widget
              build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
            memories:
              src_folder: sdk://context/memory/ui/widget/memories
              build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
            versatile_webapp:
              src_folder: ui/widgets/versatile_webapp
              build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
              shared_sources:
                memory_widget:
                  src_folder: sdk://context/memory/ui/widget/memories
                  target: _shared/memory-widget
                telegram_widget:
                  src_folder: sdk://integrations/telegram/ui/widget.telegram
                  target: _shared/telegram-widget
        mcp:
          services: {}
