bundles:
  version: "1"
  items:
    - id: "versatile@2026-03-31-13-36"
      config:
        memory:
          enabled: true
          announce:
            enabled: true
            limit: 8
            scope_filter: all_user_memories
          tools:
            enabled: true
            allow_write: true
            default_scope_filter: current_bundle
          widget:
            enabled: true
            allow_write: true
            default_scope_filter: current_bundle
            allow_all_user_memories: true
            limit: 30
        namespace_styles:
          fi:
            label: file
            color: "#ca8a04"
            border: "#ca8a04"
            focus: "#facc15"
            background: "#fffbeb"
          cnv:
            label: canvas
            color: "#7c3aed"
            border: "#7c3aed"
            focus: "#a78bfa"
            background: "#f5f3ff"
          mem:
            label: memory
            color: "#16a34a"
            border: "#16a34a"
            focus: "#22c55e"
            background: "#ecfdf5"
          task:
            label: task
            color: "#2563eb"
            border: "#2563eb"
            focus: "#60a5fa"
            background: "#eff6ff"
        canvas:
          artifact_prefix: canvas
          origin_prefix: canvas
          state_event_source_id: canvas.state
          ui_event_type: canvas.patch.applied
          artifact_resolver_name: canvas.bundle_artifact_storage
          data_bus_subject: canvas.patch
          revision_retention: 80
        surfaces:
          as_consumer:
            default_agent: main
            agents:
              main:
                tools:
                  - name: io
                    kind: python
                    module: kdcube_ai_app.apps.chat.sdk.tools.io_tools
                    alias: io_tools
                    allowed: [tool_call]
                  - name: context
                    kind: python
                    module: kdcube_ai_app.apps.chat.sdk.tools.ctx_tools
                    alias: ctx_tools
                    allowed: [merge_sources, fetch_ctx]
                  # Legacy direct memory tools are kept here as the migration
                  # template, but ReAct should use the generic named_services.*
                  # connection below for durable user memories.
                  # - name: memory
                  #   kind: python
                  #   module: kdcube_ai_app.apps.chat.sdk.context.memory.tools
                  #   alias: memory
                  #   allowed:
                  #     - search_memory
                  #     - recent_memories
                  #     - read_memory
                  #     - record_memory
                  #     - confirm_memory
                  #     - retire_memory
                  #   tool_traits:
                  #     search_memory:
                  #       strategy: [exploration]
                  #     recent_memories:
                  #       strategy: [exploration]
                  #     read_memory:
                  #       strategy: [exploration]
                  #     record_memory:
                  #       strategy: [neutral]
                  #     confirm_memory:
                  #       strategy: [neutral]
                  #     retire_memory:
                  #       strategy: [neutral]
                  - name: canvas
                    kind: python
                    module: kdcube_ai_app.apps.chat.sdk.solutions.canvas.tools
                    alias: canvas
                    allowed: [patch]
                    tool_traits:
                      patch:
                        strategy: [exploitation]
                  - name: exec
                    kind: python
                    module: kdcube_ai_app.apps.chat.sdk.tools.exec_tools
                    alias: exec_tools
                    allowed: [execute_code_python]
                    tool_traits:
                      execute_code_python:
                        strategy: [exploration, exploitation]
                  - name: web
                    kind: python
                    module: kdcube_ai_app.apps.chat.sdk.tools.web_tools
                    alias: web_tools
                    allowed: [web_search, web_fetch]
                    tool_traits:
                      web_search:
                        strategy: [exploration]
                      web_fetch:
                        strategy: [exploration]
                    runtime:
                      web_search: local
                      web_fetch: local
                  - name: rendering
                    kind: python
                    module: kdcube_ai_app.apps.chat.sdk.tools.rendering_tools
                    alias: rendering_tools
                    allowed: [write_pptx, write_png, write_pdf, write_docx]
                    tool_traits:
                      write_pptx:
                        strategy: [exploitation]
                      write_png:
                        strategy: [exploitation]
                      write_pdf:
                        strategy: [exploitation]
                      write_docx:
                        strategy: [exploitation]
                  # Browser automation tools are intentionally disabled by
                  # default for the reference agent. Uncomment when the agent
                  # is explicitly allowed to drive a browser surface.
                  # - name: browser
                  #   kind: python
                  #   module: kdcube_ai_app.apps.chat.sdk.tools.browser_tools
                  #   alias: browser_tools
                  #   allowed: [open_page, click, fill, scroll, status, close]
                  #   tool_traits:
                  #     open_page:
                  #       strategy: [exploration]
                  #     click:
                  #       strategy: [exploration, exploitation]
                  #     fill:
                  #       strategy: [exploration, exploitation]
                  #     scroll:
                  #       strategy: [exploration]
                  #     status:
                  #       strategy: [exploration]
                  #     close:
                  #       strategy: [neutral]
                  #   runtime:
                  #     open_page: none
                  #     click: none
                  #     fill: none
                  #     scroll: none
                  #     status: none
                  #     close: none
                  - name: knowledge
                    kind: mcp
                    server_id: knowledge
                    alias: knowledge
                    allowed: ["*"]
                    tool_traits:
                      "*":
                        strategy: [exploration]
                  - name: memory_service
                    kind: named_service
                    alias: named_services
                    namespaces:
                      mem:
                        # object.get is intentionally not exposed as a model-callable
                        # named_service tool. Existing mem:record refs must be bound
                        # with react.pull; the pull policy below calls provider
                        # object.get and materializes an fi: artifact for
                        # react.read/ranged reads.
                        allowed:
                          - provider.about
                          - object.list
                          - object.search
                          - object.schema
                          - object.upsert
                          - object.action
                          - object.delete
                        tool_traits:
                          upsert_object:
                            strategy: [neutral]
                          object_action:
                            strategy: [neutral]
                    tool_traits:
                      provider_about:
                        strategy: [exploration]
                      list_objects:
                        strategy: [exploration]
                      search_objects:
                        strategy: [exploration]
                      object_schema:
                        strategy: [exploration]
                      upsert_object:
                        strategy: [exploitation]
                      object_action:
                        strategy: [exploitation]
                      delete_object:
                        strategy: [exploitation]
                  # Add namespace-owned provider tools here when this agent
                  # should read or mutate external objects. Keep object.get
                  # out of the agent-facing tool set when pull is configured;
                  # ReAct should materialize external refs through react.pull.
                  # - name: task_service
                  #   kind: named_service
                  #   alias: named_services
                  #   namespaces:
                  #     task:
                  #       allowed:
                  #         - provider.about
                  #         - object.list
                  #         - object.search
                  #         - object.schema
                  #         - object.upsert
                  #         - object.host_file
                  #         - object.delete
                  #   tool_traits:
                  #     provider_about:
                  #       strategy: [exploration]
                  #     list_objects:
                  #       strategy: [exploration]
                  #     search_objects:
                  #       strategy: [exploration]
                  #     object_schema:
                  #       strategy: [exploration]
                  #     upsert_object:
                  #       strategy: [exploitation]
                  #     host_file:
                  #       strategy: [exploitation]
                  #     delete_object:
                  #       strategy: [exploitation]
                # Add namespace event-source policies here when external refs
                # should render into the ReAct timeline and be pullable.
                # Example:
                # event_sources:
                #   - kind: named_service
                #     namespace: task
                #     enabled: true
                #     discovery:
                #       mode: service_discovery
                #     policies:
                #       block_production:
                #         mode: provider
                #         operation: block.produce
                #       pull:
                #         mode: provider
                #         operation: object.get
                event_sources:
                  - kind: named_service
                    namespace: mem
                    enabled: true
                    discovery:
                      mode: service_discovery
                    policies:
                      block_production:
                        mode: provider
                        operation: block.produce
                      pull:
                        mode: provider
                        operation: object.get
            ui:
              canvas:
                # Add namespace resolver operations here when canvas or chat
                # object cards should delegate open/preview/download-style
                # actions to the owning provider.
                resolvers:
                  - kind: named_service
                    namespace: mem
                    enabled: true
                    discovery:
                      mode: service_discovery
                    allowed:
                      - object.resolve
                      - object.action
                # Example:
                #   - kind: named_service
                #     namespace: task
                #     enabled: true
                #     discovery:
                #       mode: service_discovery
                #     allowed:
                #       - object.resolve
                #       - object.action
              scene:
                external_panels: []
        execution:
          runtime:
            mode: docker
        telemetry_sink:
          # Plain POST endpoint. Paste the receiver URL exactly as it should be
          # called. When configured, the bundle records selected comm events
          # during chat turns and posts them as one bounded batch after the turn.
          endpoint_url: ""
          # Header that carries telemetry_sink.auth.token. Empty keeps the
          # legacy Authorization: Bearer <token> shape. Prefer a non-
          # Authorization ingest header, for example X-Telemetry-Token, when the
          # receiver sits behind a gateway that parses Authorization as JWT.
          auth_header: ""
        integrations:
          telegram:
            enabled: false
            webhook_url: "<domain name>/assembly.yaml service route/<tenant>/<project>/api/public/<alias>"
            send_responses: true
            stream_activity: true
            web_app_auth_max_age_seconds: 86400
        visibility:
          bundle:
            allowed_roles: []
          api:
            telegram_user_admin_data:
              user_types: []
              roles:
                - kdcube:role:super-admin
            telegram_user_admin_upsert:
              user_types: []
              roles:
                - kdcube:role:super-admin
            telegram_user_admin_delete:
              user_types: []
              roles:
                - kdcube:role:super-admin
          widget:
            memories:
              user_types: []
              roles: []
            pinboard:
              user_types: []
              roles: []
            telegram_miniapp:
              user_types: []
              roles: []
            usage_card:
              user_types: []
              roles: []
            versatile_chat:
              user_types: []
              roles: []
        ui:
          main_view:
            src_folder: ui/scene
            build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
            shared_sources:
              components_react_canvas:
                src_folder: npm://components-react/src/canvas
                target: _shared/components-react/canvas
              components_core_canvas:
                src_folder: npm://components-core/src/canvas
                target: _shared/components-core/canvas
              components_core_scene:
                src_folder: npm://components-core/src/scene
                target: _shared/components-core/scene
          widgets:
            # Chat is package-only — `engine` expands to the npm:// shared sources +
            # build env (solutions/chat/backend.apply_chat_widget_engine).
            versatile_chat:
              src_folder: sdk://solutions/chat/ui/widget
              engine: package-ui
            memories:
              src_folder: sdk://context/memory/ui/widget/memories
              build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
            usage_card:
              src_folder: sdk://infra/economics/ui/widget/usage-card
              build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
            telegram_miniapp:
              src_folder: ui/widgets/telegram_miniapp
              build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
              shared_sources:
                memory_widget:
                  src_folder: sdk://context/memory/ui/widget/memories
                  target: _shared/memory-widget
                telegram_widget:
                  src_folder: sdk://integrations/telegram/ui/widget.telegram
                  target: _shared/telegram-widget
            pinboard:
              src_folder: sdk://solutions/canvas/ui/widget/pinboard
              build_command: npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build
              shared_sources:
                components_react_canvas:
                  src_folder: npm://components-react/src/canvas
                  target: _shared/components-react/canvas
                components_core_canvas:
                  src_folder: npm://components-core/src/canvas
                  target: _shared/components-core/canvas
        mcp:
          services: {}
