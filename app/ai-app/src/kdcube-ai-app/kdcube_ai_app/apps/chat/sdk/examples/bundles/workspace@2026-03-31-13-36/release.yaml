bundle:
  repo: "https://github.com/kdcube/kdcube-ai-app.git"
  ref: "2026.6.18.2105"
  description: |
    Scene, SDK component, canvas, memory, and Telegram release for workspace@2026-03-31-13-36.

    Highlights

    - Retargets the reference main view to `ui/scene`, where chat, memories,
      and canvas are mounted as reusable SDK components while `ui/main` remains
      available as a legacy comparison surface.
    - Adds the bundle canvas service and `canvas.patch` operations using the
      shared `canvas.*` protocol names, so scene cards and pins exercise the
      platform canvas SDK instead of bundle-local canvas code.
    - Wires memory and canvas event/source policies through the bundle so ReAct
      can see external context, pull registered namespaces, and keep object
      ownership in the subsystem that produced the object.
    - Updates the scene UI for draggable/resizable panels, right-side tool
      controls, context drops, chat context pins, and SDK widget parity.
    - Updates the Telegram Mini App and shared widget wiring so memory views,
      admin surfaces, and Data Bus-driven activity remain aligned with the SDK
      components.
    - Adds tests for canvas pin search wiring, event-source visibility, and the
      reference bundle component integration paths.
    - Includes the platform ReAct external-event close-gate and prompt ownership
      fixes required for Telegram and other reactive event sources.
    - Includes the gateway auth-log noise fix: expected token rejection now
      degrades to anonymous without warning tracebacks unless auth debug is
      explicitly enabled.

    Known follow-ups

    - Validate the released scene against the deployed public landing page after
      descriptors are restaged.
    - Continue visual hardening of compact widget panel defaults for external
      iframe hosts.
