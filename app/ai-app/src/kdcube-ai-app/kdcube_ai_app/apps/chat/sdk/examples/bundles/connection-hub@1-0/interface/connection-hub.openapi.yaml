openapi: 3.1.0
info:
  title: Connection Hub App Interface
  version: 0.1.0
  description: |
    Interface contract for connection-hub@1-0.

    The app exposes:
    - connection-edge operations for resolving verified external identities to
      platform principal envelopes;
    - request-authenticator operation for verifying provider/request proofs
      through Connection Hub authenticator modules and returning linked authority
      material;
    - a `named_service` operation that serves the whole `connections`
      named-service contract over HTTP;
    - thin authenticated operations for the Connections settings widget
      (catalog, start OAuth, disconnect) and for iCloud app-password settings;
    - one public browser OAuth callback route shared across connection providers/apps;
    - one `connections_settings` widget built from `ui/widgets/connections`.

    Every POST operation body is wrapped as `{ "data": { ... } }` by frontend
    callers. KDCube responses are platform-wrapped; unwrap the property named by
    the operation alias.
x-kdcube-surfaces:
  widgets:
    connections_settings:
      source_folder: ui/widgets/connections
      decorator: "@ui_widget"
      config_key: ui.widgets.connections_settings
servers:
  - url: /api/integrations
tags:
  - name: Widgets
  - name: Connection Edges
  - name: Identity
  - name: Authenticators
  - name: Named Services
  - name: Connections
  - name: Email
  - name: OAuth Callbacks
security:
  - PlatformAuth: []
paths:
  /bundles/{tenant}/{project}/{bundle_id}/widgets/connections_settings:
    get:
      tags: [Widgets]
      summary: Serve the authenticated Connections settings widget.
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      responses:
        "200":
          description: HTML Connections settings widget app.
          content:
            text/html:
              schema:
                type: string

  /bundles/{tenant}/{project}/{bundle_id}/operations/named_service:
    post:
      tags: [Named Services]
      summary: Dispatch a `connections` named-service request.
      description: >
        Serves the whole `connections` contract: provider about/capabilities,
        object list/get/action/resolve, connection.get_token, start/disconnect.
        Reached locally by other apps via discovery (bundle_registry
        transport) and over HTTP here. Tokens are user-scoped.
      operationId: named_service
      x-kdcube-result-alias: named_service
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NamedServiceRequestEnvelope"
      responses:
        "200":
          description: Named-service response envelope.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connection_edges_list:
    get:
      tags: [Connection Edges]
      summary: List connection edges for the current platform user.
      operationId: connection_edges_list
      x-kdcube-result-alias: connection_edges_list
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      responses:
        "200":
          description: Connection edges for the current platform user.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connection_edge_upsert:
    post:
      tags: [Connection Edges]
      summary: Write a verified external-identity edge to the current platform user.
      description: User-facing route. Does not grant roles.
      operationId: connection_edge_upsert
      x-kdcube-result-alias: connection_edge_upsert
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionEdgeRequestEnvelope"
      responses:
        "200":
          description: Connection edge and platform principal envelope.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connection_edge_remove:
    post:
      tags: [Connection Edges]
      summary: Remove an external connection edge from the current platform user.
      operationId: connection_edge_remove
      x-kdcube-result-alias: connection_edge_remove
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionEdgeRefRequestEnvelope"
      responses:
        "200":
          description: Remove result.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connection_edge_challenge_create:
    post:
      tags: [Connection Edges]
      summary: Create a one-time proof challenge for writing a connection edge.
      description: >
        Authenticated route. Stores the current platform user server-side on the
        challenge. The provider proof flow must complete it later.
      operationId: connection_edge_challenge_create
      x-kdcube-result-alias: connection_edge_challenge_create
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionEdgeChallengeCreateEnvelope"
      responses:
        "200":
          description: Pending challenge and optional Telegram Mini App link.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connection_edge_challenge_claim:
    post:
      tags: [Connection Edges]
      summary: Claim a provider-first proof as the current platform user.
      description: >
        Authenticated route. Used by Telegram-first flows after the Telegram Mini
        App has created a signed pending provider proof and the browser claim
        page has shown an explicit confirmation. The current platform session
        becomes the platform_user_id on the final connection edge. Calls without
        data.confirmed=true are rejected.
      operationId: connection_edge_challenge_claim
      x-kdcube-result-alias: connection_edge_challenge_claim
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionEdgeChallengeStatusEnvelope"
      responses:
        "200":
          description: Claimed challenge, connection edge, and principal envelope.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connection_edge_challenge_status:
    post:
      tags: [Connection Edges]
      summary: Read a one-time proof challenge without claiming it.
      description: >
        Authenticated route. Platform-first challenges are limited to their
        platform user. Provider-first pending challenges have no platform owner
        yet, so the currently signed-in platform user may preview the Telegram
        identity before confirming a claim.
      operationId: connection_edge_challenge_status
      x-kdcube-result-alias: connection_edge_challenge_status
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionEdgeChallengeStatusEnvelope"
      responses:
        "200":
          description: Challenge status and connection edge if completed.

  /bundles/{tenant}/{project}/{bundle_id}/operations/identity_resolve:
    post:
      tags: [Identity]
      summary: Resolve a verified external identity to a platform principal envelope.
      description: >
        The caller must validate the external proof before calling this route.
        Role resolution belongs to the platform principal/role resolver; the
        configured mode is only a local fixture.
      operationId: identity_resolve
      x-kdcube-result-alias: identity_resolve
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExternalIdentityRefRequestEnvelope"
      responses:
        "200":
          description: Platform principal envelope or identity_not_linked.

  /bundles/{tenant}/{project}/{bundle_id}/operations/identity_family_resolve:
    post:
      tags: [Identity]
      summary: Resolve the linked identity family for the current actor.
      description: >
        Authenticated route. Returns the platform authority identity and linked
        provider/integration identities for the same person. This is the
        Connection Hub Resolver facet used by consumers such as memories to
        aggregate records across actor user ids without trusting client-supplied
        user-id lists.
      operationId: identity_family_resolve
      x-kdcube-result-alias: identity_family_resolve
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityFamilyRequestEnvelope"
      responses:
        "200":
          description: Linked identity family with canonical user ids for aggregation.

  /bundles/{tenant}/{project}/{bundle_id}/operations/delegated_identity_scope_resolve:
    post:
      tags: [Identity]
      summary: Resolve the data-owner scope for a delegated credential.
      description: >
        Internal/server-side helper for already verified delegated credentials.
        Returns the grantor and any linked runtime user ids allowed by the
        credential's descriptor-owned identity_scope.
      operationId: delegated_identity_scope_resolve
      x-kdcube-result-alias: delegated_identity_scope_resolve
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DelegatedIdentityScopeRequestEnvelope"
      responses:
        "200":
          description: Delegation edge plus canonical user ids for aggregation.

  /bundles/{tenant}/{project}/{bundle_id}/operations/authenticators_list:
    get:
      tags: [Authenticators]
      summary: List configured Connection Hub authenticator rows.
      description: >
        Admin/maintenance route. Returns configured request-authenticator module
        rows such as Telegram bots and whether their referenced secrets are
        configured. Secret values are never returned.
      operationId: authenticators_list
      x-kdcube-result-alias: authenticators_list
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      responses:
        "200":
          description: Configured authenticator rows with secret-reference status.

  /bundles/{tenant}/{project}/{bundle_id}/operations/authenticators_upsert:
    post:
      tags: [Authenticators]
      summary: Create or update a request-authenticator metadata row.
      description: >
        Stores metadata only in Postgres. Pass `secret_ref` to point at a
        bundle secret; do not pass secret values. Fields such as
        `secret_value`, `bot_token`, `client_secret`, `signing_secret`, and
        `api_key` are rejected.
      operationId: authenticators_upsert
      x-kdcube-result-alias: authenticators_upsert
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticatorUpsertEnvelope"
      responses:
        "200":
          description: Saved metadata row or validation error.

  /bundles/{tenant}/{project}/{bundle_id}/operations/authenticators_remove:
    post:
      tags: [Authenticators]
      summary: Soft-delete a Postgres-backed authenticator metadata row.
      description: Descriptor-defined rows are immutable through this API.
      operationId: authenticators_remove
      x-kdcube-result-alias: authenticators_remove
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticatorRemoveEnvelope"
      responses:
        "200":
          description: Soft-delete result.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connections_catalog:
    get:
      tags: [Connections]
      summary: List providers → client apps → user accounts.
      operationId: connections_catalog
      x-kdcube-result-alias: connections_catalog
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      responses:
        "200":
          description: Connection catalog with connected/configured flags.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connections_start_oauth:
    post:
      tags: [Connections]
      summary: Begin OAuth for a provider/client-app.
      operationId: connections_start_oauth
      x-kdcube-result-alias: connections_start_oauth
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartOAuthRequestEnvelope"
      responses:
        "200":
          description: Authorize URL and OAuth state.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connections_disconnect:
    post:
      tags: [Connections]
      summary: Disconnect a connected user account.
      operationId: connections_disconnect
      x-kdcube-result-alias: connections_disconnect
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisconnectRequestEnvelope"
      responses:
        "200":
          description: Disconnect result.

  /bundles/{tenant}/{project}/{bundle_id}/operations/email_accounts_status:
    get:
      tags: [Email]
      summary: Read iCloud account status (email integration is iCloud-only; Gmail is a connections provider).
      operationId: email_accounts_status
      x-kdcube-result-alias: email_accounts_status
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      responses:
        "200":
          description: Email (iCloud) account status.

  /bundles/{tenant}/{project}/{bundle_id}/operations/email_connect_app_password:
    post:
      tags: [Email]
      summary: Connect an app-password email account (iCloud).
      operationId: email_connect_app_password
      x-kdcube-result-alias: email_connect_app_password
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailAppPasswordRequestEnvelope"
      responses:
        "200":
          description: Connected email account.

  /bundles/{tenant}/{project}/{bundle_id}/operations/email_disconnect_account:
    post:
      tags: [Email]
      summary: Disconnect an email account.
      operationId: email_disconnect_account
      x-kdcube-result-alias: email_disconnect_account
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailDisconnectRequestEnvelope"
      responses:
        "200":
          description: Disconnect result.

  /bundles/{tenant}/{project}/{bundle_id}/operations/connections_settings:
    get:
      tags: [Widgets]
      summary: Thin widget data alias for the Connections settings widget.
      operationId: connections_settings
      x-kdcube-result-alias: connections_settings
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      responses:
        "200":
          description: Widget data.

  /bundles/{tenant}/{project}/{bundle_id}/public/connection_oauth_callback:
    get:
      tags: [OAuth Callbacks]
      summary: Shared OAuth callback for all connection providers/apps.
      description: >
        Browser redirect target. Validates `state` with
        `connections.oauth_state_secret`, exchanges `code`, and stores a
        user-scoped token. Register this exact path as the redirect URI in each
        provider's OAuth app.
      operationId: connection_oauth_callback
      security: []
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
        - $ref: "#/components/parameters/OAuthCode"
        - $ref: "#/components/parameters/OAuthState"
        - $ref: "#/components/parameters/OAuthError"
      responses:
        "200":
          description: HTML redirect/result page.
          content:
            text/html:
              schema:
                type: string

  /bundles/{tenant}/{project}/{bundle_id}/public/telegram_connection_edge_start:
    post:
      tags: [Connection Edges]
      summary: Start a Telegram-first connection-edge flow.
      description: >
        Public Telegram Mini App route. The request must include signed Telegram
        initData in `X-Telegram-Init-Data`. It creates a pending provider proof
        and returns a platform_claim_url that the user opens to finish as a
        logged-in KDCube platform user.
      operationId: telegram_connection_edge_start
      security: []
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
        - name: X-Telegram-Init-Data
          in: header
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Envelope"
      responses:
        "200":
          description: Pending Telegram proof and platform claim URL.

  /bundles/{tenant}/{project}/{bundle_id}/public/telegram_connection_edge_status:
    post:
      tags: [Connection Edges]
      summary: Read Telegram edge status for the current Mini App subject.
      description: >
        Public Telegram Mini App route. The request must include signed Telegram
        initData in `X-Telegram-Init-Data`. Returns whether that Telegram
        subject has a connection edge to a platform user.
      operationId: telegram_connection_edge_status
      security: []
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
        - name: X-Telegram-Init-Data
          in: header
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Envelope"
      responses:
        "200":
          description: Telegram edge status and principal envelope when connected.

  /bundles/{tenant}/{project}/{bundle_id}/public/telegram_connection_edge_remove:
    post:
      tags: [Connection Edges]
      summary: Remove the current Telegram Mini App subject's connection edge.
      description: >
        Public Telegram Mini App route. The request must include signed Telegram
        initData in `X-Telegram-Init-Data`. Removes the edge for that Telegram
        subject when one exists.
      operationId: telegram_connection_edge_remove
      security: []
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
        - name: X-Telegram-Init-Data
          in: header
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Envelope"
      responses:
        "200":
          description: Connection-edge removal result.

  /bundles/{tenant}/{project}/{bundle_id}/public/telegram_connection_edge_complete:
    post:
      tags: [Connection Edges]
      summary: Complete a Telegram connection-edge challenge.
      description: >
        Public Telegram Mini App route. The request must include signed Telegram
        initData in `X-Telegram-Init-Data`; the platform user is read from the
        server-side challenge, not from caller input.
      operationId: telegram_connection_edge_complete
      security: []
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
        - name: X-Telegram-Init-Data
          in: header
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionEdgeChallengeStatusEnvelope"
      responses:
        "200":
          description: Connected Telegram identity and platform principal envelope.

  /bundles/{tenant}/{project}/{bundle_id}/public/federated_data_bus_claim:
    post:
      tags: [Authenticators]
      summary: Claim a Connection Hub live-channel token for an authenticated external subject.
      description: >
        Public route used by embedded Connection Hub widgets. The request is
        authenticated through the same promoted request auth context as other
        public Telegram routes. On success it returns a short-lived federated
        Socket.IO token scoped to connection-hub@1-0 so the widget can receive
        targeted service events such as connection_hub.edge.changed.
      operationId: federated_data_bus_claim
      security: []
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Envelope"
      responses:
        "200":
          description: Federated Socket.IO token claim.

  /bundles/{tenant}/{project}/{bundle_id}/public/request_authenticate:
    post:
      tags: [Authenticators]
      summary: Authenticate a request envelope through Connection Hub authenticators.
      description: >
        Gateway/app selector route. The caller sends a normalized request
        envelope. Connection Hub selects authenticator candidates from request
        hints and shape, verifies the proof with its configured authenticator rows,
        resolves the connection edge, and returns linked authority material.
      operationId: request_authenticate
      security: []
      parameters:
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Project"
        - $ref: "#/components/parameters/BundleId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestAuthenticateEnvelope"
      responses:
        "200":
          description: Authenticated actor plus linked platform authority, or a declined result.
components:
  securitySchemes:
    PlatformAuth:
      type: apiKey
      in: cookie
      name: __Secure-LATC
  parameters:
    Tenant:
      name: tenant
      in: path
      required: true
      schema: { type: string }
      example: demo-tenant
    Project:
      name: project
      in: path
      required: true
      schema: { type: string }
      example: demo-project
    BundleId:
      name: bundle_id
      in: path
      required: true
      schema: { type: string }
      example: connection-hub@1-0
    OAuthCode:
      name: code
      in: query
      required: false
      schema: { type: string }
    OAuthState:
      name: state
      in: query
      required: false
      schema: { type: string }
    OAuthError:
      name: error
      in: query
      required: false
      schema: { type: string }
  schemas:
    Envelope:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
      required: [data]
    NamedServiceRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/NamedServiceRequest"
    RequestAuthenticateEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                request:
                  $ref: "#/components/schemas/RequestEnvelope"
              required: [request]
    RequestEnvelope:
      type: object
      required: [method, path]
      properties:
        method:
          type: string
          example: POST
        path:
          type: string
          example: /api/integrations/bundles/demo-tenant/demo-project/user-memories/public/widgets/memories
        url:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
          example:
            x-telegram-init-data: "<Telegram.WebApp.initData>"
            x-kdcube-auth-provider: "telegram"
            x-kdcube-auth-integration-id: "telegram.default"
        query:
          type: object
          additionalProperties: true
        cookies:
          type: object
          additionalProperties:
            type: string
        body_text:
          type: string
        body_base64:
          type: string
    AuthenticatorUpsertEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthenticatorUpsertRequest"
    AuthenticatorUpsertRequest:
      type: object
      required: [provider]
      properties:
        id:
          type: string
          description: Preferred stable authenticator id.
          example: telegram.support.init_data
        authenticator_id:
          type: string
          description: Stable verifier row id.
          example: telegram.support.init_data
        authority_id:
          type: string
          description: Identity/grant realm this authenticator belongs to.
          example: telegram.support
        provider:
          type: string
          example: telegram
        label:
          type: string
        enabled:
          type: boolean
          default: true
        role_providing:
          type: boolean
          default: false
          description: True only for authenticators that directly establish platform authority; linked external providers normally keep this false.
        subject_namespace:
          type: string
          example: telegram
        secret_ref:
          type: string
          description: Bundle-secret path. The secret value is stored in bundles.secrets.yaml or the configured bundle secrets provider.
          example: identity.authenticators.telegram_support.bot_token
        selector:
          type: object
          additionalProperties: true
          description: Provider-owned routing hints. Not a secret store.
        verifier:
          type: object
          additionalProperties: true
          description: Provider-owned verification hints. Not a secret store.
        properties:
          type: object
          additionalProperties: true
          description: Non-secret provider metadata such as bot username or display hints.
    AuthenticatorRemoveEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [authenticator_id]
              properties:
                authenticator_id:
                  type: string
    NamedServiceRequest:
      type: object
      required: [operation]
      properties:
        operation:
          type: string
          example: connection.get_token
        namespace:
          type: string
          example: connections
        object_ref:
          type: string
        action:
          type: string
        payload:
          type: object
          additionalProperties: true
          example: { "provider": "slack" }
    ExternalIdentityRefRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ExternalIdentityRefRequest"
    IdentityFamilyRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                input_user_id:
                  type: string
                  description: Optional actor/platform user id to resolve. Defaults to the current authenticated actor.
                actor_user_id:
                  type: string
                  description: Alias used by server-side callers when they already know the actor user id.
                target_user_id:
                  type: string
                  description: Alias for input_user_id.
                user_id:
                  type: string
                  description: Alias for input_user_id in generic clients.
    DelegatedIdentityScopeRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [credential]
              properties:
                credential:
                  type: object
                  additionalProperties: true
                  description: Verified kdcube.credential.v1 envelope from the delegated access token grant record.
    ConnectionEdgeRefRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ExternalIdentityRefRequest"
    ConnectionEdgeRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              allOf:
                - $ref: "#/components/schemas/ExternalIdentityRefRequest"
                - type: object
                  properties:
                    label:
                      type: string
                    metadata:
                      type: object
                      additionalProperties: true
    ExternalIdentityRefRequest:
      type: object
      required: [provider, provider_subject]
      properties:
        provider:
          type: string
          example: telegram
        provider_subject:
          type: string
          example: "314062490"
        subject:
          type: string
          description: Alias for provider_subject.
    ConnectionEdgeChallengeCreateEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                provider:
                  type: string
                  enum: [telegram]
                  default: telegram
    ConnectionEdgeChallengeStatusEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [challenge_id]
              properties:
                challenge_id:
                  type: string
                confirmed:
                  type: boolean
                  description: Required only by connection_edge_challenge_claim.
    StartOAuthRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/StartOAuthRequest"
    StartOAuthRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          example: slack
        app_id:
          type: string
          description: Which configured client app to connect through.
          example: acme-search
        scopes:
          description: Optional per-connect subset of the app's configured scopes (list or space/comma string).
          oneOf:
            - type: array
              items: { type: string }
            - type: string
        return_hint:
          type: string
    DisconnectRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [provider, account_id]
              properties:
                provider: { type: string, example: slack }
                account_id: { type: string }
    EmailAppPasswordRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [email, app_password]
              properties:
                provider: { type: string, default: icloud }
                email: { type: string }
                app_password: { type: string }
                display_name: { type: string }
                username: { type: string }
    EmailDisconnectRequestEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              required: [account_id]
              properties:
                account_id: { type: string }
