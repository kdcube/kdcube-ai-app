bundle:
  repo: "kdcube/kdcube-ai-app"
  ref: "unreleased"
  description: |
    Initial built-in KDCube services bundle.

    Highlights

    - Serves the privileged `bundle_storage` operational storage browser,
      built from `sdk://solutions/storage/ui.widget.storage`.
    - Adds managed MCP surface public/mcp/conversations.
    - Adds conversations_export as the platform-native replacement for the old
      root /mcp conversation export shortcut.
    - Uses Connection Hub delegated credentials and descriptor-managed
      tool-centric grants.

    Known follow-ups

    - Add more KDCube service families as separate modules and MCP aliases.
