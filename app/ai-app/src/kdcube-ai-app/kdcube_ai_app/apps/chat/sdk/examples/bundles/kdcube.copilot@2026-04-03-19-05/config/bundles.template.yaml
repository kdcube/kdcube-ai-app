bundles:
  version: "1"
  default_bundle_id: "kdcube.copilot@2026-04-03-19-05"
  items:
    - id: "kdcube.copilot@2026-04-03-19-05"
      name: "KDCube Copilot"
      path: "<LOCAL_HOST_BUNDLE_ROOT>"
      module: "entrypoint"
      singleton: false
      config:
        enabled:
          bundle: true
          mcp:
            kdcube-doc: true
            doc_reader: true
          widget:
            copilot_webapp: true
        visibility:
          bundle:
            allowed_roles: []
          api:
            copilot_webapp_data:
              user_types:
                - "registered"
                - "paid"
                - "privileged"
            copilot_events_data:
              user_types:
                - "registered"
                - "paid"
                - "privileged"
          widget:
            copilot_webapp:
              user_types:
                - "registered"
                - "paid"
                - "privileged"
        knowledge:
          # Empty values let the bundle auto-detect local source in dev or use
          # KDCUBE_KNOWLEDGE_REPO/KDCUBE_KNOWLEDGE_REF. Pin repo/ref for
          # repeatable shared deployments.
          repo: ""
          ref: ""
          root: "app/ai-app"
          validate_refs: true
        mcp:
          doc_reader:
            auth:
              header_name: "X-KDCube-Copilot-MCP-Token"
        telemetry_sink:
          # Plain POST endpoint. The copilot bundle does not construct KDCube
          # bundle URLs here; paste the receiver URL exactly as it should be
          # called.
          endpoint_url: ""
        integrations:
          telegram:
            enabled: false
            webhook_url: ""
            send_responses: true
            stream_activity: true
            web_app_auth_max_age_seconds: 86400
        ui:
          widgets:
            copilot_webapp:
              enabled: true
              src_folder: "ui/widgets/copilot_webapp"
              build_command: "npm install --no-package-lock && OUTDIR=<VI_BUILD_DEST_ABSOLUTE_PATH> npm run build"
              shared_sources:
                memory_widget:
                  src_folder: "sdk://context/memory/ui/widget/memories"
                  target: "_shared/memory-widget"
                telegram_widget:
                  src_folder: "sdk://integrations/telegram/ui/widget.telegram"
                  target: "_shared/telegram-widget"
