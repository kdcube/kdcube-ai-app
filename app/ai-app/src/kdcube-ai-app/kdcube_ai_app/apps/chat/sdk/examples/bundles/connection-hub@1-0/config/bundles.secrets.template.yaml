bundles:
  version: "1"
  items:
    - id: "connection-hub@1-0"
      secrets:
        # Deployment-scoped provider/hub secrets only. User OAuth tokens and
        # app-passwords are user-scoped bundle state, never placed here.
        connections:
          # Hub-level fallback secret for older/shared Connection Hub OAuth
          # browser flows.
          oauth_state_secret: "<RANDOM_SIGNING_SECRET>"
          delegated_to_kdcube:
            # Signs the short-lived delegated to KDCube OAuth state for the
            # delegated_to_kdcube_oauth_callback route.
            oauth_state_secret: "<RANDOM_SIGNING_SECRET>"
            providers:
              google:
                connector_apps:
                  gmail:
                    client_secret: "<GOOGLE_OAUTH_CLIENT_SECRET>"
              slack:
                connector_apps:
                  demo:
                    client_secret: "<SLACK_OAUTH_CLIENT_SECRET>"
          providers: {}
        identity:
          authenticators:
            telegram_kdcube_ref:
              # Referenced by identity.authenticators[].secret_ref in
              # bundles.yaml. Secret values never live in the authenticator
              # registry table.
              bot_token: "<TELEGRAM_BOT_TOKEN>"
            # Additional bots use another stable key and matching secret_ref:
            # telegram_support:
            #   bot_token: "<ANOTHER_TELEGRAM_BOT_TOKEN>"
      # iCloud (the only remaining email-integration use) is app-password — the
      # user's password is stored as user-scoped state, so no deploy secret here.
