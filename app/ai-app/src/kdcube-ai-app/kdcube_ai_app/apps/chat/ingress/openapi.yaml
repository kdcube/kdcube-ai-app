          description: Amount in USD (min $0.50)
        success_url:
          type: string
          title: Success Url
          description: URL to redirect after successful payment
        cancel_url:
          type: string
          title: Cancel Url
          description: URL to redirect after cancelled payment
      type: object
      required:
      - amount_usd
      - success_url
      - cancel_url
      title: CreateCheckoutTopupRequest
    CreateSubscriptionRequest:
