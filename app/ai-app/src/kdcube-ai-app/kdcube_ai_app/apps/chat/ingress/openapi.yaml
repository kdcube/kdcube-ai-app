          $ref: '#/components/schemas/FeedbackPeriodWindow'
        items:
          items:
            $ref: '#/components/schemas/FeedbackConversationItem'
          type: array
          title: Items
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      type: object
      required:
      - tenant
      - project
      - window
      - items
      title: ConversationsInPeriodResponse
    CreateCheckoutSubscriptionRequest:
      properties:
        plan_id:
          type: string
          title: Plan Id
          description: Internal plan ID
        success_url:
          type: string
          title: Success Url
          description: URL to redirect after successful payment
        cancel_url:
          type: string
          title: Cancel Url
          description: URL to redirect after cancelled payment
      type: object
