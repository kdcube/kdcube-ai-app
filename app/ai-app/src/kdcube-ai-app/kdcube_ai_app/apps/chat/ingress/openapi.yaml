  /api/cb/conversations/{tenant}/{project}/{conversation_id}:
    delete:
      tags:
      - CB Conversations
      summary: Delete Conversation
      description: "Hard-delete a conversation (and related artifacts) for the authenticated user.\n\nThis will:\n  - remove\
        \ all index rows for this {user_id, conversation_id} (including state, logs, reactions, etc.)\n  - best-effort delete\
        \ message JSONs, attachments, and execution artifacts in storage.\n\nNOTE: This operation is irreversible."
      operationId: delete_conversation_api_cb_conversations__tenant___project___conversation_id__delete
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
      - name: project
        in: path
        required: true
        schema:
          type: string
          title: Project
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          title: Conversation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/cb/conversations/{tenant}/{project}/{conversation_id}/turns/{turn_id}/feedback:
    post:
      tags:
      - CB Conversations
      summary: Submit Turn Feedback
      description: "Submit, update, or clear user feedback for a specific turn.\n\nThis single endpoint handles all feedback\
        \ operations:\n\n**Add/Update Feedback:**\n- Set reaction to \"ok\", \"not_ok\", or \"neutral\"\n- Optionally include\
        \ text\n- Replaces any previous user feedback on this turn\n\n**Clear Feedback:**\n- Set reaction to null\n- Removes\
        \ all user feedback from this turn\n\nArgs:\n    conversation_id: The conversation ID\n    turn_id: The turn ID to\
        \ provide feedback on\n    req: Feedback request with reaction and optional text\n\nReturns:\n    TurnFeedbackResponse\
        \ with success status and cleared flag\n\nExamples:\n    # Add positive feedback\n    POST /conversations/{conv_id}/turns/{turn_id}/feedback\n\
        \    {\n        \"reaction\": \"ok\",\n        \"text\": \"Great explanation!\"\n    }\n\n    # Add neutral comment\n\
        \    POST /conversations/{conv_id}/turns/{turn_id}/feedback\n    {\n        \"reaction\": \"neutral\",\n        \"\
        text\": \"Note for later\"\n    }\n\n    # Clear feedback\n    POST /conversations/{conv_id}/turns/{turn_id}/feedback\n\
        \    {\n        \"reaction\": null\n    }"
      operationId: submit_turn_feedback_api_cb_conversations__tenant___project___conversation_id__turns__turn_id__feedback_post
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
      - name: project
        in: path
        required: true
        schema:
          type: string
          title: Project
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          title: Conversation Id
      - name: turn_id
        in: path
        required: true
        schema:
          type: string
          title: Turn Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnFeedbackRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnFeedbackResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/cb/conversations/{tenant}/{project}/{conversation_id}/turns-with-feedbacks:
    post:
      tags:
      - CB Conversations
      summary: Fetch Turns With Feedbacks
      description: "Return all turns in a conversation that have feedbacks (or reactions), each with:\n  - turn_id\n  - full\
        \ turn_log object (materialized)\n  - assistant message (materialized)\n  - user message (materialized)\n  - feedbacks\
        \ array (from the turn log payload)\n\nOptional:\n  - limit to specific turn_ids."
      operationId: fetch_turns_with_feedbacks_api_cb_conversations__tenant___project___conversation_id__turns_with_feedbacks_post
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
      - name: project
        in: path
        required: true
        schema:
          type: string
          title: Project
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          title: Conversation Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationFeedbackTurnsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/cb/conversations/{tenant}/{project}/feedback/conversations-in-period:
    post:
      tags:
      - CB Conversations
      summary: Conversations With Feedbacks In Period
      description: "Aggregate conversations (and optionally turns) that have feedback reactions within a time window.\n\n\
        Input:\n  - start/end (ISO8601, inclusive)\n  - include_turns: when true, also materializes involved turns and returns\
        \ `feedbacks` + `reactions`\n  - limit/cursor: pagination over conversations\n\nOutput:\n  - items[] per conversation\
        \ with feedback_counts {total,user,machine,ok,not_ok,neutral}\n  - optionally turns[] with per-turn summaries (id,\
        \ ts, feedbacks[], reactions[])\n  - next_cursor for pagination\n\nNotes:\n  - Scopes to the authenticated user and\
        \ the given {tenant}/{project}\n  - Counts are derived from artifacts tagged 'kind:turn.log.reaction'\n  - Turn details\
        \ (when include_turns=true) are materialized similarly to /turns-with-feedbacks"
      operationId: conversations_with_feedbacks_in_period_api_cb_conversations__tenant___project__feedback_conversations_in_period_post
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
      - name: project
        in: path
        required: true
        schema:
          type: string
          title: Project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationsInPeriodRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationsInPeriodResponse'
        '422':
          description: Validation Error
          content:
