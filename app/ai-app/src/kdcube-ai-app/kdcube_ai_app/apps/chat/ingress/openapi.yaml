      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
      - name: project
        in: path
        required: true
        schema:
          type: string
          title: Project
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          title: Conversation Id
      - name: bundle_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: If omitted, conversation fetch is not filtered by bundle_id and bundle ids are inferred from stored
            rows.
          title: Bundle Id
        description: If omitted, conversation fetch is not filtered by bundle_id and bundle ids are inferred from stored rows.
      requestBody:
        required: true
