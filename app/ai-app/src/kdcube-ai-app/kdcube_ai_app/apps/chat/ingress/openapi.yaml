components:
  schemas:
    AddLifetimeCreditsRequest:
      properties:
        user_id:
          type: string
          title: User Id
          description: User ID
        usd_amount:
          type: number
          exclusiveMinimum: 0.0
          title: Usd Amount
          description: Amount in USD
        ref_provider:
          type: string
          title: Ref Provider
          description: Reference model provider
          default: anthropic
        ref_model:
          type: string
          title: Ref Model
          description: Reference model
          default: claude-sonnet-4-5-20250929
        purchase_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Purchase Id
          description: Payment/transaction ID
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
          description: Purchase notes
      type: object
      required:
      - user_id
      - usd_amount
      title: AddLifetimeCreditsRequest
      description: 'Add purchased credits in USD (converted to lifetime tokens).


        Balance depletes on use, does NOT reset.

        Completely separate from plan quotas.'
    Body_sse_chat_sse_chat_post:
      properties:
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        attachment_meta:
          anyOf:
          - type: string
          - type: 'null'
          title: Attachment Meta
        files:
          items:
            type: string
            format: binary
          type: array
          title: Files
          default: []
      type: object
      title: Body_sse_chat_sse_chat_post
    CancelSubscriptionRequest:
      properties:
        user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
          description: User ID (optional if stripe_subscription_id provided)
        stripe_subscription_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Stripe Subscription Id
          description: Stripe subscription id
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
          description: Cancel notes
      type: object
      title: CancelSubscriptionRequest
      description: Cancel a Stripe subscription (at period end).
    CircuitBreakerStatusResponse:
      properties:
        name:
          type: string
          title: Name
        state:
          type: string
          title: State
        failure_count:
          type: integer
          title: Failure Count
        success_count:
          type: integer
          title: Success Count
        total_requests:
          type: integer
          title: Total Requests
        total_failures:
          type: integer
          title: Total Failures
        consecutive_failures:
          type: integer
          title: Consecutive Failures
        current_window_failures:
          type: integer
          title: Current Window Failures
        last_failure_time:
          anyOf:
          - type: number
          - type: 'null'
          title: Last Failure Time
        last_success_time:
          anyOf:
          - type: number
          - type: 'null'
          title: Last Success Time
        opened_at:
          anyOf:
          - type: number
          - type: 'null'
          title: Opened At
      type: object
      required:
      - name
      - state
      - failure_count
      - success_count
      - total_requests
      - total_failures
      - consecutive_failures
      - current_window_failures
      - last_failure_time
      - last_success_time
      - opened_at
      title: CircuitBreakerStatusResponse
    CircuitBreakerSummaryResponse:
      properties:
        total_circuits:
          type: integer
          title: Total Circuits
        open_circuits:
          type: integer
          title: Open Circuits
        half_open_circuits:
          type: integer
          title: Half Open Circuits
        closed_circuits:
          type: integer
          title: Closed Circuits
      type: object
      required:
      - total_circuits
      - open_circuits
      - half_open_circuits
      - closed_circuits
      title: CircuitBreakerSummaryResponse
    CircuitBreakersResponse:
      properties:
        summary:
          $ref: '#/components/schemas/CircuitBreakerSummaryResponse'
        circuits:
          additionalProperties:
            $ref: '#/components/schemas/CircuitBreakerStatusResponse'
          type: object
          title: Circuits
      type: object
      required:
      - summary
      - circuits
      title: CircuitBreakersResponse
    ConversationDeleteResponse:
      properties:
        conversation_id:
          type: string
          title: Conversation Id
        deleted_messages:
          type: integer
          title: Deleted Messages
          description: Rows deleted from conv_messages
        deleted_storage_messages:
          type: integer
          title: Deleted Storage Messages
          description: Message blobs removed from storage (best-effort)
        deleted_storage_attachments:
          type: integer
          title: Deleted Storage Attachments
          description: Attachment files removed from storage (best-effort)
        deleted_storage_executions:
          type: integer
          title: Deleted Storage Executions
          description: Execution snapshot files removed from storage (best-effort)
      type: object
      required:
      - conversation_id
      - deleted_messages
      - deleted_storage_messages
      - deleted_storage_attachments
      - deleted_storage_executions
      title: ConversationDeleteResponse
    ConversationFeedbackTurnsRequest:
      properties:
        turn_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Turn Ids
          description: If provided, restrict to these exact turn IDs. If omitted, server discovers turns with feedbacks.
        days:
          type: integer
          maximum: 3650.0
          minimum: 1.0
          title: Days
          default: 365
      type: object
      title: ConversationFeedbackTurnsRequest
    ConversationListItem:
      properties:
        conversation_id:
          type: string
          title: Conversation Id
        last_activity_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Activity At
        started_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Started At
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
      type: object
      required:
      - conversation_id
      title: ConversationListItem
    ConversationListResponse:
      properties:
        user_id:
          type: string
          title: User Id
        items:
          items:
            $ref: '#/components/schemas/ConversationListItem'
          type: array
          title: Items
      type: object
      required:
      - user_id
      - items
      title: ConversationListResponse
    ConversationStatus:
      properties:
        conversation_id:
          type: string
          title: Conversation Id
        state:
          type: string
          title: State
        updated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Updated At
        meta:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Meta
      type: object
      required:
      - conversation_id
      - state
      title: ConversationStatus
    ConversationsInPeriodRequest:
      properties:
        start:
          type: string
          title: Start
          description: ISO8601 timestamp, inclusive
        end:
          type: string
          title: End
          description: ISO8601 timestamp, inclusive
        include_turns:
          type: boolean
          title: Include Turns
          description: When true, returns turn details with feedbacks
          default: false
        limit:
          type: integer
          maximum: 500.0
          minimum: 1.0
          title: Limit
          description: Max conversations to return
          default: 100
        cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
          description: Opaque pagination cursor
      type: object
      required:
      - start
      - end
      title: ConversationsInPeriodRequest
    ConversationsInPeriodResponse:
      properties:
        tenant:
          type: string
          title: Tenant
        project:
          type: string
          title: Project
