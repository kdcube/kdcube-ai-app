  /api/admin/control-plane/plan-override/grant-trial:
    post:
      tags:
      - CP admin
      summary: Grant Trial Bonus
      description: 'Grant 7-day trial with temporary plan override.


        **How it works:**

        1. User''s base plan: Free (10 req/day)

        2. You grant trial: 100 req/day for 7 days

        3. During days 1-7: User gets exactly 100 req/day (plan is OVERRIDDEN)

        4. Day 8+: User reverts to base plan (10 req/day)


        **Use Cases:**

        - New user registration bonus

        - Marketing campaigns

        - User retention'
      operationId: grant_trial_bonus_api_admin_control_plane_plan_override_grant_trial_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantTrialRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/admin/control-plane/plan-override/update:
    post:
      tags:
      - CP admin
      summary: Update Plan Override
      description: 'Update user''s plan override (supports PARTIAL updates).


        **How it works:**

        - Sets specific limits for a period

        - OVERRIDES base plan (does not add)

        - Resets daily/monthly like plan quotas

        - Expires after X days


        **Partial Updates:**

        - Only updates fields you provide

        - Other fields stay unchanged (COALESCE in SQL)


        **Use Cases:**

        - Promotional campaigns

        - Beta tester credits

        - Apology/compensation

        - Extending existing trials'
      operationId: update_plan_override_api_admin_control_plane_plan_override_update_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlanOverrideRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
