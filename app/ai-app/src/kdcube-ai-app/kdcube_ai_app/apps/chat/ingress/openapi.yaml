      description: "Manually backfill daily + monthly aggregates for a date range.\n\nThis uses the same Redis locking as\
        \ the scheduler, so it is safe to call\non multiple API instances concurrently.\n\nExamples:\n  - /admin/run-aggregation-range?start_date=2025-01-01\n\
        \    -> backfills from 2025-01-01 up to yesterday.\n  - /admin/run-aggregation-range?start_date=2025-01-01&end_date=2025-01-10\n\
        \    -> backfills 2025-01-01 .. 2025-01-10."
      operationId: admin_run_aggregation_range_api_opex_admin_run_aggregation_range_post
      parameters:
      - name: start_date
        in: query
        required: true
        schema:
          type: string
          description: Start date (YYYY-MM-DD)
          title: Start Date
        description: Start date (YYYY-MM-DD)
      - name: end_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: End date (YYYY-MM-DD, inclusive). If omitted, defaults to yesterday in Europe/Berlin.
          title: End Date
        description: End date (YYYY-MM-DD, inclusive). If omitted, defaults to yesterday in Europe/Berlin.
      - name: include_today
        in: query
        required: false
        schema:
          type: boolean
