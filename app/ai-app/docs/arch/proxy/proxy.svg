<svg width="680" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect width="680" height="420" fill="#ffffff"/>

    <!-- Client -->
    <rect x="10" y="190" width="72" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="46" y="208" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Client</text>

    <!-- Client → proxy arrow -->
    <line x1="82" y1="212" x2="98" y2="212" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- OpenResty container -->
    <rect x="100" y="15" width="305" height="395" rx="16" fill="#f7f6f3" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="252" y="37" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">OpenResty proxy</text>

    <!-- Phase 1: SSL/TLS -->
    <rect x="113" y="50" width="279" height="50" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="252" y="71" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">SSL/TLS termination</text>
    <text x="252" y="89" text-anchor="middle" font-size="12" fill="#993C1D">redirect · direct IP block (444)</text>

    <!-- Phase 2: Security headers -->
    <rect x="113" y="108" width="279" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="252" y="129" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Security headers + compression</text>
    <text x="252" y="147" text-anchor="middle" font-size="12" fill="#5F5E5A">HSTS · X-Frame-Options · gzip</text>

    <!-- Phase 3: Rate limiting -->
    <rect x="113" y="166" width="279" height="50" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text x="252" y="187" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Rate limiting</text>
    <text x="252" y="205" text-anchor="middle" font-size="12" fill="#854F0B">chat · kb · upload · auth zones</text>

    <!-- Phase 4: Auth -->
    <rect x="113" y="224" width="279" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="252" y="245" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Auth cookie unmask</text>
    <text x="252" y="263" text-anchor="middle" font-size="12" fill="#0F6E56">call proxylogin · inject cookies</text>

    <!-- Phase 5: Routing -->
    <rect x="113" y="282" width="279" height="50" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="252" y="303" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Path-based routing</text>
    <text x="252" y="321" text-anchor="middle" font-size="12" fill="#534AB7">6 route groups → 5 backends</text>

    <!-- Phase 6: Protocol -->
    <rect x="113" y="340" width="279" height="50" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="252" y="361" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Protocol handling</text>
    <text x="252" y="379" text-anchor="middle" font-size="12" fill="#185FA5">SSE · WebSocket · SPA fallback</text>

    <!-- Bus lines -->
    <line x1="405" y1="212" x2="430" y2="212" stroke="#888780" stroke-width="1" opacity="0.6"/>
    <line x1="430" y1="92"  x2="430" y2="332" stroke="#888780" stroke-width="1" opacity="0.6"/>

    <!-- Junction dots -->
    <circle cx="430" cy="212" r="3"   fill="#888780" opacity="0.7"/>
    <circle cx="430" cy="92"  r="2.5" fill="#888780" opacity="0.5"/>
    <circle cx="430" cy="152" r="2.5" fill="#888780" opacity="0.5"/>
    <circle cx="430" cy="272" r="2.5" fill="#888780" opacity="0.5"/>
    <circle cx="430" cy="332" r="2.5" fill="#888780" opacity="0.5"/>

    <!-- Bus → backend arrows -->
    <line x1="430" y1="92"  x2="448" y2="92"  stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="430" y1="152" x2="448" y2="152" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="430" y1="212" x2="448" y2="212" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="430" y1="272" x2="448" y2="272" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="430" y1="332" x2="448" y2="332" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Backend: web-ui -->
    <rect x="450" y="72" width="220" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="560" y="88"  text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">web-ui</text>
    <text x="560" y="104" text-anchor="middle" font-size="12" fill="#185FA5">:80 — SPA</text>

    <!-- Backend: proxylogin -->
    <rect x="450" y="132" width="220" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="560" y="148" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">proxylogin</text>
    <text x="560" y="164" text-anchor="middle" font-size="12" fill="#0F6E56">auth · unmask</text>

    <!-- Backend: chat-ingress -->
    <rect x="450" y="192" width="220" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="560" y="208" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">chat-ingress</text>
    <text x="560" y="224" text-anchor="middle" font-size="12" fill="#534AB7">:8010 — API · SSE · WS</text>

    <!-- Backend: chat-proc -->
    <rect x="450" y="252" width="220" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="560" y="268" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">chat-proc</text>
    <text x="560" y="284" text-anchor="middle" font-size="12" fill="#993C1D">:8020 — integrations</text>

    <!-- Backend: kb -->
    <rect x="450" y="312" width="220" height="40" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text x="560" y="328" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">kb</text>
    <text x="560" y="344" text-anchor="middle" font-size="12" fill="#854F0B">:8000 — knowledge base</text>
</svg>