<svg width="680" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="510" fill="#ffffff"/>

  <!-- External: Client -->
  <rect x="15" y="15" width="90" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="60" y="37" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Client</text>

  <!-- External: ALB -->
  <rect x="158" y="15" width="174" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="245" y="31" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53" dominant-baseline="central">ALB</text>
  <text x="245" y="49" text-anchor="middle" font-size="12" fill="#185FA5" dominant-baseline="central">HTTPS :443 · ACM cert</text>

  <!-- External: ECR -->
  <rect x="534" y="15" width="130" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="599" y="31" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">ECR</text>
  <text x="599" y="49" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">image registry</text>

  <!-- Client → ALB -->
  <line x1="105" y1="37" x2="156" y2="37" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ALB → web-proxy (HTTP :80) -->
  <path d="M245,59 L245,87 L112,87 L112,128" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="178" y="83" text-anchor="middle" font-size="11" fill="#5F5E5A" dominant-baseline="central">HTTP :80</text>

  <!-- ECR → ECS (dashed image pull) -->
  <path d="M599,59 L599,83 L440,83 L440,95" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="525" y="79" text-anchor="end" font-size="11" fill="#888780" dominant-baseline="central">image pull</text>

  <!-- VPC boundary -->
  <rect x="10" y="72" width="660" height="428" rx="16" fill="#F9F8F5" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="27" y="89" font-size="11" fill="#888780" dominant-baseline="central">VPC · private subnets</text>

  <!-- ECS Cluster -->
  <rect x="20" y="95" width="420" height="360" rx="12" fill="#ffffff" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="36" y="112" font-size="11" fill="#5F5E5A" dominant-baseline="central">ECS cluster · Fargate · kdcube</text>

  <!-- web-proxy -->
  <rect x="35" y="128" width="155" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="112" y="145" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C" dominant-baseline="central">web-proxy</text>
  <text x="112" y="163" text-anchor="middle" font-size="12" fill="#993C1D" dominant-baseline="central">OpenResty :80</text>

  <!-- Bus bar -->
  <line x1="200" y1="128" x2="200" y2="375" stroke="#888780" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="150" r="3"   fill="#888780" opacity="0.7"/>
  <circle cx="200" cy="200" r="2.5" fill="#888780" opacity="0.5"/>
  <circle cx="200" cy="250" r="2.5" fill="#888780" opacity="0.5"/>
  <circle cx="200" cy="300" r="2.5" fill="#888780" opacity="0.5"/>
  <circle cx="200" cy="350" r="2.5" fill="#888780" opacity="0.4"/>

  <!-- web-proxy → bus + bus → backends -->
  <line x1="190" y1="150" x2="200" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="150" x2="213" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="200" x2="213" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="250" x2="213" y2="250" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="300" x2="213" y2="300" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="350" x2="213" y2="350" stroke="#B4B2A9" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- web-ui -->
  <rect x="215" y="128" width="195" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="312" y="144" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53" dominant-baseline="central">web-ui</text>
  <text x="312" y="160" text-anchor="middle" font-size="12" fill="#185FA5" dominant-baseline="central">web-ui.kdcube.local:80</text>

  <!-- proxylogin -->
  <rect x="215" y="178" width="195" height="40" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="312" y="194" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">proxylogin</text>
  <text x="312" y="210" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">proxylogin.kdcube.local:80</text>

  <!-- chat-ingress -->
  <rect x="215" y="228" width="195" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="312" y="244" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" dominant-baseline="central">chat-ingress</text>
  <text x="312" y="260" text-anchor="middle" font-size="12" fill="#534AB7" dominant-baseline="central">chat-ingress.kdcube.local:8010</text>

  <!-- chat-proc -->
  <rect x="215" y="278" width="195" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="312" y="294" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C" dominant-baseline="central">chat-proc</text>
  <text x="312" y="310" text-anchor="middle" font-size="12" fill="#993C1D" dominant-baseline="central">chat-proc.kdcube.local:8020</text>

  <!-- kb (optional, dashed border) -->
  <rect x="215" y="328" width="195" height="40" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="312" y="344" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">kb</text>
  <text x="312" y="360" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">kb.kdcube.local:8000 · optional</text>

  <!-- Cloud Map namespace -->
  <rect x="28" y="378" width="402" height="34" rx="6" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="229" y="395" text-anchor="middle" font-size="11" fill="#5F5E5A" dominant-baseline="central">Cloud Map DNS · kdcube.local private namespace</text>

  <!-- Managed services header -->
  <text x="557" y="112" text-anchor="middle" font-size="11" fill="#5F5E5A" dominant-baseline="central">Managed AWS services</text>

  <!-- RDS -->
  <rect x="455" y="128" width="205" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="557" y="144" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53" dominant-baseline="central">RDS PostgreSQL</text>
  <text x="557" y="160" text-anchor="middle" font-size="12" fill="#185FA5" dominant-baseline="central">kdcube DB · pgvector</text>

  <!-- ElastiCache -->
  <rect x="455" y="178" width="205" height="40" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="557" y="194" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F" dominant-baseline="central">ElastiCache Redis</text>
  <text x="557" y="210" text-anchor="middle" font-size="12" fill="#A32D2D" dominant-baseline="central">queues · sessions · rate limit</text>

  <!-- Secrets Manager -->
  <rect x="455" y="228" width="205" height="40" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="557" y="244" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">Secrets Manager</text>
  <text x="557" y="260" text-anchor="middle" font-size="12" fill="#854F0B" dominant-baseline="central">DB · API keys · Cognito</text>

  <!-- CloudWatch Logs -->
  <rect x="455" y="278" width="205" height="40" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="557" y="294" text-anchor="middle" font-size="14" font-weight="500" fill="#173404" dominant-baseline="central">CloudWatch Logs</text>
  <text x="557" y="310" text-anchor="middle" font-size="12" fill="#3B6D11" dominant-baseline="central">all ECS tasks · awslogs</text>

  <!-- EFS -->
  <rect x="455" y="328" width="205" height="40" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="557" y="344" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" dominant-baseline="central">EFS</text>
  <text x="557" y="360" text-anchor="middle" font-size="12" fill="#5F5E5A" dominant-baseline="central">bundle storage · chat-proc · kb</text>

  <!-- Backend → managed service arrows (dashed) -->
  <!-- chat-ingress → RDS -->
  <path d="M410,248 L441,248 L441,148 L453,148" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <!-- chat-proc → ElastiCache -->
  <path d="M410,298 L444,298 L444,198 L453,198" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <!-- proxylogin → Secrets Manager -->
  <path d="M410,198 L447,198 L447,248 L453,248" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <!-- chat-proc → EFS -->
  <path d="M410,318 L450,318 L450,348 L453,348" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
</svg>