# Global secrets descriptor/export shape.
# The live provider may be secrets-file, aws-sm, or another backend, but this
# file defines the portable deployment contract.
services:
  openai:
    api_key: "<open ai key>"
  google:
    api_key: "<google key>"
  anthropic:
    api_key: "<anthropic key>"
    claude_code_key: null
  brave:
    api_key: null
    api_comm_mid_key: null
  openrouter:
    api_key: null
  serpapi:
    api_key: null
  huggingface:
    api_key: null
  stripe:
    secret_key: null
    webhook_secret: null
  git:
    http_token: "<Github PAT>"
  web:
    # Browser session cookies for authenticated web-fetch (medium paywall sites).
    # Format: JSON string with "cookies" object containing cookie key-value pairs.
    # Example: '{"cookies": {"uid": "abc123", "sid": "xyz..."}}'
    fetch_resources_medium: null

git:
  http_token: "<Github PAT>"

infra:
  postgres:
    password: postgres
  redis:
    password: redispass

auth:
  cognito:
    client_secret: null
  oidc:
    admin_username: ""
    admin_password: ""
    admin_email: ""

aws:
  access_key_id: null
  secret_access_key: null
