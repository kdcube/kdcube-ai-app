# Mounted into /config/gateway.yaml in descriptor-first deployments.
# Runtime services can read this file directly when GATEWAY_CONFIG_JSON is absent.
gateway:
  tenant: "TENANT_ID"
  project: "PROJECT_ID"
  profile: "development"

  guarded_rest_patterns:
    ingress:
      - "^.*/resources/link-preview$"
      - "^.*/resources/by-rn$"
      - "^.*/conversations/[^/]+/[^/]+/[^/]+/fetch$"
      - "^.*/conversations/[^/]+/[^/]+/turns-with-feedbacks$"
      - "^.*/conversations/[^/]+/[^/]+/feedback/conversations-in-period$"
    proc:
      - "^.*/integrations/bundles/[^/]+/[^/]+/[^/]+$"
      - "^.*/integrations/bundles/[^/]+/[^/]+/[^/]+/widgets$"
      - "^.*/integrations/bundles/[^/]+/[^/]+/operations/[^/]+$"
      - "^.*/integrations/bundles/[^/]+/[^/]+/[^/]+/operations/[^/]+$"
      - "^.*/integrations/bundles/[^/]+/[^/]+/[^/]+/public/[^/]+$"
      - "^.*/integrations/bundles/[^/]+/[^/]+/[^/]+/widgets/[^/]+$"
      - "^.*/integrations/static/[^/]+/[^/]+/[^/]+$"
      - "^.*/integrations/static/[^/]+/[^/]+/[^/]+/.*$"

  bypass_throttling_patterns:
    ingress:
      - "^.*/webhooks/stripe$"
    proc: []

  service_capacity:
    ingress:
      processes_per_instance: 1
    proc:
      concurrent_requests_per_process: 10
      processes_per_instance: 1
      avg_processing_time_seconds: 25

  backpressure:
    capacity_source_component: "proc"
    ingress:
      capacity_buffer: 0.1
      queue_depth_multiplier: 3
      anonymous_pressure_threshold: 0.6
      registered_pressure_threshold: 0.85
      paid_pressure_threshold: 0.9
      hard_limit_threshold: 0.98
    proc:
      capacity_buffer: 0.1
      queue_depth_multiplier: 3
      anonymous_pressure_threshold: 0.6
      registered_pressure_threshold: 0.85
      paid_pressure_threshold: 0.9
      hard_limit_threshold: 0.98

  rate_limits:
    ingress:
      anonymous: { hourly: 120, burst: 10, burst_window: 60 }
      registered: { hourly: 6000, burst: 160, burst_window: 60 }
      paid: { hourly: 12000, burst: 220, burst_window: 60 }
      privileged: { hourly: -1, burst: 400, burst_window: 60 }
    proc:
      anonymous: { hourly: 120, burst: 10, burst_window: 60 }
      registered: { hourly: 6000, burst: 160, burst_window: 60 }
      paid: { hourly: 12000, burst: 220, burst_window: 60 }
      privileged: { hourly: -1, burst: 400, burst_window: 60 }

  # Socket.IO data_bus.publish is a streaming package path. These limits are
  # evaluated per connected user session before messages are written to durable
  # Redis Streams. HTTP request throttles and OpenResty request-size limits still
  # apply outside this package/message/byte policy.
  data_bus:
    ingress:
      # For prototyping, set publish_limits.<role>.enabled: false.
      publish_limits:
        anonymous:
          packages_per_minute: 60
          messages_per_minute: 600
          bytes_per_minute: 2097152
          max_messages_per_package: 50
          max_package_bytes: 262144
          window_seconds: 60
        registered:
          packages_per_minute: 600
          messages_per_minute: 6000
          bytes_per_minute: 16777216
          max_messages_per_package: 200
          max_package_bytes: 1048576
          window_seconds: 60
        paid:
          packages_per_minute: 1200
          messages_per_minute: 12000
          bytes_per_minute: 33554432
          max_messages_per_package: 500
          max_package_bytes: 2097152
          window_seconds: 60
        privileged:
          packages_per_minute: -1
          messages_per_minute: -1
          bytes_per_minute: -1
          max_messages_per_package: 1000
          max_package_bytes: 4194304
          window_seconds: 60

  pools:
    ingress: { pg_pool_min_size: 0, pg_pool_max_size: 4, redis_max_connections: 20 }
    proc: { pg_pool_min_size: 0, pg_pool_max_size: 8, redis_max_connections: 40 }
    pg_max_connections: 100

  limits:
    ingress: { max_sse_connections_per_instance: 200 }
    proc: { max_integrations_ops_concurrency: 200, max_queue_size: 100 }

  redis:
    sse_stats_ttl_seconds: 60
    sse_stats_max_age_seconds: 120
