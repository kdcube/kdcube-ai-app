# =============================================================================
# OpenResty Reverse Proxy (delegated auth via proxylogin, no SSL)
# -----------------------------------------------------------------------------
# Frontend config.json must use:
#   "routesPrefix": "/chatbot"
# UI routes live under /chatbot/* (example: /chatbot/chat).
# This config expects proxylogin and uses /auth/unmask to inject auth cookies.
# =============================================================================
events {
    worker_connections 1024;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
    ''      close;
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log logs/access.log main;
    error_log logs/error.log;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=kb_api_zone:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=chat_api_zone:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=monitoring_api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10r/s;

    # Backend service definitions
    upstream web_ui {
        server web-ui:80;
    }

    upstream chat_api {
        server chat-ingress:8010;
    }

    upstream chat_proc {
        server chat-proc:8020;
    }

    upstream monitoring_api {
        server chat-ingress:8010;
    }

    upstream proxy_login {
        server proxylogin;
    }

    init_by_lua_block {
        function unmask_token()
            local res = ngx.location.capture("/auth/unmask", {
                method = ngx.HTTP_GET,
            })

            if res.status ~= 200 then
                ngx.exit(401)
            end

            local set_cookies = res.header["Set-Cookie"]
            if set_cookies then
                local cookies = {}
                if type(set_cookies) == "table" then
                    for _, c in ipairs(set_cookies) do
                        table.insert(cookies, c:match("^([^;]+)"))
                    end
                else
                    table.insert(cookies, set_cookies:match("^([^;]+)"))
                end
                ngx.req.set_header("Cookie", table.concat(cookies, "; "))
            end
        end
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;

    # Security settings
    server_tokens off;
    client_max_body_size 100M;

    server {
        listen 80;
        server_name _;

        # Security headers
        more_set_headers "X-Content-Type-Options: nosniff";
        more_set_headers "X-Frame-Options: DENY";
        more_set_headers "X-XSS-Protection: 1; mode=block";
        more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

        # Auth
        location = /auth/unmask {
            internal;
            proxy_pass http://proxy_login/v1/unmask;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Cookie $http_cookie;
        }

        # UI routes are served under /chatbot (routesPrefix in config.json).
        location = / { return 301 /chatbot/chat; }

        location /config.json {
            proxy_pass http://web_ui/config.json;
        }

        # SSE endpoints for chat
        location /sse/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;
            client_max_body_size 20M;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 60s;
        }

        location /api/chat/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api/api/chat/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 60s;
        }

        location /api/cb/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api/api/cb/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 60s;
        }

        location /api/integrations/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_proc/api/integrations/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 60s;
        }

        location /chatbot/ {
            proxy_pass http://web_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        location @fallback {
            proxy_pass http://web_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/local/openresty/nginx/html;
        }
    }
}
