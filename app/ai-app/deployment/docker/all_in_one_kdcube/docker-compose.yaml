services:

  postgres-db:
    image: pgvector/pgvector:pg16
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env
        required: false
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.postgres.setup
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-200}
    restart: unless-stopped
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_LISTEN_PORT: 80
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.postgres.setup
        required: false
    ports:
      - "5050:80"
    networks:
      - kdcube-internal
      - kdcube-secrets

  postgres-setup:
    image: kdcube-postgres-setup:latest
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_PostgresSetup
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.postgres.setup
        required: false
    environment:
      - POSTGRES_HOST=postgres-db
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - kdcube-internal
    restart: "no"

  redis:
    image: redis:latest
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env
        required: false
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: unless-stopped
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/redis:/data
    networks:
      - kdcube-internal
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING" ]
      interval: 5s
      timeout: 3s
      retries: 5

  kdcube-secrets:
    image: kdcube-secrets:latest
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Secrets
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env
        required: false
    environment:
      - SECRETS_ADMIN_TOKEN=${SECRETS_ADMIN_TOKEN:-}
      - SECRETS_READ_TOKENS=${SECRETS_READ_TOKENS:-}
    restart: unless-stopped
    tmpfs:
      - /run/kdcube-secrets
    networks:
      - kdcube-secrets

  neo4j:
    image: neo4j:5
    container_name: kdcube-neo4j
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env
        required: false
    environment:
      NEO4J_AUTH: "${N4J_USER:-neo4j}/${N4J_PASSWORD:-neo4jpassword}"
      NEO4J_server_memory_pagecache_size: ${N4J_PAGECACHE:-512m}
      NEO4J_server_memory_heap_initial__size: ${N4J_HEAP_INITIAL:-256m}
      NEO4J_server_memory_heap_max__size: ${N4J_HEAP_MAX:-512m}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/neo4j/data:/data
      - ${KDCUBE_DATA_DIR:-./data}/neo4j/logs:/logs
      - ${KDCUBE_DATA_DIR:-./data}/neo4j/plugins:/plugins
      - ${KDCUBE_DATA_DIR:-./data}/neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u $${N4J_USER:-neo4j} -p $${N4J_PASSWORD:-neo4jpassword} 'RETURN 1' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped
    networks:
      - kdcube-internal
    ports:
      - "127.0.0.1:7475:7474"   # Remapped: Neo4j Desktop uses 7474
      - "127.0.0.1:7687:7687"

  clamav:
    image: clamav/clamav:stable
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - kdcube-internal
    environment:
      - CLAMD_START=1
      - FRESHCLAM_CHECKS=24
    healthcheck:
      test: [ "CMD-SHELL", "clamdscan --version || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/clamav:/var/lib/clamav
    ports:
      - "127.0.0.1:3310:3310"

  kb:
    image: kdcube-kb:latest
    restart: unless-stopped
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_KB
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.kb
        required: false
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres-db
      - LOG_FILE_PREFIX=kb
      - SECRETS_TOKEN=${SECRETS_TOKEN_PROC:-}
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/kdcube-storage:/kdcube-storage
      - ${KDCUBE_DATA_DIR:-./data}/exec-workspace:/exec-workspace
      - ${KDCUBE_LOGS_DIR:-./logs}/kb:/logs
      - type: bind
        source: ${HOME}/.aws
        target: /home/appuser/.aws
        read_only: true
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kdcube-secrets:
        condition: service_started
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "127.0.0.1:8000:8000"

  dramatiq:
    image: kdcube-dramatiq:latest
    restart: unless-stopped
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Dramatiq
    # The Dockerfile CMD points at apps.knowledge_base.processor which only
    # defines a plain async function — no @dramatiq.actor decorator there, so
    # workers never subscribe to the kdcube_orch_* queues and uploads pile up
    # in Redis without ever being processed. We invoke the proper launcher
    # which calls setup_worker_broker() (registers Results/Callbacks/AsyncIO
    # middleware that the actor declarations rely on), imports kb_actors,
    # declares the queues, and starts the worker pool.
    command: ["python", "-m", "kdcube_ai_app.infra.orchestration.app.dramatiq.dramatiq_app_cli"]
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.kb
        required: false
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres-db
      - LOG_FILE_PREFIX=dramatiq
      - SECRETS_TOKEN=${SECRETS_TOKEN_PROC:-}
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/kdcube-storage:/kdcube-storage
      - ${KDCUBE_LOGS_DIR:-./logs}/dramatiq:/logs
      - type: bind
        source: ${HOME}/.aws
        target: /home/appuser/.aws
        read_only: true
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kb:
        condition: service_started
    networks:
      - kdcube-internal
      - kdcube-secrets

  chat-ingress:
    image: kdcube-chat-ingress:latest
    restart: unless-stopped
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Ingress
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.ingress
        required: false
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres-db
      - APP_NEO4J_URI=bolt://neo4j:7687
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - LOG_FILE_PREFIX=chat-ingress
      - GATEWAY_COMPONENT=ingress
      - HOST_KDCUBE_STORAGE_PATH=${HOST_KDCUBE_STORAGE_PATH}
      - SECRETS_TOKEN=${SECRETS_TOKEN_INGRESS:-}
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/kdcube-storage:/kdcube-storage
      - ${KDCUBE_LOGS_DIR:-./logs}/chat-ingress:/logs
      - type: bind
        source: ${HOME}/.aws
        target: /home/appuser/.aws
        read_only: true
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kdcube-secrets:
        condition: service_started
      clamav:
        condition: service_healthy
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "${CHAT_APP_PORT:-8010}:8010"

  chat-proc:
    image: kdcube-chat-proc:latest
    restart: unless-stopped
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Chatproc
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.proc
        required: false
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres-db
      - APP_NEO4J_URI=bolt://neo4j:7687
      - LOG_FILE_PREFIX=chat-proc
      - GATEWAY_COMPONENT=proc
      - HOST_KDCUBE_STORAGE_PATH=${HOST_KDCUBE_STORAGE_PATH}
      - HOST_BUNDLES_PATH=${HOST_BUNDLES_PATH}
      - HOST_BUNDLE_STORAGE_PATH=${HOST_BUNDLE_STORAGE_PATH}
      - HOST_EXEC_WORKSPACE_PATH=${HOST_EXEC_WORKSPACE_PATH}
      - SECRETS_TOKEN=${SECRETS_TOKEN_PROC:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${KDCUBE_DATA_DIR:-./data}/kdcube-storage:/kdcube-storage
      - ${KDCUBE_DATA_DIR:-./data}/exec-workspace:/exec-workspace
      - ${KDCUBE_LOGS_DIR:-./logs}/chat-proc:/logs
      - type: bind
        source: ${HOST_BUNDLE_DESCRIPTOR_PATH:-/dev/null}
        target: /config/assembly.yaml
      - type: bind
        source: ${HOST_BUNDLES_DESCRIPTOR_PATH:-/dev/null}
        target: /config/bundles.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_PATH?}           # host root with all bundles
        target: ${AGENTIC_BUNDLES_ROOT?}       # e.g. /bundles inside the container
      - type: bind
        source: ${HOST_BUNDLE_STORAGE_PATH?}   # host root for bundle shared storage (knowledge space)
        target: ${BUNDLE_STORAGE_ROOT?}        # e.g. /bundle-storage inside the container
      - type: bind
        source: ${HOST_GIT_SSH_KEY_PATH:-/dev/null}
        target: /run/secrets/git_ssh_key
        read_only: true
      - type: bind
        source: ${HOST_GIT_KNOWN_HOSTS_PATH:-/dev/null}
        target: /run/secrets/git_known_hosts
        read_only: true
      - type: bind
        source: ${HOME}/.aws
        target: /home/appuser/.aws
        read_only: true
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "${CHAT_PROCESSOR_PORT:-8020}:8020"

  metrics:
    image: kdcube-metrics:latest
    restart: unless-stopped
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Metricservice
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.metrics
        required: false
    environment:
      - LOG_FILE_PREFIX=metrics
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kdcube-internal
    ports:
      - "127.0.0.1:${METRICS_PORT:-8090}:8090"

  web-ui:
    image: ${KDCUBE_UI_IMAGE:-kdcube-web-ui:latest}
    build:
      context: ${UI_BUILD_CONTEXT}
      dockerfile: ${UI_DOCKERFILE_PATH}
      args:
        - UI_SOURCE_PATH=${UI_SOURCE_PATH}
        - NGINX_UI_CONFIG_FILE_PATH=${NGINX_UI_CONFIG_FILE_PATH}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      chat-ingress:
        condition: service_started
    networks:
      - kdcube-internal
    volumes:
      - ${PATH_TO_FRONTEND_CONFIG_JSON}:/usr/share/nginx/html/config.json:ro
      - ${KDCUBE_CONFIG_DIR:-./config}/nginx_ui.conf:/etc/nginx/nginx.conf:ro

#  proxylogin:
#    image: proxylogin:latest
#    build:
#      no_cache: true
#      dockerfile: Dockerfile_ProxyLogin
#    env_file:
#      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.proxylogin
#        required: false
#    networks:
#      - kdcube-internal
#    volumes:
#      - type: bind
#        source: ${HOME}/.aws
#        target: /home/proxylogin/.aws
#        read_only: true

  web-proxy:
    image: kdcube-web-proxy:latest
    build:
      context: ${PROXY_BUILD_CONTEXT}
      dockerfile: ${PROXY_DOCKERFILE_PATH}
      args:
        - NGINX_CONFIG_FILE_PATH=${NGINX_PROXY_CONFIG_FILE_PATH}
    restart: unless-stopped
    volumes:
      - ${NGINX_PROXY_RUNTIME_CONFIG_PATH:-${KDCUBE_CONFIG_DIR:-./config}/nginx_proxy.conf}:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      chat-ingress:
        condition: service_started
      web-ui:
        condition: service_started
#      proxylogin:
#        condition: service_started
    networks:
      - kdcube-external
      - kdcube-internal
    ports:
      - "${KDCUBE_UI_PORT:-80}:80"

networks:
  kdcube-external:
    driver: bridge
  kdcube-internal:
    driver: bridge
  kdcube-secrets:
    driver: bridge
    internal: true
