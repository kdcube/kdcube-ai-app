services:

  postgres-db:
    container_name: kdcube-postgres
    image: pgvector/pgvector:pg16
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env
        required: false
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.postgres.setup
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-200}
    restart: unless-stopped
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_LISTEN_PORT: 80
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.postgres.setup
        required: false
    ports:
      - "5050:80"
    networks:
      - kdcube-internal
      - kdcube-secrets

  postgres-setup:
    image: kdcube-postgres-setup:latest
    container_name: kdcube-postgres-setup
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_PostgresSetup
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.postgres.setup
        required: false
    environment:
      - POSTGRES_HOST=postgres-db
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - kdcube-internal
    restart: "no"

  redis:
    container_name: kdcube-redis
    image: redis:latest
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env
        required: false
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: unless-stopped
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/redis:/data
    networks:
      - kdcube-internal
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING" ]
      interval: 5s
      timeout: 3s
      retries: 5

  kdcube-secrets:
    image: kdcube-secrets:latest
    container_name: kdcube-secrets
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Secrets
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env
        required: false
    environment:
      - SECRETS_ADMIN_TOKEN=${SECRETS_ADMIN_TOKEN:-}
      - SECRETS_READ_TOKENS=${SECRETS_READ_TOKENS:-}
    restart: unless-stopped
    tmpfs:
      - /run/kdcube-secrets
    networks:
      - kdcube-secrets

