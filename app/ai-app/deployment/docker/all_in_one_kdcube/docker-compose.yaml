  web-proxy:
    image: kdcube-web-proxy:latest
    container_name: kdcube-web-proxy
    build:
      context: ${PROXY_BUILD_CONTEXT}
      dockerfile: ${PROXY_DOCKERFILE_PATH}
      args:
        - NGINX_CONFIG_FILE_PATH=${NGINX_PROXY_CONFIG_FILE_PATH}
    restart: unless-stopped
    volumes:
      - ${NGINX_PROXY_RUNTIME_CONFIG_PATH:-./config/nginx_proxy.conf}:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      chat-ingress:
        condition: service_started
      web-ui:
        condition: service_started
#      proxylogin:
#        condition: service_started
    networks:
      - kdcube-external
      - kdcube-internal
    ports:
      - "${KDCUBE_UI_PORT:-80}:80"

networks:
  kdcube-external:
    driver: bridge
  kdcube-internal:
    driver: bridge
  kdcube-secrets:
    driver: bridge
    internal: true
