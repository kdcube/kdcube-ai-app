  clamav:
    image: clamav/clamav:stable
    container_name: kdcube-clamav
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - kdcube-internal
    environment:
      - CLAMD_START=1
      - FRESHCLAM_CHECKS=24
    healthcheck:
      test: [ "CMD-SHELL", "clamdscan --version || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/clamav:/var/lib/clamav
    ports:
      - "127.0.0.1:3310:3310"

