  chat-ingress:
    image: kdcube-chat-ingress:latest
    container_name: kdcube-chat-ingress
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Ingress
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.ingress
        required: false
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres-db
      - APP_NEO4J_URI=bolt://neo4j:7687
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - LOG_FILE_PREFIX=chat-ingress
      - GATEWAY_COMPONENT=ingress
      - HOST_KDCUBE_STORAGE_PATH=${HOST_KDCUBE_STORAGE_PATH}
      - SECRETS_TOKEN=${SECRETS_TOKEN_INGRESS:-}
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/kdcube-storage:/kdcube-storage
      - ${KDCUBE_LOGS_DIR:-./logs}/chat-ingress:/logs
      - type: bind
        source: ${HOME}/.aws
        target: /home/appuser/.aws
        read_only: true
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kdcube-secrets:
        condition: service_started
      clamav:
        condition: service_healthy
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "${CHAT_APP_PORT:-8010}:8010"

  chat-proc:
    image: kdcube-chat-proc:latest
    container_name: kdcube-chat-proc
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Chatproc
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.proc
        required: false
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres-db
      - APP_NEO4J_URI=bolt://neo4j:7687
      - LOG_FILE_PREFIX=chat-proc
      - GATEWAY_COMPONENT=proc
      - HOST_KDCUBE_STORAGE_PATH=${HOST_KDCUBE_STORAGE_PATH}
      - HOST_BUNDLES_PATH=${HOST_BUNDLES_PATH}
      - HOST_BUNDLE_STORAGE_PATH=${HOST_BUNDLE_STORAGE_PATH}
      - HOST_EXEC_WORKSPACE_PATH=${HOST_EXEC_WORKSPACE_PATH}
      - SECRETS_TOKEN=${SECRETS_TOKEN_PROC:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${KDCUBE_DATA_DIR:-./data}/kdcube-storage:/kdcube-storage
      - ${KDCUBE_DATA_DIR:-./data}/exec-workspace:/exec-workspace
      - ${KDCUBE_LOGS_DIR:-./logs}/chat-proc:/logs
      - type: bind
        source: ${HOST_BUNDLE_DESCRIPTOR_PATH:-/dev/null}
        target: /config/release.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_PATH?}           # host root with all bundles
        target: ${AGENTIC_BUNDLES_ROOT?}       # e.g. /bundles inside the container
      - type: bind
        source: ${HOST_BUNDLE_STORAGE_PATH?}   # host root for bundle shared storage (knowledge space)
        target: ${BUNDLE_STORAGE_ROOT?}        # e.g. /bundle-storage inside the container
      - type: bind
        source: ${HOST_GIT_SSH_KEY_PATH:-/dev/null}
        target: /run/secrets/git_ssh_key
        read_only: true
      - type: bind
        source: ${HOST_GIT_KNOWN_HOSTS_PATH:-/dev/null}
        target: /run/secrets/git_known_hosts
        read_only: true
      - type: bind
        source: ${HOME}/.aws
        target: /home/appuser/.aws
        read_only: true
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "${CHAT_PROCESSOR_PORT:-8020}:8020"

  metrics:
    image: kdcube-metrics:latest
    container_name: kdcube-metrics
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Metricservice
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-./config}/.env.metrics
        required: false
    environment:
      - LOG_FILE_PREFIX=metrics
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kdcube-internal
    ports:
      - "127.0.0.1:${METRICS_PORT:-8090}:8090"

  web-ui:
    image: kdcube-web-ui:latest
    container_name: kdcube-web-ui
    build:
      context: ${UI_BUILD_CONTEXT}
      dockerfile: ${UI_DOCKERFILE_PATH}
      args:
        - UI_SOURCE_PATH=${UI_SOURCE_PATH}
        - NGINX_UI_CONFIG_FILE_PATH=${NGINX_UI_CONFIG_FILE_PATH}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      chat-ingress:
        condition: service_started
    networks:
      - kdcube-internal
    volumes:
      - ${PATH_TO_FRONTEND_CONFIG_JSON}:/usr/share/nginx/html/config.json:ro
      - ${KDCUBE_CONFIG_DIR:-./config}/nginx_ui.conf:/etc/nginx/nginx.conf:ro

