# =============================================================================
# OpenResty Reverse Proxy — ECS / Fargate variant
# -----------------------------------------------------------------------------
# Differences from EC2 / local configs:
#   - SSL terminated at ALB; proxy listens on :80 only
#   - real_ip_header ACTIVE (ALB rewrites client IP to X-Forwarded-For)
#   - All upstream hostnames use Cloud Map DNS (*.kdcube.local)
#   - VPC resolver (169.254.169.253) required for Lua subrequests + $variables
#   - X-Forwarded-Proto forwarded from ALB header (always "https" in prod)
#   - HSTS set here (ALB does not add response headers by default)
# =============================================================================
events {
    worker_connections 1024;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # VPC resolver — mandatory for:
    #   1. Lua ngx.location.capture() subrequests that hit upstream blocks
    #   2. proxy_pass with $variable (e.g. $kb_backend)
    # 169.254.169.253 is the AWS VPC DNS resolver; always reachable on Fargate.
    # -------------------------------------------------------------------------
    resolver 169.254.169.253 valid=10s;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log logs/access.log main;
    error_log  logs/error.log;

    # -------------------------------------------------------------------------
    # Real IP recovery — REQUIRED when behind ALB
    # ALB rewrites the source IP to its own; without these directives every
    # request appears to come from the ALB private IP, breaking rate limiting.
    # Replace <ALB_CIDR> with your VPC CIDR (e.g. 10.0.0.0/8 or 10.10.0.0/16).
    # -------------------------------------------------------------------------
    real_ip_header    X-Forwarded-For;
    set_real_ip_from  <ALB_CIDR>;
    real_ip_recursive on;

    # Allow larger upstream response headers (proxylogin returns large cookies)
    proxy_buffer_size     128k;
    proxy_buffers         4 256k;
    proxy_busy_buffers_size 256k;

    # Rate limiting zones (keyed on recovered real client IP)
    limit_req_zone $binary_remote_addr zone=kb_api_zone:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=chat_api_zone:10m   rate=10r/s;
    limit_req_zone $binary_remote_addr zone=monitoring_api:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m          rate=2r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m       rate=5r/s;

    # -------------------------------------------------------------------------
    # Upstreams — Cloud Map private DNS (*.kdcube.local)
    # Cloud Map registers A records the moment ECS tasks register; nginx
    # resolves these at startup via the OS resolver (/etc/resolv.conf points
    # to 169.254.169.253 on Fargate, which serves the kdcube.local namespace).
    # -------------------------------------------------------------------------
    upstream web_ui {
        server web-ui.kdcube.local:80;
    }

    upstream chat_api {
        server chat-ingress.kdcube.local:8010;
    }

    upstream chat_proc {
        server chat-proc.kdcube.local:8020;
    }

    upstream monitoring_api {
        server chat-ingress.kdcube.local:8010;
    }

    upstream proxy_login {
        server proxylogin.kdcube.local:80;
    }

    # kb_api is optional — uncomment when KB service is active.
    # Uses the upstream block (not the $variable pattern in /api/kb/) for
    # consistency; both work as long as the resolver is configured.
    # upstream kb_api {
    #     server kb.kdcube.local:8000;
    # }

    # -------------------------------------------------------------------------
    # Auth cookie unmask — loaded once at worker startup
    # -------------------------------------------------------------------------
    init_by_lua_block {
        function unmask_token()
            local res = ngx.location.capture("/auth/unmask", {
                method = ngx.HTTP_GET,
            })

            if res.status ~= 200 then
                ngx.exit(401)
            end

            local set_cookies = res.header["Set-Cookie"]
            if set_cookies then
                local cookies = {}
                if type(set_cookies) == "table" then
                    for _, c in ipairs(set_cookies) do
                        table.insert(cookies, c:match("^([^;]+)"))
                    end
                else
                    table.insert(cookies, set_cookies:match("^([^;]+)"))
                end
                ngx.req.set_header("Cookie", table.concat(cookies, "; "))
            end
        end
    }

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;

    # Security
    server_tokens        off;
    client_max_body_size 100M;

    server {
        listen 80;

        # Replace with your domain (used by ALB SNI; must match ACM certificate CN)
        server_name <YOUR_DOMAIN>;

        # ---------------------------------------------------------------------
        # Security headers
        # HSTS is set here because ALB does not add custom response headers
        # out of the box; the browser will remember to use HTTPS for 1 year.
        # ---------------------------------------------------------------------
        more_set_headers "X-Content-Type-Options: nosniff";
        more_set_headers "X-Frame-Options: DENY";
        more_set_headers "X-XSS-Protection: 1; mode=block";
        more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
        more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";

        # ---------------------------------------------------------------------
        # Auth unmask — internal subrequest to proxylogin via Cloud Map DNS.
        # The resolver directive above ensures Lua can reach the upstream.
        # ---------------------------------------------------------------------
        location = /auth/unmask {
            internal;
            proxy_pass http://proxy_login/v1/unmask;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Forward the original scheme (ALB always sets this to "https")
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_set_header Cookie $http_cookie;
        }

        #############
        # KB Routes #
        #############

        location /api/kb/ {
            # Variable-based proxy_pass: defers DNS resolution to request time,
            # so nginx starts even if the kb service is not yet running.
            # Requires the resolver directive in http {}.
            set $kb_backend "kb.kdcube.local:8000";
            proxy_pass http://$kb_backend/api/kb/;
            proxy_intercept_errors on;
            error_page 502 503 504 = @service_unavailable;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        location @service_unavailable {
            default_type application/json;
            return 503 '{"error": "Service temporarily unavailable"}';
        }

        # SSE endpoints for chat
        location /sse/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;

            client_max_body_size 20M;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
            proxy_connect_timeout   60s;
        }

        location /api/chat/ {
            # limit_req zone=chat_api_zone burst=10 nodelay;

            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api/api/chat/;

            client_max_body_size 20M;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
            proxy_connect_timeout   60s;
        }

        #############
        # CB Routes #
        #############

        location = /profile {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api/profile;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /monitoring {
            # limit_req zone=monitoring_api burst=10 nodelay;

            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api/monitoring;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /cb/socket.io/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host              $host;
            proxy_set_header Origin            $http_origin;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
            proxy_connect_timeout 60s;
            proxy_buffering       off;
        }

        location = /api/cb/resources {
            access_by_lua_block {
                unmask_token()
            }

            client_max_body_size 500M;
            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_connect_timeout 60s;
            proxy_send_timeout    600s;
            proxy_read_timeout    600s;
        }

        location ^~ /api/cb/resources/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
        }

        location = /api/cb/conversations {
            access_by_lua_block {
                unmask_token()
            }

            client_max_body_size 500M;
            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_connect_timeout 60s;
            proxy_send_timeout    600s;
            proxy_read_timeout    600s;
        }

        location ^~ /api/cb/conversations/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
        }

        location ^~ /api/integrations/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_proc;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            client_max_body_size  50M;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location /admin/integrations/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_proc;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            client_max_body_size  50M;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location ^~ /api/admin/integrations/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            client_max_body_size  50M;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location ^~ /admin/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            client_max_body_size  50M;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location ^~ /api/opex/ {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            client_max_body_size  50M;
            proxy_connect_timeout 300s;
            proxy_send_timeout    86400s;
            proxy_read_timeout    86400s;
        }

        # Economics API (stripe, billing, subscriptions)
        location ^~ /api/economics/ {

            # unmask token and append unmasked auth and id tokens
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $http_origin always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With,Stripe-Signature" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }

            client_max_body_size 50M;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location ^~ /api/admin/control-plane {
            access_by_lua_block {
                unmask_token()
            }

            proxy_pass http://chat_api;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            client_max_body_size  50M;
            proxy_connect_timeout 300s;
            proxy_send_timeout    86400s;
            proxy_read_timeout    86400s;
        }

        location ^~ /auth/ {
            limit_req zone=auth_zone burst=10 nodelay;

            proxy_pass http://proxy_login/v1/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
        }

        location = / {
            return 301 /chatbot/chat;
        }

        # SPA — web-ui
        location / {
            proxy_pass http://web_ui;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            location ~* /chatbot/.+ {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
                proxy_pass http://web_ui;
            }

            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        location /config.json {
            proxy_pass http://web_ui/config.json;
        }

        location @fallback {
            proxy_pass http://web_ui;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/local/openresty/nginx/html;
        }
    }
}