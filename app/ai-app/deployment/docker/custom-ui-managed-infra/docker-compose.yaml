services:

  postgres-setup:
    image: kdcube-postgres-setup:latest
    build:
      context: ../../..
      dockerfile: deployment/docker/custom-ui-managed-infra/Dockerfile_PostgresSetup
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-.}/.env.postgres.setup
        required: false
    networks:
      - kdcube-internal
      - kdcube-secrets
    restart: "no"

  clamav:
    image: clamav/clamav:stable
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - kdcube-internal
      - kdcube-secrets
    environment:
      - CLAMD_START=1
      - FRESHCLAM_CHECKS=24
    healthcheck:
      test: [ "CMD-SHELL", "clamdscan --version || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/clamav:/var/lib/clamav
    ports:
      - "127.0.0.1:3310:3310"

  kdcube-secrets:
    image: kdcube-secrets:latest
    build:
      context: ../../..
      dockerfile: deployment/docker/all_in_one_kdcube/Dockerfile_Secrets
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-.}/.env
        required: false
    environment:
      - SECRETS_ADMIN_TOKEN=${SECRETS_ADMIN_TOKEN:-}
      - SECRETS_READ_TOKENS=${SECRETS_READ_TOKENS:-}
    restart: unless-stopped
    tmpfs:
      - /run/kdcube-secrets
    networks:
      - kdcube-secrets

  chat-ingress:
    image: kdcube-chat-ingress:latest
    build:
      context: ../../..
      dockerfile: deployment/docker/custom-ui-managed-infra/Dockerfile_Ingress
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-.}/.env.ingress
        required: false
    environment:
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - LOG_FILE_PREFIX=chat-ingress
      - GATEWAY_COMPONENT=ingress
      - HOST_KDCUBE_STORAGE_PATH=${HOST_KDCUBE_STORAGE_PATH}
      - HOST_GIT_BUNDLES_PATH=${HOST_GIT_BUNDLES_PATH:-}
      - AGENTIC_GIT_BUNDLES_ROOT=${AGENTIC_GIT_BUNDLES_ROOT:-/git-bundles}
      - SECRETS_TOKEN=${SECRETS_TOKEN_INGRESS:-}
    volumes:
      - ${KDCUBE_DATA_DIR:-./data}/kdcube-storage:/kdcube-storage
      - ${KDCUBE_LOGS_DIR:-./logs}/chat-ingress:/logs
      - type: bind
        source: ${HOST_ASSEMBLY_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/assembly.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_DESCRIPTOR_PATH:-/dev/null}
        target: /config/bundles.yaml
        read_only: true
      - type: bind
        source: ${HOST_SECRETS_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/secrets.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_SECRETS_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/bundles.secrets.yaml
        read_only: true
      - type: bind
        source: ${HOST_GIT_BUNDLES_PATH?}
        target: ${AGENTIC_GIT_BUNDLES_ROOT:-/git-bundles}
      - type: bind
        source: ${HOME}/.aws
        target: /home/appuser/.aws
        read_only: true
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
      kdcube-secrets:
        condition: service_started
      clamav:
        condition: service_healthy
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "127.0.0.1:${CHAT_APP_PORT:-8010}:8010"

  chat-proc:
    image: kdcube-chat-proc:latest
    build:
      context: ../../..
      dockerfile: deployment/docker/custom-ui-managed-infra/Dockerfile_Chatproc
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-.}/.env.proc
        required: false
    environment:
      - LOG_FILE_PREFIX=chat-proc
      - GATEWAY_COMPONENT=proc
      - HOST_KDCUBE_STORAGE_PATH=${HOST_KDCUBE_STORAGE_PATH}
      - HOST_BUNDLES_PATH=${HOST_BUNDLES_PATH}
      - HOST_GIT_BUNDLES_PATH=${HOST_GIT_BUNDLES_PATH:-}
      - HOST_BUNDLE_STORAGE_PATH=${HOST_BUNDLE_STORAGE_PATH}
      - HOST_EXEC_WORKSPACE_PATH=${HOST_EXEC_WORKSPACE_PATH}
      - AGENTIC_GIT_BUNDLES_ROOT=${AGENTIC_GIT_BUNDLES_ROOT:-/git-bundles}
      - SECRETS_TOKEN=${SECRETS_TOKEN_PROC:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${KDCUBE_DATA_DIR:-./data}/kdcube-storage:/kdcube-storage
      - ${KDCUBE_DATA_DIR:-./data}/exec-workspace:/exec-workspace
      - ${KDCUBE_LOGS_DIR:-./logs}/chat-proc:/logs
      - type: bind
        source: ${HOST_ASSEMBLY_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/assembly.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_DESCRIPTOR_PATH:-/dev/null}
        target: /config/bundles.yaml
        read_only: true
      - type: bind
        source: ${HOST_SECRETS_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/secrets.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_SECRETS_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/bundles.secrets.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_PATH?}           # host root with all bundles
        target: ${AGENTIC_BUNDLES_ROOT?}       # e.g. /bundles inside the container
      - type: bind
        source: ${HOST_GIT_BUNDLES_PATH?}  # host root for git-resolved bundle clones/cache
        target: ${AGENTIC_GIT_BUNDLES_ROOT:-/git-bundles}
      - type: bind
        source: ${HOST_BUNDLE_STORAGE_PATH?}   # host root for bundle shared storage (knowledge space)
        target: ${BUNDLE_STORAGE_ROOT?}        # e.g. /bundle-storage inside the container
      - type: bind
        source: ${HOST_GIT_SSH_KEY_PATH:-/dev/null}
        target: /run/secrets/git_ssh_key
        read_only: true
      - type: bind
        source: ${HOST_GIT_KNOWN_HOSTS_PATH:-/dev/null}
        target: /run/secrets/git_known_hosts
        read_only: true
      - type: bind
        source: ${HOME}/.aws
        target: /home/appuser/.aws
        read_only: true
    depends_on:
      postgres-setup:
        condition: service_completed_successfully
    networks:
      - kdcube-internal
      - kdcube-secrets
    ports:
      - "127.0.0.1:${CHAT_PROCESSOR_PORT:-8020}:8020"

  metrics:
    image: kdcube-metrics:latest
    build:
      context: ../../..
      dockerfile: deployment/docker/custom-ui-managed-infra/Dockerfile_Metricservice
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-.}/.env.metrics
        required: false
    environment:
      - LOG_FILE_PREFIX=metrics
    volumes:
      - type: bind
        source: ${HOST_ASSEMBLY_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/assembly.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_DESCRIPTOR_PATH:-/dev/null}
        target: /config/bundles.yaml
        read_only: true
      - type: bind
        source: ${HOST_SECRETS_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/secrets.yaml
        read_only: true
      - type: bind
        source: ${HOST_BUNDLES_SECRETS_YAML_DESCRIPTOR_PATH:-/dev/null}
        target: /config/bundles.secrets.yaml
        read_only: true
    networks:
      - kdcube-internal
    ports:
      - "127.0.0.1:${METRICS_PORT:-8090}:8090"

  web-ui:
    image: ${KDCUBE_UI_IMAGE:-kdcube-web-ui:latest}
    build:
      context: ${UI_BUILD_CONTEXT}
      dockerfile: ${UI_DOCKERFILE_PATH}
      args:
        - UI_SOURCE_PATH=${UI_SOURCE_PATH}
        - UI_ENV_BUILD_RELATIVE=${UI_ENV_BUILD_RELATIVE}
        - NGINX_UI_CONFIG_FILE_PATH=${NGINX_UI_CONFIG_FILE_PATH}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      chat-ingress:
        condition: service_started
    networks:
      - kdcube-internal
    volumes:
      - ${PATH_TO_FRONTEND_CONFIG_JSON}:/usr/share/nginx/html/config.json:ro

  proxylogin:
    image: proxylogin:latest
    build:
      no_cache: true
      context: ../../..
      dockerfile: deployment/docker/custom-ui-managed-infra/Dockerfile_ProxyLogin
    env_file:
      - path: ${KDCUBE_CONFIG_DIR:-.}/.env.proxylogin
        required: false
    networks:
      - kdcube-internal
    volumes:
      - type: bind
        source: ${HOME}/.aws
        target: /home/proxylogin/.aws
        read_only: true

  web-proxy:
    image: kdcube-web-proxy:latest
    build:
      context: ${PROXY_BUILD_CONTEXT}
      dockerfile: ${PROXY_DOCKERFILE_PATH}
      args:
        - NGINX_CONFIG_FILE_PATH=${NGINX_PROXY_CONFIG_FILE_PATH}
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ${KDCUBE_DATA_DIR:-./data}/nginx/webroot:/var/www/letsencrypt
      - ${NGINX_PROXY_RUNTIME_CONFIG_PATH:-${KDCUBE_CONFIG_DIR:-.}/nginx_proxy_ssl_cognito.conf}:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      chat-ingress:
        condition: service_started
      web-ui:
        condition: service_started
      proxylogin:
        condition: service_started
    networks:
      - kdcube-external
      - kdcube-internal
    ports:
      - "${KDCUBE_PROXY_HTTP_PORT:-${KDCUBE_UI_PORT:-80}}:80"
      - "${KDCUBE_PROXY_HTTPS_PORT:-${KDCUBE_UI_SSL_PORT:-443}}:443"

networks:
  kdcube-external:
    driver: bridge
  kdcube-internal:
    driver: bridge
  kdcube-secrets:
    driver: bridge
    internal: true
