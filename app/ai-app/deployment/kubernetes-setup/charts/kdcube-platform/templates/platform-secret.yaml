{{- if .Values.secrets.platform.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.platform.name }}
  labels:
    app.kubernetes.io/name: {{ include "kdcube-platform.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.platform.data.OPENAI_API_KEY | quote }}
  HUGGING_FACE_API_TOKEN: {{ .Values.secrets.platform.data.HUGGING_FACE_API_TOKEN | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.platform.data.ANTHROPIC_API_KEY | quote }}
  BRAVE_API_KEY: {{ .Values.secrets.platform.data.BRAVE_API_KEY | quote }}
  SECRETS_ADMIN_TOKEN: {{ .Values.secrets.platform.data.SECRETS_ADMIN_TOKEN | quote }}
  SECRETS_READ_TOKENS: {{ .Values.secrets.platform.data.SECRETS_READ_TOKENS | quote }}
  SECRETS_TOKEN_INGRESS: {{ .Values.secrets.platform.data.SECRETS_TOKEN_INGRESS | quote }}
  SECRETS_TOKEN_PROC: {{ .Values.secrets.platform.data.SECRETS_TOKEN_PROC | quote }}
{{- end }}
