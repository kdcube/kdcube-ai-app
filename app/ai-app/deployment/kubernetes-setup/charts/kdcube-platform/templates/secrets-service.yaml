{{- if .Values.services.secrets.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kdcube-secrets
  labels:
    app: kdcube-secrets
spec:
  replicas: {{ .Values.services.secrets.replicaCount }}
  selector:
    matchLabels:
      app: kdcube-secrets
  template:
    metadata:
      labels:
        app: kdcube-secrets
    spec:
      containers:
        - name: kdcube-secrets
          image: "{{ .Values.services.secrets.image.repository }}:{{ .Values.services.secrets.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: SECRETS_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.platform.name }}
                  key: SECRETS_ADMIN_TOKEN
            - name: SECRETS_READ_TOKENS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.platform.name }}
                  key: SECRETS_READ_TOKENS
          ports:
            - name: http
              containerPort: {{ .Values.services.secrets.servicePort }}
              protocol: TCP
          volumeMounts:
            - name: secrets-tmp
              mountPath: /run/kdcube-secrets
      volumes:
        - name: secrets-tmp
          emptyDir:
            medium: Memory
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: kdcube-secrets
  labels:
    app: kdcube-secrets
spec:
  type: ClusterIP
  selector:
    app: kdcube-secrets
  ports:
    - name: http
      port: {{ .Values.services.secrets.servicePort }}
      targetPort: http
      protocol: TCP
{{- end }}
