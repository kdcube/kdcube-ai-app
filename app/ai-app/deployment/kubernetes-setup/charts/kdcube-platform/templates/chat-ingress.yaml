{{- if .Values.services.chatIngress.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ingress
  labels:
    app: chat-ingress
spec:
  replicas: {{ .Values.services.chatIngress.replicaCount }}
  selector:
    matchLabels:
      app: chat-ingress
  template:
    metadata:
      labels:
        app: chat-ingress
    spec:
      containers:
        - name: chat-ingress
          image: "{{ .Values.services.chatIngress.image.repository }}:{{ .Values.services.chatIngress.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.services.chatIngress.servicePort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Values.configMaps.backendEnv }}
            - secretRef:
                name: {{ .Values.secrets.platform.name }}
          env:
            - name: CHAT_APP_PORT
              value: {{ .Values.services.chatIngress.servicePort | quote }}
            - name: GATEWAY_COMPONENT
              value: ingress
            - name: POSTGRES_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: POSTGRES_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_SSL
              value: {{ .Values.postgres.ssl | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgres.name }}
                  key: {{ .Values.secrets.postgres.userKey }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgres.name }}
                  key: {{ .Values.secrets.postgres.passwordKey }}
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.name }}
                  key: {{ .Values.secrets.redis.passwordKey }}
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
            - name: SECRETS_URL
              value: http://kdcube-secrets:7777
            - name: SECRETS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.platform.name }}
                  key: SECRETS_TOKEN_INGRESS
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
{{ toYaml .Values.services.chatIngress.resources | indent 12 }}
          volumeMounts:
            - name: kdcube-storage
              mountPath: /kdcube-storage
            - name: bundles
              mountPath: /bundles
              readOnly: true
            - name: bundle-storage
              mountPath: /bundle-storage
            - name: logs
              mountPath: /logs
            {{- if .Values.awsCredentials.enabled }}
            - name: aws-credentials
              mountPath: /home/appuser/.aws
              readOnly: true
            {{- end }}
      volumes:
        - name: kdcube-storage
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.kdcubeStorage.claimName }}
        - name: bundles
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.bundles.claimName }}
        - name: bundle-storage
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.bundleStorage.claimName }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.logs.claimName }}
        {{- if .Values.awsCredentials.enabled }}
        - name: aws-credentials
          hostPath:
            path: {{ .Values.awsCredentials.hostPath }}
            type: Directory
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: chat-ingress
  labels:
    app: chat-ingress
spec:
  type: ClusterIP
  selector:
    app: chat-ingress
  ports:
    - name: http
      port: {{ .Values.services.chatIngress.servicePort }}
      targetPort: http
      protocol: TCP
{{- end }}
