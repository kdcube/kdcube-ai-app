apiVersion: v1
kind: ConfigMap
metadata:
  name: kdcube-descriptors
data:
  assembly.yaml: |
    config:
      version: "2026.3.10.209"

    release_name: "k8s-default"
    domain: ""

    context:
      tenant: "TENANT_ID"
      project: "PROJECT_ID"

    storage:
      kdcube: "file:///kdcube-storage"
      bundles: "file:///bundle-storage"

    auth:
      type: "simple"

    proxy:
      ssl: false
      route_prefix: "/chatbot"

  bundles.yaml: |
    bundles:
      version: "1"
      default_bundle_id: "app@2-0"
      items:
        - id: "app@2-0"
          name: "Customer App"
          repo: "git@github.com:org/customer-repo.git"
          ref: "bundle-v2026.02.22"
          subdir: "service/bundles"
          module: "app@2-0.entrypoint"
          config:
            model_id: "gpt-4o-mini"

  gateway.yaml: |
    gateway:
      tenant: "TENANT_ID"
      project: "PROJECT_ID"
      profile: "development"

  secrets.yaml: |
    services:
      openai:
        api_key: null
      anthropic:
        api_key: null
      brave:
        api_key: null

  # Some deployments reference /config/release.yaml. Keep it as an alias.
  release.yaml: |
    config:
      version: "2026.3.10.209"
    release_name: "k8s-default"
