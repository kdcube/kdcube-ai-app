apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-config
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        include /usr/local/openresty/nginx/conf/mime.types;
        default_type application/octet-stream;

        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        upstream web_ui {
            server web-ui:80;
        }

        upstream chat_api {
            server chat-ingress:8010;
        }

        upstream chat_proc {
            server chat-proc:8020;
        }

        server {
            listen 80;
            server_name _;

            location = / {
                return 301 /chatbot/chat;
            }

            location /sse/ {
                proxy_pass http://chat_api;
                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_buffering off;
                proxy_request_buffering off;
                proxy_read_timeout 600s;
                proxy_send_timeout 600s;
            }

            location /api/chat/ {
                proxy_pass http://chat_api/api/chat/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /api/cb/ {
                proxy_pass http://chat_api/api/cb/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /api/integrations/ {
                proxy_pass http://chat_proc/api/integrations/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /cb/socket.io/ {
                proxy_pass http://chat_api/socket.io/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $host;
                proxy_read_timeout 600s;
                proxy_send_timeout 600s;
                proxy_buffering off;
            }

            location /chatbot/ {
                proxy_pass http://web_ui/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
