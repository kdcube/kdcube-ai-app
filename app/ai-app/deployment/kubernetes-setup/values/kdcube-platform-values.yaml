# Shared platform values.
#
# This file pins the platform to a published image release and keeps the chart
# generally reusable across clusters. Cluster-specific deviations belong in a
# separate override file such as values/kdcube-platform-k3d-values.yaml.

configMaps:
  backendEnv: backend-env
  frontendRuntime: frontend-runtime-config
  frontendNginx: frontend-nginx-config
  nginxProxy: nginx-proxy-config
  descriptors: kdcube-descriptors

secrets:
  postgres:
    name: postgres-db-credentials
    userKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD
  redis:
    name: redis-auth
    passwordKey: redis-password
  platform:
    create: true
    name: kdcube-platform-secrets
    data:
      OPENAI_API_KEY: ""
      HUGGING_FACE_API_TOKEN: ""
      ANTHROPIC_API_KEY: ""
      BRAVE_API_KEY: ""
      SECRETS_ADMIN_TOKEN: ""
      SECRETS_READ_TOKENS: ""
      SECRETS_TOKEN_INGRESS: ""
      SECRETS_TOKEN_PROC: ""

postgres:
  host: postgres-db
  port: "5432"
  database: kdcube
  ssl: "False"

redis:
  host: redis
  port: "6379"

persistence:
  create: true
  storageClassName: ""
  bundles:
    claimName: bundles
    size: 10Gi
  kdcubeStorage:
    claimName: kdcube-storage
    size: 10Gi
  bundleStorage:
    claimName: bundle-storage
    size: 10Gi
  execWorkspace:
    claimName: exec-workspace
    size: 10Gi
  logs:
    claimName: kdcube-logs
    size: 10Gi

dockerSocket:
  enabled: true
  hostPath: /var/run/docker.sock

awsCredentials:
  enabled: false
  hostPath: /home/appuser/.aws

services:
  secrets:
    enabled: true
    replicaCount: 1
    image:
      repository: kdcube/kdcube-secrets
      # Use a published Docker Hub tag, not "latest".
      tag: 2026.3.15.435

  chatIngress:
    enabled: true
    replicaCount: 1
    image:
      repository: kdcube/kdcube-chat-ingress
      tag: 2026.3.15.435

  chatProc:
    enabled: true
    replicaCount: 1
    image:
      repository: kdcube/kdcube-chat-proc
      tag: 2026.3.15.435

  metrics:
    enabled: true
    replicaCount: 1
    image:
      repository: kdcube/kdcube-metrics
      tag: 2026.3.15.435

  webUi:
    enabled: true
    replicaCount: 1
    image:
      repository: kdcube/kdcube-web-ui
      tag: 2026.3.15.435

  webProxy:
    enabled: true
    replicaCount: 1
    image:
      repository: kdcube/kdcube-web-proxy
      tag: 2026.3.15.435
    serviceType: ClusterIP
