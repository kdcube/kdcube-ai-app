domain: "" # required when proxy.ssl=true; used for proxylogin URLs and nginx SSL server_name/cert paths
company: "KDCube"

context:
  tenant: "default"    # TENANT_ID
  project: "default"   # PROJECT_ID

# ---------------------------------------------------------------------------
# Authentication
# auth.type controls request routing / deployment shape.
# auth.idp controls backend AUTH_PROVIDER and must be "simple", "cognito", or
# "session". Use "session" only when a bundle/front shell validates external
# identity and issues platform-recognized bundle session cookies.
# If auth.idp is omitted, older descriptors still fall back from auth.type:
# simple -> simple; bundle -> session; cognito/delegated -> cognito.
# ---------------------------------------------------------------------------
auth:
  type: "simple"  # deployment mode: simple | cognito | delegated | bundle
  idp: "simple"   # backend AUTH_PROVIDER: simple | cognito | session

  # Token / cookie header names (new)
  id_token_header_name: "X-ID-Token"         # ID_TOKEN_HEADER_NAME
  auth_token_cookie_name: "__Secure-LATC"    # AUTH_TOKEN_COOKIE_NAME
  id_token_cookie_name: "__Secure-LITC"      # ID_TOKEN_COOKIE_NAME
  masqueraded_token_cookie_name: "__Secure-LMTC" # MASQUERADED_TOKEN_COOKIE_NAME
  jwks_cache_ttl_seconds: 86400              # JWKS_CACHE_TTL_SECONDS
  turnstile_development_token: ""            # optional local/dev frontend Turnstile bypass token; leave empty outside development

  # OIDC service account credentials → secrets.yaml: auth.oidc.{admin_email,admin_username,admin_password}

  # Cognito — fill in when auth.idp = "cognito"
  cognito:
    region: eu-west-1                 # COGNITO_REGION
    user_pool_id: eu-west-1_XXXXXXXXX # COGNITO_USER_POOL_ID
    app_client_id: ""                 # COGNITO_APP_CLIENT_ID
    service_client_id: ""             # COGNITO_SERVICE_CLIENT_ID

  proxy_login:
    redis_key_prefix: "proxylogin:<TENANT>:<PROJECT>:"
    token_masquerade: true
    enforce_mfa: false                    # COGNITO_ENFORCEMFA
    password_reset:
      company: "KDCube"
      sender: "info@example.com"
      template_name: "KDCubeNewUserWelcomeTemplate"
      redirect_url: "http://YOUR_DOMAIN/platform/reset-password?user=%[1]s"
    http_urlbase: "http://YOUR_DOMAIN/auth"

proxy:
  ssl: false
  route_prefix: "/platform"
  frame_embedding:
    mode: "standalone"
    allowed_origins: []

# ---------------------------------------------------------------------------
# Service ports
# ports.ingress → CHAT_APP_PORT; ports.proc → CHAT_PROCESSOR_PORT
# ---------------------------------------------------------------------------
ports:
  ingress: "8010"  # CHAT_APP_PORT
  proc: "8020"     # CHAT_PROCESSOR_PORT
  metrics: "8090"
  ui: "5174"        # local/default public HTTP proxy port unless ports.proxy_http overrides it
  ui_ssl: "443"     # legacy/default public HTTPS proxy port unless ports.proxy_https overrides it
  # proxy_http: "80"   # optional explicit public HTTP proxy port
  # proxy_https: "443" # optional explicit public HTTPS proxy port

# ---------------------------------------------------------------------------
# Infrastructure — Postgres and Redis
# Passwords live in secrets.yaml (infra.postgres.password / infra.redis.password)
# ---------------------------------------------------------------------------
infra:
  postgres:
    host: "postgres-db"  # POSTGRES_HOST
    port: "5432"         # POSTGRES_PORT
    user: "postgres"     # POSTGRES_USER
    database: "kdcube"   # POSTGRES_DATABASE
    password: "postgres" # POSTGRES_PASSWORD → also in secrets.yaml: infra.postgres.password
    postgres_ssl: false  # POSTGRES_SSL (new)
    # postgres_ssl_mode: "require"  # POSTGRES_SSL_MODE (new, optional)
    # postgres_ssl_root_cert: ""    # POSTGRES_SSL_ROOT_CERT (new, optional)
  redis:
    host: "redis"        # REDIS_HOST
    port: "6379"         # REDIS_PORT
    topology: "standalone" # REDIS_TOPOLOGY
    password: "redispass" # REDIS_PASSWORD → also in secrets.yaml: infra.redis.password

# ---------------------------------------------------------------------------
# Storage
# Runtime storage URIs. In CLI seed descriptors, null or omitted means the CLI
# creates tenant/project-scoped local defaults under:
#   ~/.kdcube/kdcube-runtime/<tenant>__<project>/data/{kdcube-storage,bundle-storage}
# During init, those local defaults are mounted into the compose runtime as
# /kdcube-storage and /bundle-storage. Explicit file:///host/path values select
# a custom local host path; explicit s3://... values are preserved as remote
# storage URIs.
# ---------------------------------------------------------------------------
storage:
  kdcube: null            # KDCUBE_STORAGE_PATH; null/omitted => CLI tenant/project local default
  bundles: null           # CB_BUNDLE_STORAGE_URL; null/omitted => CLI tenant/project local default
  workspace:
    type: local           # REACT_WORKSPACE_IMPLEMENTATION: local | git
    repo: ""              # REACT_WORKSPACE_GIT_REPO; used only when type=git
  claude_code_session:
    type: local           # CLAUDE_CODE_SESSION_STORE_IMPLEMENTATION: local | git
    repo: ""              # CLAUDE_CODE_SESSION_GIT_REPO; used only when type=git

# ---------------------------------------------------------------------------
# AWS
# ---------------------------------------------------------------------------
aws:
  aws_region: "eu-west-1"                          # AWS_REGION
  # aws_profile: ""                                # AWS_PROFILE (optional)
  aws_sdk_load_config: true                        # AWS_SDK_LOAD_CONFIG; make boto3 read ~/.aws/config when present
  aws_ec2_metadata_disabled: false                 # AWS_EC2_METADATA_DISABLED
  no_proxy: "169.254.169.254,localhost,127.0.0.1"  # NO_PROXY

# ---------------------------------------------------------------------------
# Models
# ---------------------------------------------------------------------------
models:
  default_llm_model_id: "claude-sonnet-4-6"                   # DEFAULT_LLM_MODEL_ID
  default_embedding_model_id: "openai-text-embedding-3-small"  # DEFAULT_EMBEDDING_MODEL_ID

# ---------------------------------------------------------------------------
# AI feature flags
# ---------------------------------------------------------------------------
ai:
  react:
    react_agent_version: "v2"       # AI_REACT_AGENT_VERSION: v2 | v3
    react_agent_multiaction: "off"  # AI_REACT_AGENT_MULTI_ACTION: on | off
    max_iterations: 15              # AI_REACT_MAX_ITERATIONS: base ReAct decision/tool-use round cap; bundle config react.max_iterations overrides
    context_max_tokens: 80000       # AI_REACT_CONTEXT_MAX_TOKENS: hard model-input budget before compaction
    read_visible_max_text_symbols: 48000 # AI_REACT_READ_VISIBLE_MAX_TEXT_SYMBOLS: max visible text characters per react.read text path
    read_visible_max_tokens: 12000  # AI_REACT_READ_VISIBLE_MAX_TOKENS: max visible tokens per react.read path
    read_visible_max_bytes: 10485760 # AI_REACT_READ_VISIBLE_MAX_BYTES: max raw bytes per react.read payload
    read_visible_context_fraction: 0.15 # AI_REACT_READ_VISIBLE_CONTEXT_FRACTION: read cap as fraction of context budget
    knowledge_read_visible_max_text_symbols: null # AI_REACT_KNOWLEDGE_READ_VISIBLE_MAX_TEXT_SYMBOLS: optional cap for ks: article text; null means uncapped
    knowledge_read_visible_max_tokens: null # AI_REACT_KNOWLEDGE_READ_VISIBLE_MAX_TOKENS: optional token guard for ks: article text; null means uncapped
    knowledge_read_visible_max_bytes: null # AI_REACT_KNOWLEDGE_READ_VISIBLE_MAX_BYTES: optional raw byte guard for ks: payloads; null means uncapped
    exec_text_preview_max_symbols: 8000 # AI_REACT_EXEC_TEXT_PREVIEW_MAX_SYMBOLS: text preview cap for exec-produced files
    tool_result_preview_max_text_symbols: 12000 # AI_REACT_TOOL_RESULT_PREVIEW_MAX_TEXT_SYMBOLS: model-visible preview cap for large tool results
    line_numbers_mode: "lines"      # AI_REACT_LINE_NUMBERS_MODE: disabled | lines | sparsed
    cache_keep_recent_turns: 6      # AI_REACT_CACHE_KEEP_RECENT_TURNS: recent turns kept visible after TTL pruning
    cache_keep_recent_intact_turns: 1  # AI_REACT_CACHE_KEEP_RECENT_INTACT_TURNS: newest turns kept untrimmed
    working_summary_enabled: true   # AI_REACT_WORKING_SUMMARY_ENABLED: emit/embed channel:summary as conv.working.summary timeline events
    pruned_turn_summary_mode: "working_summary"  # AI_REACT_PRUNED_TURN_SUMMARY_MODE: collapse pruned old turns to conv.working.summary when available
    render_thinking: true           # AI_REACT_RENDER_THINKING: render live model thinking blocks; bundle config react.render_thinking overrides
    event_source_pipeline_enabled: false # AI_REACT_EVENT_SOURCE_PIPELINE_ENABLED: alternate event-source policy pipeline; keep false until explicitly testing
    debug_timeline: false           # AI_REACT_DEBUG_TIMELINE: write rendered model-context snapshots to REACT_DEBUG_ROOT; keep false unless diagnosing prompt/timeline issues
    # Browser-tool sessions are scoped to the current turn and cleaned by workflow/processor finalizers.
    # Idle janitor settings are backend constants today, not assembly-backed operator settings.

# ---------------------------------------------------------------------------
# Services (LLM provider config, non-secret)
# Leaf keys match env var names (lowercase).
# ---------------------------------------------------------------------------
services:
  llm:
    gemini:
      gemini_cache_enabled: false     # GEMINI_CACHE_ENABLED
      gemini_cache_ttl_seconds: 3600  # GEMINI_CACHE_TTL_SECONDS

# ---------------------------------------------------------------------------
# CORS — parsed as a block into CorsConfig (maps to CORS_CONFIG env var).
# Keys match CorsConfig field names.
# ---------------------------------------------------------------------------
cors:
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://localhost:4000"
    - "http://localhost:5173"
    - "http://localhost:5174"
    - "http://localhost:5175"
    - "http://localhost:8050"
  allow_credentials: true
  allow_methods: "*"
  allow_headers: "*"

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------
notifications:
  email:
    enabled: true          # EMAIL_ENABLED
    host: ""               # EMAIL_HOST
    port: "587"            # EMAIL_PORT
    user: ""               # EMAIL_USER
    from: ""               # EMAIL_FROM
    to: "ops@example.com"  # EMAIL_TO
    use_tls: true          # EMAIL_USE_TLS
    # email_password → secrets.yaml: services.email.password

# ---------------------------------------------------------------------------
# Scheduled routines
# ---------------------------------------------------------------------------
routines:

  economics:
    subscription_rollover_enabled: true          # SUBSCRIPTION_ROLLOVER_ENABLED
    subscription_rollover_cron: "15 * * * *"     # SUBSCRIPTION_ROLLOVER_CRON
    subscription_rollover_lock_ttl_seconds: 900  # SUBSCRIPTION_ROLLOVER_LOCK_TTL_SECONDS
    subscription_rollover_sweep_limit: 500       # SUBSCRIPTION_ROLLOVER_SWEEP_LIMIT

  stripe:
    reconcile_enabled: true          # STRIPE_RECONCILE_ENABLED
    reconcile_cron: "45 * * * *"     # STRIPE_RECONCILE_CRON
    reconcile_lock_ttl_seconds: 900  # STRIPE_RECONCILE_LOCK_TTL_SECONDS

  opex:
    agg_cron: "0 3 * * *"  # OPEX_AGG_CRON

# ---------------------------------------------------------------------------
# Secrets provider
# ---------------------------------------------------------------------------
secrets:
  provider: "secrets-file"  # SECRETS_PROVIDER: secrets-service | aws-sm | in-memory | secrets-file

# ---------------------------------------------------------------------------
# Host paths (deployment topology hints promoted into managed settings)
# These are host mount-source paths for local/compose deployments. Null or
# omitted means the CLI picks tenant/project workdir defaults under:
#   ~/.kdcube/kdcube-runtime/<tenant>__<project>/data/
# They are not always the runtime paths read by proc. Runtime paths live under
# platform.services.* below.
# ---------------------------------------------------------------------------
paths:
  host_kdcube_storage_path: null                                         # HOST_KDCUBE_STORAGE_PATH; null/omitted => <workdir>/data/kdcube-storage; mounted into /kdcube-storage
  host_bundles_path: null                                                # HOST_BUNDLES_PATH; null/omitted => <workdir>/data/bundles; host folder mounted into /bundles
  host_managed_bundles_path: null                                        # HOST_MANAGED_BUNDLES_PATH; null/omitted => <workdir>/data/managed-bundles; mounted into /managed-bundles
  host_git_ssh_key_path: ""                                              # HOST_GIT_SSH_KEY_PATH; optional host SSH private key mounted to platform.applications.bundles.git.git_ssh_key_path
  host_git_ssh_known_hosts_path: ""                                      # HOST_GIT_KNOWN_HOSTS_PATH; optional host known_hosts mounted to platform.applications.bundles.git.git_ssh_known_hosts
  host_bundle_storage_path: null                                         # HOST_BUNDLE_STORAGE_PATH; null/omitted => <workdir>/data/bundle-storage; mounted into /bundle-storage
  host_exec_workspace_path: null                                         # HOST_EXEC_WORKSPACE_PATH; null/omitted => <workdir>/data/exec-workspace; mounted into /exec-workspace
  host_react_debug_path: null                                            # HOST_REACT_DEBUG_PATH; null/omitted => <workdir>/data/react-debug; mounted into /react-debug

# ---------------------------------------------------------------------------
# Frontend runtime config
# frontend.config is public browser config. It is used by the installer when
# writing static frontend config and by ingress when serving
# GET /api/cp-frontend-config. Keep secrets out of this section.
#
# If frontend.config.auth is omitted, the frontend authType is derived from
# top-level auth as follows:
#   auth.type="simple" or auth.idp="simple"       -> authType "simple"
#   auth.type="cognito" or auth.idp="cognito"     -> authType "cognito"
#   auth.type="delegated"                         -> authType "delegated"
#   auth.type="bundle" or auth.idp="session"      -> authType "bundle"
#
# Keep top-level auth and frontend auth aligned:
#   - auth.type controls the deployment/nginx shape: simple | cognito | delegated | bundle
#   - auth.idp controls backend identity validation: simple | cognito | session
#   - frontend.config.auth.authType controls the browser auth implementation
#     and overrides the derived value when set explicitly.
#
# Frontend authType values:
#   - "simple": simple/dev frontend auth. Uses a public test token and must
#     only be used with auth.idp="simple" or controlled local/dev deployments.
#     The old value "hardcoded" is accepted by clients as a legacy alias only.
#   - "cognito": OSS Cognito frontend auth. OIDC authority/client_id are derived
#     from auth.cognito.* unless explicitly overridden under oidcConfig.
#   - "delegated": custom delegated frontend auth via proxy-login. Backend idp
#     is still usually "cognito"; browser talks to auth.apiBase.
#   - "bundle": external bundle/front-shell login. The browser already carries
#     descriptor-configured platform cookies and the platform validates them
#     with auth.idp="session".
#   - "none": no browser login handler and no platform login flow.
#
# Minimal examples are shown below; normally set only the block matching
# top-level auth.type/auth.idp.
# ---------------------------------------------------------------------------
frontend:
 config:
   auth:
     authType: "simple"
     token: "test-admin-token-123"
   # auth:
   #   authType: "cognito"
   #   idTokenHeaderName: "X-ID-Token"
   #   oidcConfig:
   #     authority: "https://cognito-idp.eu-west-1.amazonaws.com/eu-west-1_XXXXXXXXX"
   #     client_id: "<app_client_id>"
   # auth:
   #   authType: "delegated"
   #   totpAppName: "Example App"
   #   totpIssuer: "Example App"
   #   apiBase: "/auth/"
   # auth:
   #   authType: "bundle"
   routesPrefix: "/platform"
   debug:
     injectDebugCommands: false
     animateStreaming: true

# ---------------------------------------------------------------------------
# Platform metadata
# ---------------------------------------------------------------------------
platform:
  repo: "git@github.com:kdcube/kdcube-ai-app.git"
  ref: "2026.4.12.500"
  config:
    version: "2026.4.12.500"

  # -------------------------------------------------------------------------
  # Component-scoped settings.
  # Each component (ingress / proc) only reads its own section.
  # Leaf keys match env var names (lowercase).
  # -------------------------------------------------------------------------
  services:
    ingress:
      log:
        log_level: "INFO"            # LOG_LEVEL
        log_max_mb: 20               # LOG_MAX_MB
        log_backup_count: 10         # LOG_BACKUP_COUNT
        log_dir: ""                  # LOG_DIR; absolute path; leave empty to use default
        log_file_prefix: "chat-ingress"  # LOG_FILE_PREFIX

      service:
        uvicorn_reload: false                      # UVICORN_RELOAD
        heartbeat_interval: 5                      # HEARTBEAT_INTERVAL
        cb_relay_identity: "kdcube.relay.chatbot"  # CB_RELAY_IDENTITY

      av:
        app_av_scan: true         # APP_AV_SCAN
        app_av_timeout_s: 3.0     # APP_AV_TIMEOUT_S
        clamav_host: "localhost"  # CLAMAV_HOST
        clamav_port: 3310         # CLAMAV_PORT

      idp:
        idp_db_path: ""                            # IDP_DB_PATH; absolute path to idp_users.json; leave empty to use default location
        idp_import_enabled: false                  # IDP_IMPORT_ENABLED
        idp_import_run_at: "2026-02-22T07:00:00Z"  # IDP_IMPORT_RUN_AT; ISO timestamp; UTC assumed when no tz
        idp_import_script_path: ""                 # IDP_IMPORT_SCRIPT_PATH; absolute path to import_users.py

      monitoring:
        monitoring_burst_enable: true  # MONITORING_BURST_ENABLE

    proc:
      log:
        log_level: "INFO"          # LOG_LEVEL
        log_max_mb: 20             # LOG_MAX_MB
        log_backup_count: 10       # LOG_BACKUP_COUNT
        log_dir: ""                # LOG_DIR; absolute path; leave empty to use default
        log_file_prefix: "chat-proc"  # LOG_FILE_PREFIX

      service:
        uvicorn_reload: false                      # UVICORN_RELOAD
        heartbeat_interval: 5                      # HEARTBEAT_INTERVAL
        cb_relay_identity: "kdcube.relay.chatbot"  # CB_RELAY_IDENTITY
        chat_scheduler_backend: "legacy_lists"     # CHAT_SCHEDULER_BACKEND: legacy_lists | kafka
        chat_task_timeout_sec: 600                 # CHAT_TASK_TIMEOUT_SEC
        chat_task_idle_timeout_sec: 600            # CHAT_TASK_IDLE_TIMEOUT_SEC
        chat_task_max_wall_time_sec: 2400          # CHAT_TASK_MAX_WALL_TIME_SEC
        chat_task_watchdog_poll_interval_sec: 1.0  # CHAT_TASK_WATCHDOG_POLL_INTERVAL_SEC
        # Watchdog cancellation still runs per-turn cleanup hooks before dropping task state.

      exec:
        exec_workspace_root: ""                # EXEC_WORKSPACE_ROOT; proc runtime path. CLI compose normally uses /exec-workspace; direct host-run descriptors should use an absolute host path.
        py_code_exec_image: "py-code-exec:latest"  # PY_CODE_EXEC_IMAGE
        py_code_exec_timeout: 600              # PY_CODE_EXEC_TIMEOUT
        py_code_exec_network_mode: "host"      # PY_CODE_EXEC_NETWORK_MODE
        py_code_exec_container_strategy: "split"  # PY_CODE_EXEC_CONTAINER_STRATEGY: combined | split
        max_file_bytes: "100m"                 # Max single file the ISO runtime may create per exec call; "0"/"unlimited" disables
        max_exec_workspace_delta_bytes: "250m" # Max net-new monitored writable bytes the ISO runtime may create per exec call
        max_workspace_bytes: ""                # Optional max total bytes in the active workspace before finalization/offload
        workspace_monitor_interval_s: 0.5      # ISO runtime workspace quota polling interval

      react_debug:
        debug_root: ""                         # REACT_DEBUG_ROOT; proc runtime path for timeline render debug dumps. CLI/ECS normally use /react-debug.
        keep_files: 100                        # REACT_DEBUG_KEEP_FILES; rolling retention for rendered-*.txt files

      tools:
        web_search:
          tools_web_search_fetch_content: true     # TOOLS_WEB_SEARCH_FETCH_CONTENT
          web_search_agentic_thinking_budget: 200  # WEB_SEARCH_AGENTIC_THINKING_BUDGET
          web_search_primary_backend: "brave"      # WEB_SEARCH_PRIMARY_BACKEND
          web_search_backend: "hybrid"             # WEB_SEARCH_BACKEND: duckduckgo | brave | hybrid
          web_search_hybrid_mode: "sequential"     # WEB_SEARCH_HYBRID_MODE: sequential | parallel
          web_search_segmenter: "fast"             # WEB_SEARCH_SEGMENTER
          web_favicon_enrich_enabled: true          # WEB_FAVICON_ENRICH_ENABLED; set false to skip favicon enrichment
          web_favicon_enrich_timeout_s: 3           # WEB_FAVICON_ENRICH_TIMEOUT_S; favicon enrichment budget, partial successes are kept
          web_favicon_failure_cache_ttl_s: 300      # WEB_FAVICON_FAILURE_CACHE_TTL_S; short domain-level negative cache TTL
          web_favicon_browser_fallback_enabled: true # WEB_FAVICON_BROWSER_FALLBACK_ENABLED; bounded browser fallback after HTTP/icon probes fail
          web_favicon_browser_fallback_timeout_s: 2  # WEB_FAVICON_BROWSER_FALLBACK_TIMEOUT_S; total browser fallback budget
        web_fetch:
          web_fetch_resources_medium: ""  # WEB_FETCH_RESOURCES_MEDIUM; JSON: {"cookies": {"uid": "...", "sid": "..."}}
        mcp_cache_ttl_seconds: 36000      # MCP_CACHE_TTL_SECONDS
        accounting_services: '{"web_search": {"brave": {"tier": "free"}, "duckduckgo": {"tier": "free"}}}'  # ACCOUNTING_SERVICES

      bundles:
        bundles_root: "/bundles"                      # BUNDLES_ROOT; proc runtime path for non-managed local bundles. CLI compose mounts paths.host_bundles_path here.
        managed_bundles_root: "/managed-bundles"      # MANAGED_BUNDLES_ROOT; proc runtime path for platform-managed git/example bundles. Direct host-run should also set paths.host_managed_bundles_path or HOST_MANAGED_BUNDLES_PATH.
        bundle_storage_root: ""                       # BUNDLE_STORAGE_ROOT; proc runtime path for bundle-owned storage/UI/cache. CLI compose normally uses /bundle-storage; direct host-run descriptors should use file:///host/path.
        bundles_include_examples: true                # BUNDLES_INCLUDE_EXAMPLES
        bundle_cleanup_enabled: true                  # BUNDLE_CLEANUP_ENABLED
        bundle_cleanup_interval_seconds: 3600         # BUNDLE_CLEANUP_INTERVAL_SECONDS
        bundle_cleanup_lock_ttl_seconds: 900          # BUNDLE_CLEANUP_LOCK_TTL_SECONDS
        bundle_ref_ttl_seconds: 3600                  # BUNDLE_REF_TTL_SECONDS
        bundles_force_env_on_startup: true            # BUNDLES_FORCE_ENV_ON_STARTUP
        bundles_force_env_lock_ttl_seconds: 60        # BUNDLES_FORCE_ENV_LOCK_TTL_SECONDS
        bundles_preload_on_start: true                # BUNDLES_PRELOAD_ON_START
        bundles_preload_lock_ttl_seconds: 900         # BUNDLES_PRELOAD_LOCK_TTL_SECONDS
        bundles_preload_bundle_lock_ttl_seconds: 300  # BUNDLES_PRELOAD_BUNDLE_LOCK_TTL_SECONDS
        bundle_scheduler_reconcile_interval_seconds: 0   # BUNDLE_SCHEDULER_RECONCILE_INTERVAL_SECONDS; 0 disables periodic scheduler catch-up
        git:
          bundle_git_resolution_enabled: true         # BUNDLE_GIT_RESOLUTION_ENABLED
          bundle_git_atomic: true                     # BUNDLE_GIT_ATOMIC
          bundle_git_always_pull: false               # BUNDLE_GIT_ALWAYS_PULL
          bundle_git_redis_lock: true                 # BUNDLE_GIT_REDIS_LOCK
          bundle_git_redis_lock_ttl_seconds: 300      # BUNDLE_GIT_REDIS_LOCK_TTL_SECONDS
          bundle_git_redis_lock_wait_seconds: 60      # BUNDLE_GIT_REDIS_LOCK_WAIT_SECONDS
          bundle_git_prefetch_enabled: true           # BUNDLE_GIT_PREFETCH_ENABLED
          bundle_git_prefetch_interval_seconds: 15    # BUNDLE_GIT_PREFETCH_INTERVAL_SECONDS
          bundle_git_fail_backoff_seconds: 60         # BUNDLE_GIT_FAIL_BACKOFF_SECONDS
          bundle_git_fail_max_backoff_seconds: 300    # BUNDLE_GIT_FAIL_MAX_BACKOFF_SECONDS
          bundle_git_keep: 3                          # BUNDLE_GIT_KEEP
          bundle_git_ttl_hours: 0                     # BUNDLE_GIT_TTL_HOURS
          git_ssh_key_path: ""                        # GIT_SSH_KEY_PATH; absolute path to SSH private key
          git_ssh_known_hosts: ""                     # GIT_SSH_KNOWN_HOSTS; absolute path to known_hosts file
          git_ssh_strict_host_key_checking: "yes"     # GIT_SSH_STRICT_HOST_KEY_CHECKING

    metrics:
      log:
        log_level: "INFO"         # LOG_LEVEL
        log_max_mb: 20            # LOG_MAX_MB
        log_backup_count: 10      # LOG_BACKUP_COUNT
        log_dir: ""               # LOG_DIR; absolute path; leave empty to use default
        log_file_prefix: "metrics"  # LOG_FILE_PREFIX

      service:
        metrics_mode: "redis"              # METRICS_MODE: redis | proxy
        metrics_request_timeout_sec: 5.0   # METRICS_REQUEST_TIMEOUT_SEC
        metrics_enable_pg_pool: false      # METRICS_ENABLE_PG_POOL

      proxy:
        metrics_ingress_base_url: ""       # METRICS_INGRESS_BASE_URL; required in proxy mode
        metrics_proc_base_url: ""          # METRICS_PROC_BASE_URL; required in proxy mode
        metrics_auth_header_name: ""       # METRICS_AUTH_HEADER_NAME
        metrics_auth_header_value: ""      # METRICS_AUTH_HEADER_VALUE
        metrics_headers_json: ""           # METRICS_HEADERS_JSON

      export:
        scheduler_enabled: false           # METRICS_SCHEDULER_ENABLED
        export_interval_sec: 30            # METRICS_EXPORT_INTERVAL_SEC
        export_on_start: true              # METRICS_EXPORT_ON_START
        run_once: false                    # METRICS_RUN_ONCE
        mapping_json: ""                   # METRICS_MAPPING_JSON

        cloudwatch:
          enabled: false                   # METRICS_EXPORT_CLOUDWATCH
          namespace: "KDCube/Metrics"      # METRICS_CLOUDWATCH_NAMESPACE
          region: ""                       # METRICS_CLOUDWATCH_REGION
          dimensions_json: ""              # METRICS_CLOUDWATCH_DIMENSIONS_JSON

        prometheus:
          push_enabled: false              # METRICS_EXPORT_PROMETHEUS_PUSH
          pushgateway_url: ""              # METRICS_PROM_PUSHGATEWAY_URL
          job_name: "kdcube_metrics"       # METRICS_PROM_JOB_NAME
          grouping_labels_json: ""         # METRICS_PROM_GROUPING_LABELS_JSON
          scrape_ttl_sec: 10               # METRICS_PROM_SCRAPE_TTL_SEC

# ---------------------------------------------------------------------------
# Event recording configuration (platform-level defaults).
# Per-bundle overrides go in bundles.yaml -> items[].config.events.
# A bundle-level events section fully replaces what is set here.
# Both `telemetry` and `persist` sections are overridable per bundle.
events:
  record:
    telemetry:
      enabled: true
      selector:
        - "accounting.usage"
        - "chat.complete"
        - "chat.error"
        - "chat.conversation.accepted"
        - "chat.conversation.turn.completed"
        - "react.tool.call"
        - "react.skill.read"
        - "queue.continuation.accepted"
        - "timeline.external.accepted"
        - "kdcube.copilot.workflow.turn.started"
        - "kdcube.copilot.workflow.turn.completed"
        - "kdcube.copilot.workflow.turn.failed"
        - "kdcube.copilot.mcp.call"
        - "chat.turn.summary"
    persist:
      # Types captured here must be emitted through the bundle entrypoint comm
      # (BaseEntrypoint.self.comm). Types emitted by the processor comm are not
      # accessible — notably chat.complete, which is emitted by processor.py
      # AFTER the bundle handler returns, past the point where the artifact is
      # persisted. Including such types in the selector is harmless (they will
      # simply not be found in the recording buffer), but they will never appear
      # in the saved artifact.
      enabled: true
      selector:
        - "accounting.usage"
        - "chat.turn.summary"
