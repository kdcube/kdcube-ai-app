        info_html: "<h3>Pin board</h3>\n<p>Keep things in quick reach — as <strong>pins</strong>, links to\nobjects from anywhere\
          \ in the system, and the assistant understands them.\nA pin is a proxy; the real object stays in its own app.</p>\n\
          <p><strong>Pinning isn't sending.</strong> To use a pin in chat, drag it\nin — one pin for that object, or the whole\
          \ board (or “Pin board to chat”)\nto share its top pins at once. From a pin you can also open it in its app\nor\
          \ download it.</p>\n<h4>What goes on it</h4>\n<ul>\n  <li><strong>Your text</strong> — notes or drafts (markdown).</li>\n\
          \  <li><strong>Attachments</strong> — files you drop in.</li>\n  <li><strong>Chat pins</strong> — conversations\
          \ and files from chat.</li>\n  <li><strong>Task pins</strong> — a task from the Tasks panel.</li>\n  <li><strong>Memory\
          \ pins</strong> — a saved memory from Memories.</li>\n</ul>\n<p>Pins connect things to actions: once shared, the\
