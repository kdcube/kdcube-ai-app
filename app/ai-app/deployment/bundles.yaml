# Default bundle descriptors for a fresh KDCube install (base complectation).
# Staged into the runtime config dir by the installer when the operator does
# not supply their own descriptor set; everything here remains editable via
# the AI Bundles dashboard afterwards (the file stays the authority).
#
# Contents: config overlays for the built-in service apps that ship in the
# image and are auto-discovered (no path/module entries needed):
#   connection-hub@1-0        identity, consent, delegated credentials, OAuth
#   kdcube-services@1-0       managed MCP surfaces + named-services bridge
#   user-memories@2026-06-26  the mem provider + memories widget
#   workspace@2026-03-31-13-36  showcase scene + chat wired to everything
#
# Placeholders:
#   <TENANT>, <PROJECT>       substituted by the installer at init
#   <PUBLIC_HOST>             substituted from KDCUBE_PUBLIC_HOST when set,
#                             otherwise left for the operator (OAuth redirect
#                             URIs and webhooks need the real public host)
#   <VI_BUILD_DEST_ABSOLUTE_PATH>  resolved at widget-build time by the
#                             runtime — leave verbatim
# Matching secrets skeleton: bundles.secrets.yaml (same directory).
bundles:
  version: '1'
  default_bundle_id: workspace@2026-03-31-13-36
  items:
  - id: connection-hub@1-0
    name: Connection Hub
    singleton: false
    config:
      connections:
        oauth:
          public_base_url: https://<PUBLIC_HOST>
        delegated_credentials:
          oauth:
            enabled: true
            brand: KDCube
            issuer: ''
            public_clients:
            - client_id: claude
              redirect_uris:
              - https://claude.ai/api/mcp/auth_callback
              - http://localhost/callback
              - http://127.0.0.1/callback
            dynamic_client_registration:
              allowed_redirect_uris:
              - https://claude.ai/api/mcp/auth_callback
              - http://localhost/callback
              - http://127.0.0.1/callback
            capabilities:
            - grant: kdcube:role:super-admin
              label: Use all platform and application APIs
              description: Admin-only delegated automation access to every authenticated KDCube platform and application API.
              delegable_roles:
              - kdcube:role:super-admin
              delegable_permissions:
              - kdcube:role:super-admin
            - grant: conversations:read
              label: Read your conversations
              description: Read the approving user's own KDCube conversations through delegated named-service tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - kdcube:*:conversations:*;read
            - grant: conversations:read:any_user
              label: Read any user's conversations
              description: Admin read of a selected user's conversations through the conv named service.
              delegable_roles:
              - kdcube:role:super-admin
              delegable_permissions:
              - kdcube:*:conversations:*;read:any_user
            - grant: memories:read
              label: Read KDCube memories
              description: Read the user's KDCube memory notes through delegated MCP tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - memories:read
            - grant: memories:write
              label: Write KDCube memories
              description: Create or update the user's KDCube memory notes through delegated named-service tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - memories:write
            - grant: tasks:read
              label: Read KDCube tasks
              description: Read task objects through delegated named-service tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - tasks:read
            - grant: tasks:write
              label: Write KDCube tasks
              description: Create or update task objects through delegated named-service tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - tasks:write
            - grant: canvas:read
              label: Read KDCube canvas
              description: Read canvas objects through delegated named-service tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - canvas:read
            - grant: canvas:write
              label: Write KDCube canvas
              description: Create or update canvas objects through delegated named-service tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - canvas:write
            - grant: knowledge:read
              label: Read KDCube knowledge
              description: Read KDCube knowledge notes through delegated MCP tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - knowledge:read
            - grant: named_services:use
              label: Use KDCube named services
              description: Discover and call configured KDCube named-service namespaces through delegated MCP tools.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - named_services:use
            - grant: mail:read
              label: Read connected mail
              description: Search and read messages and attachments from mail accounts connected to KDCube.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - mail:read
            - grant: mail:send
              label: Send connected mail
              description: Send or forward messages through mail accounts connected to KDCube.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - mail:send
            - grant: slack:read
              label: Read connected Slack
              description: List channels, search messages/files, read channel history, and download files through Slack accounts
                connected to KDCube.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - slack:read
            - grant: slack:write
              label: Write connected Slack
              description: Post messages and upload files through Slack accounts connected to KDCube.
              delegable_roles:
              - kdcube:role:chat-user
              - kdcube:role:paid
              - kdcube:role:privileged
              - kdcube:role:super-admin
              delegable_permissions:
              - slack:write
            resources:
            - resource: '*'
              label: All platform and application APIs
              description: Admin-only delegated automation scope for every authenticated KDCube platform and application API.
              admin_only: true
              grants:
              - kdcube:role:super-admin
            - resource: '*/api/integrations/bundles/*/*/kdcube-services@1-0/public/mcp/conversations*'
              label: KDCube conversations MCP
              tools:
                conversations_export:
                  label: Export conversations
                  description: Read conversation transcripts for feedback triage.
                  grants:
                  - conversations:read
            - resource: '*/api/integrations/bundles/*/*/kdcube-services@1-0/public/mcp/named_services*'
              label: KDCube named services MCP
              tools:
                named_services_list:
                  label: List named services
                  description: List configured named-service namespaces and operation grants.
                  grants:
                  - named_services:use
                named_services_about:
                  label: Named service about
                  description: Read a provider about payload for a configured namespace.
                  grants:
                  - named_services:use
                named_services_capabilities:
                  label: Named service capabilities
                  description: Read provider capabilities for a configured namespace.
                  grants:
                  - named_services:use
                named_services_schema:
                  label: Named service schema
                  description: Read an object schema for a configured namespace.
                  grants:
                  - named_services:use
                named_services_search:
                  label: Named service search
                  description: Search objects in a configured namespace.
                  grants:
                  - named_services:use
                named_services_get:
                  label: Named service get
                  description: Read one object from a configured namespace.
                  grants:
                  - named_services:use
                named_services_upsert:
                  label: Named service upsert
                  description: Create or update one object in a configured namespace.
                  grants:
                  - named_services:use
                named_services_host_file:
                  label: Named service host file
                  description: Host or register a file/ref in a configured namespace.
                  grants:
                  - named_services:use
                named_services_action:
                  label: Named service action
                  description: Run a bounded provider action on one object.
                  grants:
                  - named_services:use
                named_services_delete:
                  label: Named service delete
                  description: Delete or archive one object in a configured namespace.
                  grants:
                  - named_services:use
                named_services_call:
                  label: Named service call
                  description: Run a generic call against a configured namespace.
                  grants:
                  - named_services:use
              named_services:
                namespaces:
                  mem:
                    label: User memories
                    description: KDCube memory notes for the approving user.
                    authority_id: delegated_client
                    tools:
                      about:
                        operation: provider.about
                        label: About memories
                        description: Explain the memory namespace and how to use it.
                        grants:
                        - memories:read
                      capabilities:
                        operation: provider.capabilities
                        label: Memory capabilities
                        description: Read provider capabilities for the memory namespace.
                        grants:
                        - memories:read
                      list:
                        operation: object.list
                        label: List memories
                        description: List memory notes visible to the delegated connection.
                        grants:
                        - memories:read
                      schema:
                        operation: object.schema
                        label: Memory schema
                        description: Read the object schema for memory notes.
                        grants:
                        - memories:read
                      search:
                        operation: object.search
                        label: Search memories
                        description: Search memory notes visible to the delegated connection.
                        grants:
                        - memories:read
                      get:
                        operation: object.get
                        label: Read one memory
                        description: Read one memory note by object ref.
                        grants:
                        - memories:read
                      upsert:
                        operation: object.upsert
                        label: Write memory
                        description: Create or update a memory note.
                        grants:
                        - memories:write
                      action:
                        operation: object.action
                        label: Memory action
                        description: Run a bounded provider action on a memory note.
                        grants:
                        - memories:read
                      delete:
                        operation: object.delete
                        label: Delete memory
                        description: Delete or archive a memory note.
                        grants:
                        - memories:write
                      call:
                        label: Generic memory call
                        description: Generic memory namespace call with per-operation grants.
                        operations:
                          provider.about:
                            label: About memories
                            description: Explain the memory namespace and how to use it.
                            grants:
                            - memories:read
                          provider.capabilities:
                            label: Memory capabilities
                            description: Read provider capabilities for the memory namespace.
                            grants:
                            - memories:read
                          object.list:
                            label: List memories
                            description: List memory notes visible to the delegated connection.
                            grants:
                            - memories:read
                          object.schema:
                            label: Memory schema
                            description: Read the object schema for memory notes.
                            grants:
                            - memories:read
                          object.search:
                            label: Search memories
                            description: Search memory notes visible to the delegated connection.
                            grants:
                            - memories:read
                          object.get:
                            label: Read one memory
                            description: Read one memory note by object ref.
                            grants:
                            - memories:read
                          object.upsert:
                            label: Write memory
                            description: Create or update a memory note.
                            grants:
                            - memories:write
                          object.action:
                            label: Memory action
                            description: Run a bounded provider action on a memory note.
                            grants:
                            - memories:read
                          object.delete:
                            label: Delete memory
                            description: Delete or archive a memory note.
                            grants:
                            - memories:write
                  task:
                    label: Tasks
                    description: KDCube task objects for the approving user.
                    authority_id: delegated_client
                    tools:
                      about:
                        operation: provider.about
                        label: About tasks
                        description: Explain the task namespace and how to use it.
                        grants:
                        - tasks:read
                      list:
                        operation: object.list
                        label: List tasks
                        description: List task objects visible to the delegated connection.
                        grants:
                        - tasks:read
                      schema:
                        operation: object.schema
                        label: Task schema
                        description: Read the object schema for tasks.
                        grants:
                        - tasks:read
                      search:
                        operation: object.search
                        label: Search tasks
                        description: Search task objects visible to the delegated connection.
                        grants:
                        - tasks:read
                      upsert:
                        operation: object.upsert
                        label: Write task
                        description: Create or update a task object.
                        grants:
                        - tasks:write
                      host_file:
                        operation: object.host_file
                        label: Host task file
                        description: Host or register a file/ref in the task namespace.
                        grants:
                        - tasks:write
                      delete:
                        operation: object.delete
                        label: Delete task
                        description: Delete or archive a task object.
                        grants:
                        - tasks:write
                      call:
                        label: Generic task call
                        description: Generic task namespace call with per-operation grants.
                        operations:
                          provider.about:
                            label: About tasks
                            description: Explain the task namespace and how to use it.
                            grants:
                            - tasks:read
                          object.list:
                            label: List tasks
                            description: List task objects visible to the delegated connection.
                            grants:
                            - tasks:read
                          object.schema:
                            label: Task schema
                            description: Read the object schema for tasks.
                            grants:
                            - tasks:read
                          object.search:
                            label: Search tasks
                            description: Search task objects visible to the delegated connection.
                            grants:
                            - tasks:read
                          object.upsert:
                            label: Write task
                            description: Create or update a task object.
                            grants:
                            - tasks:write
                          object.host_file:
                            label: Host task file
                            description: Host or register a file/ref in the task namespace.
                            grants:
                            - tasks:write
                          object.delete:
                            label: Delete task
                            description: Delete or archive a task object.
                            grants:
                            - tasks:write
                  cnv:
                    label: Canvas
                    description: KDCube canvas objects for the approving user.
                    authority_id: delegated_client
                    tools:
                      about:
                        operation: provider.about
                        label: About canvas
                        description: Explain the canvas namespace and how to use it.
                        grants:
                        - canvas:read
                      list:
                        operation: object.list
                        label: List canvas objects
                        description: List canvas objects visible to the delegated connection.
                        grants:
                        - canvas:read
                      schema:
                        operation: object.schema
                        label: Canvas schema
                        description: Read the object schema for canvas objects.
                        grants:
                        - canvas:read
                      search:
                        operation: object.search
                        label: Search canvas
                        description: Search canvas objects visible to the delegated connection.
                        grants:
                        - canvas:read
                      upsert:
                        operation: object.upsert
                        label: Write canvas
                        description: Create or update a canvas object.
                        grants:
                        - canvas:write
                      call:
                        label: Generic canvas call
                        description: Generic canvas namespace call with per-operation grants.
                        operations:
                          provider.about:
                            label: About canvas
                            description: Explain the canvas namespace and how to use it.
                            grants:
                            - canvas:read
                          object.list:
                            label: List canvas objects
                            description: List canvas objects visible to the delegated connection.
                            grants:
                            - canvas:read
                          object.schema:
                            label: Canvas schema
                            description: Read the object schema for canvas objects.
                            grants:
                            - canvas:read
                          object.search:
                            label: Search canvas
                            description: Search canvas objects visible to the delegated connection.
                            grants:
                            - canvas:read
                          object.upsert:
                            label: Write canvas
                            description: Create or update a canvas object.
                            grants:
                            - canvas:write
                  conv:
                    label: Conversations
                    description: KDCube conversations for the approving user.
                    authority_id: delegated_client
                    tools:
                      about:
                        operation: provider.about
                        label: About conversations
                        description: Explain the conversations namespace and how to use it.
                        grants:
                        - conversations:read
                      list:
                        operation: object.list
                        label: List conversations
                        description: List the delegated user's conversations.
                        grants:
                        - conversations:read
                      schema:
                        operation: object.schema
                        label: Conversation schema
                        description: Read the object schema for conversations.
                        grants:
                        - conversations:read
                      search:
                        operation: object.search
                        label: Search conversations
                        description: Search the delegated user's conversations.
                        grants:
                        - conversations:read
                      get:
                        operation: object.get
                        label: Read one conversation
                        description: Read one full conversation by ref.
                        grants:
                        - conversations:read
                      call:
                        label: Generic conversations call
                        description: Generic conversations namespace call with per-operation grants.
                        operations:
                          provider.about:
                            label: About conversations
                            description: Explain the conversations namespace and how to use it.
                            grants:
                            - conversations:read
                          object.list:
                            label: List conversations
                            description: List the delegated user's conversations.
                            grants:
                            - conversations:read
                          object.schema:
                            label: Conversation schema
                            description: Read the object schema for conversations.
                            grants:
                            - conversations:read
                          object.search:
                            label: Search conversations
                            description: Search the delegated user's conversations.
                            grants:
                            - conversations:read
                          object.get:
                            label: Read one conversation
                            description: Read one full conversation by ref.
                            grants:
                            - conversations:read
                  mail:
                    label: Mail
                    description: Search, read, download attachments from, send, and forward messages through connected mail
                      accounts.
                    authority_id: delegated_client
                    tools:
                      about:
                        operation: provider.about
                        label: About mail
                        description: Explain the mail namespace and connected-account model.
                        grants:
                        - mail:read
                      capabilities:
                        operation: provider.capabilities
                        label: Mail capabilities
                        description: Read provider capabilities for connected mail accounts.
                        grants:
                        - mail:read
                      list:
                        operation: object.list
                        label: List mail accounts
                        description: List connected mail accounts available to the delegated connection.
                        grants:
                        - mail:read
                      schema:
                        operation: object.schema
                        label: Mail schema
                        description: Read the mail object schema and ref format.
                        grants:
                        - mail:read
                      search:
                        operation: object.search
                        label: Search mail
                        description: Search messages in connected mail accounts.
                        grants:
                        - mail:read
                      get:
                        operation: object.get
                        label: Read mail message
                        description: Read one mail message and its attachment metadata by ref.
                        grants:
                        - mail:read
                      action:
                        operation: object.action
                        label: Mail action
                        description: Download attachments, send mail, or forward a message through a connected mail account.
                        operations:
                          object.action:
                            label: Mail action
                            description: Run a bounded mail action. download_attachments requires mail:read; send requires
                              mail:send; forward requires mail:read and mail:send.
                            grants:
                            - mail:read
                            - mail:send
                      call:
                        label: Generic mail call
                        description: Generic mail namespace call with per-operation grants.
                        operations:
                          provider.about:
                            label: About mail
                            description: Explain the mail namespace and connected-account model.
                            grants:
                            - mail:read
                          provider.capabilities:
                            label: Mail capabilities
                            description: Read provider capabilities for connected mail accounts.
                            grants:
                            - mail:read
                          object.list:
                            label: List mail accounts
                            description: List connected mail accounts available to the delegated connection.
                            grants:
                            - mail:read
                          object.schema:
                            label: Mail schema
                            description: Read the mail object schema and ref format.
                            grants:
                            - mail:read
                          object.search:
                            label: Search mail
                            description: Search messages in connected mail accounts.
                            grants:
                            - mail:read
                          object.get:
                            label: Read mail message
                            description: Read one mail message and its attachment metadata by ref.
                            grants:
                            - mail:read
                          object.action:
                            label: Mail action
                            description: Download attachments, send mail, or forward a message through a connected mail account.
                            grants:
                            - mail:read
                            - mail:send
                  slack:
                    label: Slack
                    description: List Slack workspaces/channels, search messages/files, read channel history, download files,
                      post messages, and upload files through connected Slack accounts.
                    authority_id: delegated_client
                    tools:
                      about:
                        operation: provider.about
                        label: About Slack
                        description: Explain the Slack namespace and connected-account model.
                        grants:
                        - slack:read
                      capabilities:
                        operation: provider.capabilities
                        label: Slack capabilities
                        description: Read provider capabilities for connected Slack workspaces.
                        grants:
                        - slack:read
                      list:
                        operation: object.list
                        label: List Slack
                        description: List connected Slack accounts, or channels when filters.kind is channels.
                        grants:
                        - slack:read
                      schema:
                        operation: object.schema
                        label: Slack schema
                        description: Read the Slack object schema and ref format.
                        grants:
                        - slack:read
                      search:
                        operation: object.search
                        label: Search Slack
                        description: Search Slack messages/files through connected Slack accounts.
                        grants:
                        - slack:read
                      get:
                        operation: object.get
                        label: Read Slack object
                        description: Read Slack account/channel/file objects by ref.
                        grants:
                        - slack:read
                      action:
                        operation: object.action
                        label: Slack action
                        description: Post messages, upload files, download files, or inspect Slack assistant search availability.
                        operations:
                          object.action:
                            label: Slack action
                            description: Run a bounded Slack action. post_message/upload_file require slack:write; download_file/assistant_search_info
                              require slack:read.
                            grants:
                            - slack:read
                            - slack:write
                      call:
                        label: Generic Slack call
                        description: Generic Slack namespace call with per-operation grants.
                        operations:
                          provider.about:
                            label: About Slack
                            description: Explain the Slack namespace and connected-account model.
                            grants:
                            - slack:read
                          provider.capabilities:
                            label: Slack capabilities
                            description: Read provider capabilities for connected Slack workspaces.
                            grants:
                            - slack:read
                          object.list:
                            label: List Slack
                            description: List connected Slack accounts or channels.
                            grants:
                            - slack:read
                          object.schema:
                            label: Slack schema
                            description: Read the Slack object schema and ref format.
                            grants:
                            - slack:read
                          object.search:
                            label: Search Slack
                            description: Search Slack messages/files through connected Slack accounts.
                            grants:
                            - slack:read
                          object.get:
                            label: Read Slack object
                            description: Read Slack account/channel/file objects by ref.
                            grants:
                            - slack:read
                          object.action:
                            label: Slack action
                            description: Post messages, upload files, download files, or inspect Slack assistant search availability.
                            grants:
                            - slack:read
                            - slack:write
            - resource: '*/api/integrations/bundles/*/*/user-memories@2026-06-26/public/mcp/memories*'
              identity_scope: grantor_identity_family
              tools:
                memory_search:
                  label: Search memories
                  description: Search memory notes visible to the connected user.
                  grants:
                  - memories:read
                memory_get:
                  label: Read one memory
                  description: Read a memory note by id.
                  grants:
                  - memories:read
            - resource: '*/api/integrations/bundles/*/*/knowledge@1-0/public/mcp/knowledge_managed*'
              label: KDCube knowledge MCP
              tools:
                get_access_context:
                  label: Get access context
