                  description: Search KDCube knowledge visible to this delegated connection.
                  grants:
                  - knowledge:read
                read_refs:
                  label: Read references
                  description: Read exact knowledge or source references returned by search.
                  grants:
                  - knowledge:read
        providers: {}
        delegated_to_kdcube:
          enabled: true
          oauth:
            public_base_url: https://<PUBLIC_HOST>
          providers:
            google:
              label: Google
              adapter: google.oauth
              enabled: true
              connector_apps:
                gmail:
                  label: Gmail
                  enabled: true
                  client_id: <FILL_ME>
                  client_secret_ref: connections.delegated_to_kdcube.providers.google.connector_apps.gmail.client_secret
                  allowed_claims:
                  - gmail:read
                  - gmail:send
              claims:
                gmail:read:
                  label: Read Gmail
                  description: Search and read Gmail messages for the approving user.
                  provider_scopes:
                  - openid
