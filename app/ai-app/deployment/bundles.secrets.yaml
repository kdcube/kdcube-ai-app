# Bundles secrets descriptor/export shape.
# Secret values may come from a provider at runtime, but the mounted
# /config/bundles.secrets.yaml file keeps the descriptor contract explicit.
bundles:
  version: "1"
  items:
    - id: "app@2-0"
      secrets:
        openai:
          api_key: null
        stripe:
          secret_key: null
    - id: "react"
      secrets:
        anthropic:
          api_key: null
        openai:
          api_key: null
        brave:
          api_key: null
