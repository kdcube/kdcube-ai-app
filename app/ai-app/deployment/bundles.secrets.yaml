# Default bundles secrets skeleton for a fresh KDCube install.
# Staged next to bundles.yaml by the installer; every slot the base
# complectation references is present with a <FILL_ME> placeholder and a
# comment saying what it is and where to get it. Zero real values, ever.
# The installer prints the unfilled slots at the end of init.
bundles:
  version: '1'
  items:
  - id: workspace@2026-03-31-13-36
    secrets:
      telemetry_sink:
        auth:
          # Shared telemetry ingest token; must equal the token configured on the
          # deployment's telemetry ingest endpoint (stats app).
          token: <FILL_ME>
      integrations:
        telegram_kdcube_ref:
          definition:
            # Telegram bot token for the workspace chat bot; from @BotFather.
            bot_token: <FILL_ME>
            # Telegram webhook secret_token; any random string you generate
            # (e.g. `openssl rand -base64 32`), registered with setWebhook.
            webhook_secret: <FILL_ME>
  - id: connection-hub@1-0
    secrets:
      connections:
        # HMAC secret protecting OAuth state round-trips; generate locally
        # (e.g. `openssl rand -hex 32`).
        oauth_state_secret: <FILL_ME>
        providers: {}
        delegated_to_kdcube:
          # HMAC secret for delegated-connection OAuth state; generate locally
          # (e.g. `openssl rand -hex 32`).
          oauth_state_secret: <FILL_ME>
          providers:
            google:
              connector_apps:
                gmail:
                  # OAuth client secret of your Google Cloud OAuth client
                  # (Google Cloud Console -> APIs & Services -> Credentials).
                  client_secret: <FILL_ME>
            slack:
              connector_apps:
                demo:
                  # Slack app client secret (api.slack.com -> Your Apps ->
                  # Basic Information -> App Credentials).
                  client_secret: <FILL_ME>
      identity:
        authenticators:
          telegram_kdcube_ref:
            # Same Telegram bot token as the workspace bot; from @BotFather.
            bot_token: <FILL_ME>
  - id: kdcube-services@1-0
    secrets:
      conversations:
        # Secret signing conversation file-download URLs; generate locally
        # (e.g. `openssl rand -hex 32`).
        file_download_secret: <FILL_ME>
  - id: website@2026-07-12
    secrets: {}
  - id: ported-langgraph-agents@2026-07-13
    secrets:
      integrations:
        telegram_default:
          definition:
            # Telegram bot token for the ported-langgraph example chat bot; from
            # @BotFather. A DISTINCT bot from the workspace bot (own token).
            bot_token: <FILL_ME>
            # Telegram webhook secret_token; any random string you generate
            # (e.g. `openssl rand -base64 32`), registered with setWebhook.
            webhook_secret: <FILL_ME>
