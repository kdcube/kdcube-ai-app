{{- $postgresPassword := default .Values.auth.password .Values.infra.postgres.password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres-db.fullname" . }}-credentials
  labels:
    app.kubernetes.io/name: {{ include "postgres-db.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.auth.username | quote }}
  POSTGRES_PASSWORD: {{ $postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.auth.database | quote }}
