apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "redis.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  redis.conf: |
    appendonly {{ .Values.redisConfig.appendonly }}
    save 900 1
    save 300 10
    save 60 10000
