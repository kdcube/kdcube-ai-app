{{- if .Values.persistence.create }}
{{- $hostPath := .Values.persistence.hostPath }}
{{- $sc := .Values.persistence.storageClassName }}
{{- $ns := .Release.Namespace }}

{{- /* ── bundles ── */}}
{{- if $hostPath.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.persistence.bundles.claimName }}-pv
spec:
  capacity:
    storage: {{ .Values.persistence.bundles.size }}
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: {{ printf "%s/%s" $hostPath.basePath .Values.persistence.bundles.hostSubPath | quote }}
    type: DirectoryOrCreate
  claimRef:
    namespace: {{ $ns }}
    name: {{ .Values.persistence.bundles.claimName }}
---
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.persistence.bundles.claimName }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.bundles.size }}
  {{- if $hostPath.enabled }}
  storageClassName: ""
  volumeName: {{ .Values.persistence.bundles.claimName }}-pv
  {{- else if $sc }}
  storageClassName: {{ $sc | quote }}
  {{- end }}
---

