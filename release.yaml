platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.7.150"
  description: |
    This release focuses on the new CLI initialization/configuration flow,
    runtime bundle management, React context recovery, service-facing chat
    submission utilities, short-lived artifact links, deterministic runtime IDs,
    and operational reliability fixes.

    Highlights

    - Added and documented the current KDCube CLI model: plain `kdcube init`,
      descriptor-driven initialization, workdir scoping by tenant/project,
      persistent defaults, start/stop/reload flows, and the one-running-stack
      local guard.
    - Added the `kdcube bundle` runtime patch command for source mode changes,
      identity/config/secrets updates, upserts, deletion, and reload-oriented
      bundle development.
    - Fixed CLI descriptor handling so `frontend.config` alone remains runtime
      metadata and no longer selects custom-UI managed-infra mode unless
      `frontend.build` or `frontend.image` is configured.
    - Fixed local source staging for git worktrees so descriptor-driven installs
      can safely use worktree checkouts without copying `.git`, gitignored
      runtime data, or ignored generated files.
    - Added proc-local `ChatIngressSubmitter` so proc-hosted bundle webhooks and
      service adapters can submit chat messages through the same shared ingress
      core used by SSE and Socket.IO, including continuation handling for
      followup and steer events.
    - Added reusable short-lived signed link helpers for public artifact
      downloads in clients that cannot reliably attach platform auth headers,
      such as Telegram Web Apps.
    - Added timestamp-shaped UTC turn and execution IDs, such as
      `turn_20260506125243_ab12` and `exec_20260506125243_ab12`, while keeping
      ordering anchored in stored timestamps.
    - Expanded React memory recovery through temporal/search-aware
      `react.memsearch`, turn-index recovery paths, and concise documentation
      for retrieving earlier summaries and artifacts after pruning/compaction.
    - Improved React context compaction and restored focused compaction tests,
      including clearer handling of compacted prior conversation memory and
      current-turn suffix retention.
    - Added tool file hosting support and React harness hosting utilities for
      recovering generated artifacts across turn/workspace cleanup boundaries.
    - Added Claude skill materialization and accounting context support.
    - Fixed logging rollover behavior for multi-worker services by using stable
      default rotation names and tolerating missing-file rollover races.

    Runtime work in this release line:

    - Bundle webhooks can now reuse platform chat submission instead of
      duplicating SSE/socket ingestion logic in bundle code.
    - Public widget/download flows can return short-lived direct URLs while the
      server still verifies resource subject, expiry, user scope, and artifact
      visibility.
    - Long-running React conversations have a cleaner recovery path from
      compacted summaries to turn indexes, message/tool refs, and hosted file
      artifacts.
    - Local installs and bundle development are more predictable: workdirs are
      namespaced, source selection is explicit, local source staging respects
      git ignore boundaries, and bundle topology can be patched at runtime.

    Validation and regression coverage:

    - Added tests for timestamped turn/exec IDs.
    - Added tests for signed link subject binding, tamper rejection, expiry, and
      token query handling.
    - Added tests for logging rollover naming and missing-file rollover races.
    - Restored and updated React compaction tests.
    - Focused platform tests were run during the individual fixes in this
      release line.

    Changelog

    - Added plain CLI init and workdir scoping improvements.
    - Added runtime `kdcube bundle` patch/upsert/delete command.
    - Fixed custom-UI mode selection for frontend descriptors.
    - Fixed local source staging for git worktrees.
    - Added proc-local chat submitter for webhook/service ingestion.
    - Added reusable signed short-lived link helpers.
    - Added timestamp-shaped UTC turn and exec IDs.
    - Expanded React memory recovery search and documentation.
    - Improved React context compaction.
    - Added tool file hosting and React harness hosting utilities.
    - Added Claude skill materialization and accounting context.
    - Updated CLI, bundle, React, and service-facing interface docs.
    - Fixed multi-worker logging rollover races.
