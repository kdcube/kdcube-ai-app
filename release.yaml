platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.17.2144"
  description: |
    This release adds the embedding and runtime-config fixes needed for
    KDCube-hosted bundle UI and widgets to run correctly when framed from an
    approved external application origin.

    Highlights

    - Adds cooperative iframe sizing for KDCube static bundle UI and widget
      entrypoints. Served HTML now posts `kdcube-resize` messages with both
      height and width so cross-origin parent pages do not need DOM access.
    - Applies the resize reporter to static bundle routes, authenticated widget
      routes, public widget routes, and static widget iframe wrappers.
    - Updates built-in and example bundle UIs to load runtime scope from
      `GET /api/cp-frontend-config` first. If that endpoint returns usable
      config, the UI does not wait for parent messaging.
    - Keeps parent `CONFIG_REQUEST` / `CONFIG_RESPONSE` as a fallback for older
      display environments or deployments where the config endpoint is blocked.
    - Documents the external embedding contract, frame-policy scope, iframe
      sizing message, and endpoint-first runtime config behavior.
    - Extends tests for static/widget serving and resize-reporter injection.

    Runtime and deployment notes:

    - Cross-origin embedding still requires deployment descriptors to configure
      the allowed frame ancestors. Browser headers allow display; runtime UI
      code handles sizing and config discovery.
    - The config endpoint is authoritative when available. Parent messaging is
      now a compatibility path, not the first path.
    - If both config paths are unavailable, route-derived tenant/project/bundle
      values may still support read-only static surfaces, but auth metadata is
      missing.
    - No private deployment or organization-specific content is part of this
      release.

    Validation and regression coverage:

    - `git diff --check` passed.
    - Python compile check passed for the integrations routes.
    - Focused TypeScript checks passed for memory, Copilot widget, and
      Versatile widget runtime config modules.
    - Copilot and Versatile widget production builds passed.
    - Focused static/widget integration tests passed: 4 passed.

    Changelog

    - Added resize-reporter injection for static bundle UI and widget HTML.
    - Added runtime config endpoint fallback support across built-in control
      plane panels and example bundle UIs.
    - Switched widget/main UI config discovery to endpoint-first behavior.
    - Updated embedding and bundle UI documentation.
    - Added regression coverage for public/static widget resize injection.
config:
    version: "2026.5.17.2144"
