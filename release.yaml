platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.16.1704"
  description: |
    This release fixes ECS/widget readiness and frame embedding issues found
    after the 2026.5.16.407 platform release, and cleans up public KDCube
    overview documentation.

    Highlights

    - Fixes bundle preload behavior for multi-proc deployments. Every proc now
      performs local bundle preload even when another proc holds the Redis
      preload lock; shared UI build locks and signatures remain responsible for
      deduplicating the actual npm/build work.
    - Prevents cold non-leader procs from marking themselves ready before
      bundle `on_bundle_load()` has warmed local runtime state and current UI
      build outputs.
    - Updates frameable nginx routes to clear inherited `X-Frame-Options:
      DENY` before setting `SAMEORIGIN`, so bundle widgets and static
      integration UIs can be embedded by the same-origin control-plane shell.
    - Adds an explicit `/api/integrations/static/` frameable route to the ECS
      custom UI nginx template and extends integration static route timeouts for
      first-load build/readiness paths.
    - Documents the control-plane embedding contract: frame policies belong in
      proxy headers, frameable document routes must clear inherited deny
      headers, and `bundles_preload_on_start` should make iframe requests find
      fresh current UI builds rather than serving stale output.
    - Cleans up `what-you-can-do-with-kdcube` so it remains public product
      documentation and no longer contains internal demo-assistant planning
      notes.

    Runtime and deployment notes:

    - The Redis preload lock no longer means "only the leader preloads
      bundles." It now only coordinates the cluster while each proc still warms
      its own process-local bundle/module state.
    - Existing storage-scoped UI build locks remain strict:
      `allow_existing_on_timeout=false` and `allow_existing_while_locked=false`,
      so stale UI is not used as a fallback for current entrypoint requests.
    - The embedding documentation now calls out that if runtime iframe requests
      still trigger `npm install`, that is a preload/readiness problem to fix,
      not a reason to serve stale UI.

    Validation and regression coverage:

    - Re-ran Python compile checks for the processor web app and integrations
      route module.
    - Re-ran focused preload/static/widget tests:
      `test_proc_bundle_preload_lock.py`, `test_integrations_stream_id.py`,
      and `test_bundle_interfaces.py`.
    - Re-ran `git diff --check` for the platform nginx templates, Kubernetes
      nginx templates, docs, preload code, and focused tests.

    Changelog

    - Fixed bundle preload skipping on non-leader procs.
    - Fixed frameable route headers for bundle widgets/static integration UI.
    - Added `/api/integrations/static/` frameable handling to the ECS nginx
      template.
    - Increased static integration route timeouts used by nginx templates.
    - Updated embedding-control-plane frontend documentation for current
      iframe/header/preload behavior.
    - Removed internal demo-planning wording from the public KDCube overview.
config:
