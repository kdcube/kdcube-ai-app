platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.11.415"
  description: |
    This platform release strengthens the conversation event-bus runtime,
    Data Bus admission control, Redis topology handling, and bundle-builder
    documentation. It also includes recent canvas, scene, memory, and chat UI
    improvements.

    Highlights

    - Adds a Redis-backed conversation event-bus state table and orchestrator
      for lane wake scheduling, handler open/close state, reader acceptance,
      and post-save handoff.
    - Integrates conversation lane wakeups through ingress, proc, BaseWorkflow,
      ContextBrowser, and ReAct close gates so late followups and steers remain
      ordered without proc-side lane scanning after task completion.
    - Adds an event-bus simulator and focused tests that model ingress, wake
      publication, proc wake resolution, handler setup, reader drain, ReAct
      close, artifact persistence, and post-save handoff.
    - Adds Redis topology configuration and a Redis client factory, with
      standalone topology as the current default and Redis Cluster constraints
      documented for future hardening.
    - Reworks gateway queue-admission accounting to use indexed queue state
      instead of broad keyspace scans.
    - Adds app-layer Data Bus publish limits for Socket.IO and HTTP publish
      packages, covering package rate, message count, and payload bytes before
      durable stream writes.
    - Propagates queue/gateway rejection details to chat clients so clients can
      surface rate-limit, backpressure, and queue-admission failures clearly.
    - Aligns Socket.IO chat clients on top-level `external_events[]` while
      keeping `data_bus.publish` separate with top-level `messages[]`.
    - Refreshes processor, ingress, ECS, system architecture, Data Bus, Redis,
      gateway, and Tier 1 bundle-builder documentation to match the current
      runtime contract.
    - Improves canvas and scene surfaces, including pin board naming, canvas
      pin interactions, file upload limits, draggable/pinnable attachments, and
      memory pane layout behavior.
    - Adds scene composition, memory widget, chat widget, and related solution
      documentation updates for bundle builders.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.6.11.415 to receive this
      update.
    - Data Bus widget traffic is now subject to
      `gateway.data_bus.ingress.publish_limits`; tune package, message, and
      byte limits in `gateway.yaml`, not in bundle props.
    - `assembly.yaml` may explicitly set `infra.redis.topology: standalone`.
      Standalone remains the current default when omitted.
    - Socket.IO chat traffic must keep using top-level `external_events[]`.
      Data Bus traffic must use `data_bus.publish` with top-level `messages[]`.
    - Conversation followup/steer recovery now relies on lane state and
      ContextBrowser post-save handoff. Proc resolves lane wakeups but does not
      scan the lane after task completion.
    - Data Bus publish acknowledgements confirm ingress admission only. Handler
      success, visibility failures, conflicts, and storage results remain
      proc-side Data Bus results or explicit replies.

    Validation and regression coverage:

    - Conversation event-bus state and simulator tests were added and run
      during development.
    - Focused continuation, external-event, processor, Data Bus publish,
      gateway configuration, queue-depth, and Redis factory tests were added or
      updated.
    - TypeScript/UI validation was performed for changed widget and scene
      surfaces during development.
    - Staged release diff private-name scan must pass before the release
      commit.

    Changelog

    - Added conversation event-bus lane state and orchestrator primitives.
    - Integrated lane wakeups and post-save handoff through conversation
      runtime paths.
    - Added Data Bus publish admission limits and gateway docs.
    - Added Redis topology factory groundwork and indexed queue admission.
    - Propagated queue rejection details to chat clients.
    - Updated Socket.IO chat/Data Bus client contracts.
    - Updated processor, ingress, architecture, ECS, Data Bus, Redis, gateway,
      and Tier 1 bundle-builder documentation.
    - Improved canvas, scene, chat widget, and memory widget behavior.
config:
    version: "2026.6.11.415"
