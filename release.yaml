platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.27.317"
  description: |
    This platform release tightens embedded iframe sizing behavior for hosted
    bundle UI surfaces.

    Highlights

    - Lets embedded iframes shrink as well as grow, so host pages receive more
      accurate frame sizing after content collapses or becomes shorter.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.27.317 to receive this
      update.
    - No descriptor shape changes are required for this update.
    - The iframe resize fix applies to existing embedded control-plane/bundle UI
      hosts that consume frame resize messages.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - Release metadata parse check passed.
    - Staged OSS private-name scan must pass before the release commit.

    Changelog

    - Fixed embedded iframe resize handling so frames can shrink after a
      previous larger height was reported.
config:
    version: "2026.5.27.317"
