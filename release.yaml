platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.12.2356"
  description: |
    This release introduces full bundle props/secrets support across the platform and deployment flow. Bundles now have dedicated bundles.yaml and bundles.secrets.yaml descriptors,
    secrets are injected into the sidecar with dot‑path keys, and the admin UI supports write‑only secret updates plus clear, effective props editing. Bundle configuration defaults now
    come from entrypoint.configuration, external overrides are deep‑merged, and the UI shows the real resolution order. Code defaults in the UI are refreshed from the latest bundle code
    (no stale cache), example bundles were updated to the correct property pattern, and the docs now reflect the new descriptors, override semantics, and bundle developer best
    practices.
  config:
    version: "2026.3.12.2356"