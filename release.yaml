platform:
  repo: "kdcube-ai-app"
  ref: "2026.7.3.243"
  description: |
    This release follows 2026.7.1.455 with the platform-authority and
    external-agent integration work that was validated during the Connection Hub
    rollout.

    The main change is that platform authentication configuration is now driven
    by Connection Hub authority registry data instead of being scattered across
    assembly-only auth fields. The runtime can describe Cognito or
    multi-Cognito platform authority providers through the same registry model
    used by bundle-hosted platform authorities, delegated credentials, request
    authenticators, cookies, headers, and login/logout entrypoints.

    The release also extends the delegated-credential and managed MCP surface.
    Connection Hub now preserves custom delegated-consent payload fields through
    authorize/consent, supports cleaner custom consent UI handoff, and keeps
    delegated client consent aligned with the selected resource, tools, and
    grants. KDCube Services and named services continue moving toward a shared
    external-agent capability model.

    Conversation and named-service surfaces were expanded and hardened. The
    conversation named-service provider now exposes search/read operations over
    the shared backend, lightweight conversation timelines, scoped file refs,
    short-lived file downloads, uniform batch object.get behavior, and clearer
    MCP bridge traces for tool attempts, denials, and reconsent.

    Runtime auth and stream regressions found during local testing were fixed.
    SSE relay delivery is scoped by tenant/project so one runtime cannot drop or
    misroute another runtime's stream messages. Control-plane and hosted-site
    auth callback handling was tightened so real OIDC callbacks are processed
    before stale local user state is reused.

    Highlights

    - Moves platform auth configuration under Connection Hub authority registry
      semantics for Cognito, multi-Cognito, and bundle-hosted platform authority
      providers.
    - Documents platform authority setup, bundle-hosted platform authorities,
      credential envelopes, login/logout entrypoints, cookies, and headers.
    - Fixes custom delegated OAuth consent payload preservation and adds tests
      around authorize/consent handling.
    - Adds authority-provider entrypoint resolution so clients can ask the
      registry for login URLs instead of reading descriptor internals directly.
    - Expands conversation named-service support with search, timelines,
      scoped file references, short-lived file download URLs, and batch reads.
    - Adds managed MCP/named-services bridge logging for call attempts,
      authorization denials, and reconsent hints.
    - Scopes SSE relay delivery by tenant/project to avoid cross-runtime stream
      delivery mismatches.
    - Improves control-plane and website auth callback behavior for OIDC
      logins.
    - Adds descriptor-driven economics reference-model fixes.
    - Keeps widget build and supervisor execution paths off the event loop for
      better runtime responsiveness.
    - Hardens exec output contracts and oversized supervisor environment
      handling so produced files and structured tool failures survive across
      runtime boundaries.

    Operational impact

    - Environments that use Cognito or multi-Cognito should carry the platform
      authority provider configuration in Connection Hub descriptors while
      retaining compatible cookie/header runtime values.
    - Environments that host an application as the platform authority can now
      model that provider through the same registry and expose application-owned
      login and consent screens.
    - MCP clients should reconnect/reconsent when tool or namespace grant
      metadata changes so their delegated credentials match the current
      resource contract.
    - Stream relay logs should now be easier to reason about because delivery
      is scoped to the active tenant/project runtime.

    Changelog

    - Added Connection Hub authority provider entrypoint lookup and platform
      authority setup documentation.
    - Updated runtime auth docs for credential envelopes and bundle-hosted
      platform authority flows.
    - Updated delegated OAuth authorize/consent route handling and regression
      tests.
    - Updated bundle-store logging around reserved built-in bundle resolution.
    - Updated control-plane auth callback handling and auth cookie utilities.
    - Added conversation named-service provider/read/export facade changes and
      KDCube Services MCP bridge improvements.
    - Added economics reference-model fixes and descriptor-driven plan behavior.
    - Added SSE relay tenant/project scoping.
    - Added runtime execution contract and supervisor env offload fixes.
