platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.5.342"
  description: |
    This platform release improves conversation event handling, cross-turn
    artifact recovery, memory retrieval, authenticated profile reporting, and
    economics settlement behavior.

    Highlights

    - Adds the event-source pipeline for ReAct turns, including configurable
      per-bundle event recording policies and clearer event payload flow.
    - Persists turn cost and timing summaries as chat artifacts.
    - Improves external event handling so follow-up and wake-up events are
      rendered consistently in the timeline.
    - Supports cross-conversation source-pool reads and execution artifact
      recovery paths.
    - Adds lexical retrieval and reciprocal-rank fusion to memory search, with
      more compact search envelopes for model context.
    - Surfaces authenticated profile state more accurately in the web client.
    - Corrects plan, project, and wallet settlement so reservation splits are
      preserved through final charging.
    - Clarifies bundle UI asset paths and runtime storage contracts in the
      developer documentation.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.6.5.342 to receive this
      update.
    - Existing bundle UI builds remain compatible; rebuild when the configured
      platform ref changes.
    - ReAct memory and event-source behavior depends on bundle policy
      configuration and available tools.

    Validation and regression coverage:

    - Focused economics settlement tests passed.
    - Focused hook tests for the economics entrypoint passed.
    - TypeScript checks for updated dashboard components passed.
    - Staged release diff private-name scan must pass before the release
      commit.

    Changelog

    - Added ReAct event-source pipeline and event recording policy support.
    - Added persisted turn cost and timing artifacts.
    - Added cross-conversation source-pool and artifact recovery support.
    - Added lexical memory search and reciprocal-rank fusion.
    - Fixed duplicate prompt indexing and git workspace bad-ref recovery.
    - Fixed authenticated profile state reporting.
    - Fixed plan/wallet settlement allocation.
config:
    version: "2026.6.5.342"
