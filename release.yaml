platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.13.435"
  description: |
    This platform release hardens the named-service integration layer, ReAct
    external-object access, canvas object resolution, config-first agent
    wiring, and the Versatile reference bundle. It also refreshes platform
    positioning and bundle-builder documentation around current public
    authoring concepts.

    Highlights

    - Adds provider-owned named-service resolution for namespace refs, so
      common chat and canvas surfaces can resolve objects through service
      discovery instead of embedding bundle-specific behavior.
    - Tightens named-service provider and consumer contracts for object get,
      streamed object reads, provider metadata, schemas, canvas object actions,
      host-file flows, and error propagation.
    - Makes ReAct external-object access cleaner: namespace refs are handled
      through pull/materialization, with clearer artifact records and provider
      errors surfaced back to the agent.
    - Updates canvas integration so object cards and actions are resolved
      generically from namespace refs, including subnamespace-style refs such
      as task issue and attachment objects.
    - Moves agent tool wiring to explicit `surfaces.as_consumer` config,
      including Python tools, MCP tools, named-service tools, event sources,
      canvas resolvers, and namespace applicability in the ReAct tool catalog.
    - Moves agent skill visibility to the same config-first surface and keeps
      public documentation focused on bundle-authoring config rather than
      internal runtime handoff shapes.
    - Integrates the SDK economics handler path with the reference Versatile
      bundle and aligns bundle config templates, interface docs, and local
      runtime examples.
    - Refactors the Versatile reference bundle toward a cleaner shape:
      `agents/main.py`, service modules, config-owned surfaces, SDK widgets,
      and a restored Telegram Mini App widget.
    - Removes the Versatile bundle-local preference skill and uses the SDK
      durable-memory tools and shared memory widget as the documented path for
      remembered facts and preferences.
    - Refreshes top-level README and product documentation around KDCube as a
      self-hosted governed runtime and control plane for multiple AI
      applications.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.6.13.435 to receive this
      update.
    - Bundles that consume namespace-owned objects should declare tool,
      event-source, and canvas surfaces under `surfaces.as_consumer`.
    - ReAct-facing named-service tools should be exposed only for operations
      and namespaces intended for the agent. UI-only canvas object actions
      should stay in canvas resolver config.
    - External namespace refs that need full inspection should be materialized
      through pull so ReAct receives a local artifact path plus provider
      metadata.
    - Bundle-local skills are optional. If a bundle relies on SDK durable
      memory, configure the SDK memory tools and widget instead of shipping a
      duplicate preference skill.

    Validation and regression coverage:

    - Focused tests were updated around tool config, skill config,
      named-service provider behavior, ReAct pull/materialization paths,
      canvas refs, and Versatile reference-bundle wiring during development.
    - Task tracker and Versatile manual checks covered task refs,
      attachment materialization, canvas actions, and memory-widget flows.
    - Staged release diff private-name scan passes before the release commit.

    Changelog

    - Added named-service resolver and host-file integration surfaces.
    - Hardened object get/stream/read contracts for JSON objects and files.
    - Updated ReAct pull handling for namespace-owned refs.
    - Removed task-specific behavior from common canvas components.
    - Added config-first tool and skill wiring for reference bundles.
    - Updated named-service, tools, skills, canvas, and bundle-builder docs.
    - Refactored Versatile bundle layout and restored Telegram Mini App widget.
    - Removed the Versatile local preference skill in favor of SDK memory.
    - Refreshed README and product-positioning documentation.
config:
    version: "2026.6.13.435"
