platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.20.042"
  description: |
    This patch release fixes isolated Python execution in split Docker runtime
    deployments. It targets EC2/ECS deployments where chat-proc creates the
    execution workspace inside the proc-visible /exec-workspace mount and then
    starts sibling py-code-exec containers through Docker.

    Highlights

    - Normalizes split executor workspace permissions on the proc-visible
      /exec-workspace tree before launching sibling py-code-exec containers.
    - Prevents executor containers with dropped capabilities from failing to
      read generated main.py files with Permission denied.
    - Keeps the fix scoped to split container execution while preserving the
      existing host-path translation and mount preflight behavior.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.20.042 to receive the
      split runtime permission fix.
    - No descriptor shape migration is required for existing deployments.
    - No organization-specific content is part of this OSS release.

    Validation and regression coverage:

    - Python syntax validation passed for the changed runtime file.
    - Staged OSS private-name scan passed before commit.

    Changelog

    - Fixed split Docker isolated runtime permission normalization for
      /exec-workspace workdir and outdir paths.
config:
    version: "2026.5.20.042"
