platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.17.1535"
  description: |
    This release completes the bundle widget lifecycle cleanup after the ECS
    widget-routing investigation. It removes the old `ui.web_app_widgets`
    contract, documents the source-folder UI lifecycle, and makes static widget
    build/load behavior more robust when browser iframe requests are canceled.

    Highlights

    - Renames source-folder widget configuration from `ui.web_app_widgets` to
      `ui.widgets` across platform docs, SDK defaults, reference bundles, and
      tests. The old key is no longer treated as an alias.
    - Keeps `@ui_widget` as the only widget surface declaration. `ui.widgets`
      configures build/serve behavior for an already-declared widget alias; it
      does not create toolbar-visible widget surfaces by itself.
    - Adds `docs/sdk/bundle/ui-components-lifecycle-README.md`, covering
      discovery, preload, request-time fallback, shared-storage locks,
      signatures, concurrent workers, cancellation behavior, and diagnostics.
    - Keeps static bundle entrypoint loading alive after a browser/client
      disconnect. A canceled iframe request no longer cancels the underlying
      process-local load task; cleanup is identity-guarded and failed loads can
      be retried.
    - Preserves direct widget iframe loading and improved proc diagnostics from
      the previous unreleased fixes.
    - Aligns Copilot, Versatile, memory docs, and bundle-build docs with the
      current widget config contract.

    Runtime and deployment notes:

    - Direct widget serving still requires a decorated `@ui_widget` method.
    - `ui.widgets.<alias>.enabled` controls the static build config for that
      alias. Use `enabled.widget.<alias>` for widget surface visibility.
    - Static UI builds still run in proc workers, use shared bundle storage, and
      are coordinated by storage-scoped locks/signatures. ISO runtime is not
      involved.
    - If a browser navigates away during a long request-triggered build, that
      request may fail with a client-disconnect response, but the shielded
      static load/build task can finish for the next request.
    - No customer/private content is part of this release.

    Validation and regression coverage:

    - Python compile checks passed for integrations routes, proc startup,
      agentic loader, chatbot entrypoints, and Copilot/Versatile entrypoints.
    - Focused platform/widget tests passed: 56 passed.
    - `git diff --check` passed.
    - A broader Versatile preference-canvas test run still has existing
      unrelated failures around visibility defaults and monkeypatch targets; it
      was not used as the release gate.

    Changelog

    - Replaced `ui.web_app_widgets` with `ui.widgets` in code, examples, docs,
      and tests.
    - Added UI component lifecycle documentation for source-folder widgets and
      main views.
    - Added request-cancellation-safe static entrypoint load cleanup.
    - Added regression tests for static entrypoint load cleanup after waiter
      cancellation and failure.
    - Updated Copilot and Versatile widget defaults to the new config key.
