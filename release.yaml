platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.31.158"
  description: |
    This release focuses on React agent workspace clarity, bundle-authoring guidance, and
    documentation/source discoverability.

    React tool behavior and prompt guidance were tightened so the agent works more reliably with
    current-turn files, historical artifacts, and bundle knowledge space paths. Related React docs
    were updated to make the workspace model, path usage, and artifact discovery rules much clearer.

    The `react.doc` bundle was improved as a bundle-authoring copilot: its knowledge index now
    includes richer document metadata and headings, its skills more strongly steer evidence-first
    bundle authoring, and its guidance now explicitly teaches repository exploration through
    isolated exec plus namespace resolution when exact source files are not yet known.

    Across the docs tree, source/code references were normalized to the real `app/ai-app` root so
    mentioned files are actually reachable by users and by the agent. This reduces dead shorthand
    references and makes doc-driven exploration more dependable.
config:
    version: "2026.3.31.158"
