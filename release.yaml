platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.15.2347"
  description: |
    This release focuses on durable User Memory, ReAct V3 protocol stability,
    bundle-scoped runtime context, reference bundle widgets, and deployment
    documentation for memory-enabled platform environments.

    Highlights

    - Adds the durable User Memory subsystem with user-owned memory records,
      memory widget APIs, hybrid search/read support, snapshots, restore
      scaffolding, reconciliation job flow, and ReAct announce integration.
    - Adds the reusable memory widget app and shared embeddable React component
      so bundles can expose the same memory management experience in platform
      widgets, Telegram webapps, and bundle-owned web surfaces.
    - Wires memory and economics building blocks into the built-in Copilot,
      versatile reference bundle, and related example entrypoints while keeping
      memory behavior configuration-driven.
    - Hardens ReAct V3 streaming and scheduling for repeated structured
      decisions, canvas artifact streaming, exec-code binding, renderer ref
      normalization, and clearer protocol-violation feedback.
    - Restores bundle-scoped runtime context propagation for subprocess and
      isolated tool runtimes so bundle-level service keys can resolve through
      the standard helpers.
    - Stabilizes web favicon enrichment with bounded browser fallback,
      domain-scoped failure caching, and timeout behavior that does not block
      web search/fetch tool completion.
    - Aligns local, CLI, and deployment descriptor documentation for default
      storage paths, memory configuration, widget packaging, Telegram bundle
      integrations, and greenfield demo environments.

    Runtime and SDK work in this release line:

    - Memory configuration is now a first-class bundle concern: announce
      hotsets, memory tools, write policy, widget access, scope filters, and
      user-visible management can be enabled independently.
    - ReAct memory documentation now distinguishes conversation memory,
      internal anchors, summaries, `react.memsearch`, and durable User Memory,
      including pruning/compaction behavior and retrieval semantics.
    - Rendering and artifact tooling now accepts friendlier `ref:` paths where
      possible and reports actionable feedback when source refs are not usable.
    - Telegram integration configuration is resolved per bundle at runtime
      instead of relying on import-time globals, allowing multiple bundles to
      expose independent Telegram/webapp surfaces.
    - Bundle widget documentation covers hybrid reuse of platform-owned shared
      React components from external bundle webapps.

    Validation and regression coverage:

    - Re-ran Python compile checks for Copilot and Telegram helper modules.
    - Re-ran typecheck/build for the memory widget, Copilot Telegram webapp,
      and versatile webapp integrations.
    - Re-ran focused checks for ReAct protocol handling, renderer refs, memory
      APIs, and descriptor parsing where local tooling was available.
    - Verified release metadata and documentation changes with `git diff
      --check`.

    Changelog

    - Added User Memory store/search/widget/reconciliation documentation and
      platform integration points.
    - Added memory-enabled bundle entrypoint mixins and widget operations.
    - Added shared memory widget embedding for bundle-owned React apps.
    - Added Copilot Telegram webapp with Memory and Telegram Admin tabs.
    - Added memory-aware versatile reference bundle docs, config, and release
      metadata.
    - Hardened ReAct repeated-decision parsing, artifact streaming, exec
      binding, renderer refs, and protocol feedback.
    - Fixed subprocess runtime bundle context propagation for bundle-scoped
      service secrets.
    - Fixed favicon enrichment to use bounded fallback and expiring
      domain-level failure cache entries.
    - Updated platform release procedure to include the demo environment and
      to preserve greenfield envs without built-in/example bundles.
config:
    version: "2026.5.15.2347"
