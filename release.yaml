platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.14.0007"
  description: |
    This platform release adds the first production-ready online governance
    layer for ReAct multi-action rounds, aligns the model instructions with
    the runtime strategy-trait harness, improves canvas pin usability, and
    hardens isolated tool execution for configured bundle tools.

    Highlights

    - Introduces strategy traits for tools, starting with the `strategy`
      trait values `exploration`, `exploitation`, `neutral`, and `unknown`.
      Traits are carried through configured tool connections and the ReAct
      tool catalog so agents and runtime policy use the same vocabulary.
    - Adds an ordered multi-action compatibility matrix for ReAct rounds. The
      first action is admitted, later actions are judged against already
      accepted actions, incompatible later actions are denied, and unknown
      strategy tools run alone.
    - Adds an online ReAct action overseer and stream gates. Stream sniffers
      can detect candidate actions, buffer user-visible output, ask the
      overseer for admission, and interrupt generation as soon as a later
      action is known to be strategically invalid.
    - Preserves accepted earlier actions instead of nuking the whole round.
      For example, an allowed search can still run while a premature final
      answer in the same round is suppressed and recorded as a protocol
      violation.
    - Aligns shared ReAct instructions, lite instructions, decision prompts,
      and prompt tests with the strategy-trait contract taught by the
      harness.
    - Documents governed streaming and ReAct online strategic governance,
      including how stream gates, overseer decisions, tool traits, final
      answer gating, and interruption paths fit together.
    - Updates custom-tool and tool-subsystem docs so bundle authors know how
      to mark connected tools with strategy traits and why this improves
      reactive-agent correctness, user experience, and token economics.
    - Improves canvas pin cards with footer timestamps and a copy-URI
      affordance for easier inspection and handoff of pinned objects.
    - Fixes isolated/runtime tool import roots so configured SDK and bundle
      tool packages do not shadow Python stdlib modules such as `types.py`,
      while preserving same-bundle relative imports for bundle tool modules.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.6.14.0007 to receive this
      update.
    - Tool connections that participate in ReAct multi-action governance
      should declare the `strategy` trait in config or tool metadata. Tools
      without a known strategy are treated as `unknown` and must run alone.
    - The ReAct harness now admits actions in order and denies incompatible
      later actions. Accepted earlier actions remain valid and can still run.
    - Final-answer output is governed like other user-visible streams. It is
      buffered until the overseer accepts the strategic shape of the round.
    - Bundle-local tool modules with helper files named like stdlib modules
      should continue to work in isolated execution because PYTHONPATH now
      uses the correct package or bundle root.

    Validation and regression coverage:

    - Added and updated tests for tool traits, tool config trait propagation,
      ReAct action-overseer decisions, multi-action validation, runtime prompt
      alignment, and stream gating behavior.
    - Focused runtime tests cover dynamic bundle-tool imports, import-root
      selection for package-backed tools, non-importable bundle roots, and
      subprocess PYTHONPATH construction.
    - Manual harness checks covered search-plus-final-answer and multi-action
      ordering behavior, including suppression of invalid later output while
      retaining earlier accepted actions.
    - Staged release diff private-name scan passes before the release commit.

    Changelog

    - Added tool strategy traits and compatibility helpers.
    - Added ReAct online action overseer and governed stream gates.
    - Updated multi-action runtime validation and tests.
    - Updated ReAct shared instructions and prompt tests for strategy traits.
    - Added governed-streaming and online-strategic-governance documentation.
    - Updated custom-tool, SDK-tool, MCP-tool, named-service-tool, and
      bundle-agent docs with trait guidance.
    - Improved canvas pin card footer timestamp and copy-URI UI.
    - Fixed isolated runtime PYTHONPATH roots for package and bundle tools.
config:
    version: "2026.6.14.0007"
