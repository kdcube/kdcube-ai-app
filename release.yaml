platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.25.1545"
  description: |
    This platform release tightens delegated authentication handling and
    Cognito token validation, with a small frontend telemetry compatibility
    fix.

    Highlights

    - Adds direct delegated-cookie support for embedded control-plane
      deployments that receive already-issued auth and identity cookies from a
      same-site parent application.
    - Wires configurable auth and identity cookie names through CLI and ECS
      deployment paths so proxy configuration follows descriptor values.
    - Documents the same-site iframe integration model, required cookie
      attributes, and the current delegated-auth expectations.
    - Tightens Cognito JWT validation so ID tokens must validate audience and
      token type, while access tokens must match the configured app client and
      carry the expected access-token type.
    - Aligns frontend event logging with the external log event enum by keeping
      the native `warn` level instead of converting it to `warning`.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.25.1545 to receive this
      update.
    - Descriptor-driven deployments can configure the auth and identity cookie
      names through the existing auth descriptor fields.
    - Direct delegated cookies are accepted only as already-issued real auth
      cookies; masquerade cookies are not required for this flow.
    - Cognito role/group claims are trusted only after token signature, issuer,
      token type, and app-client checks pass.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - Focused Cognito token validation tests passed.
    - Release metadata diff check passed.
    - Staged OSS private-name scan passed before commit.

    Changelog

    - Added direct delegated-cookie proxy support.
    - Wired auth cookie names through CLI and ECS deployment configuration.
    - Updated auth, proxy, CICD, and configuration docs for embedded frontend
      integration.
    - Enforced Cognito ID-token audience/type and access-token client/type
      validation.
    - Fixed frontend event logging level typing for warning events.
config:
    version: "2026.5.25.1545"
