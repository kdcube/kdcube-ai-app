platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.17.1155"
  description: |
    This release fixes two configuration/runtime consistency issues in proc.
  
    The first fix addresses stale auth context on cached singleton bundles. In long-lived proc workers, especially on Fargate, singleton bundle instances could be reused with an old
    request context, causing privileged users to be evaluated as registered inside admin bundle operations such as ai_bundles. Proc now rebinds the per-request comm_context,
    communicator, and runtime context whenever a cached singleton workflow instance is reused, so request-scoped auth and user type are always current.
  
    The second fix makes bundle descriptor resets authoritative for non-secret bundle props. Reset from env and proc startup with BUNDLES_FORCE_ENV_ON_STARTUP=1 now rebuild the Redis
    bundle-props layer from bundles.yaml and delete stale keys that were removed from the descriptor, instead of leaving old overrides behind. This restores the intended precedence of
    code defaults → bundles.yaml → runtime overrides while allowing bundles.yaml to fully control the descriptor-backed props layer on startup/reset. Documentation and the AI Bundle
    dashboard text were updated to reflect this behavior, and also clarify that bundles.secrets.yaml is still upsert-only and does not yet auto-delete removed secrets.
  config:
    version: "2026.3.17.1155"