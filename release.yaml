platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.24.210"
  description: |
    This release follows 2026.6.23.2230 with a targeted deployment startup
    fix for ECS/chat-proc environments that use the shared managed app cache.

    The issue observed in staging was that a newly started `chat-proc` task
    could be marked RUNNING while the container entrypoint was still blocked on
    a recursive ownership repair of `/bundles/.managed-bundles`. Because that
    directory is backed by shared storage and may contain many managed app
    checkouts, `chown -R` can delay the HTTP server from binding to port 8020.
    During that window the proxy can route to a task that exists but is not yet
    listening, producing transient widget/API 502s.

    Highlights

    - Avoids recursive managed app-cache ownership repair during normal
      container startup.
    - Keeps shallow ownership repair of the managed app-cache root so the
      runtime can create new managed app entries.
    - Adds an explicit opt-in escape hatch:
      `CHOWN_MANAGED_BUNDLES_RECURSIVE=1`.
    - Applies the same startup behavior to both deployment entrypoints:
      `custom-ui-managed-infra` and `all_in_one_kdcube`.

    Operational impact

    - Fresh ECS tasks should start the processor without being delayed by a
      full walk of the managed app cache.
    - Existing environments that genuinely need one-time recursive ownership
      repair can set `CHOWN_MANAGED_BUNDLES_RECURSIVE=1` for that maintenance
      run, then remove it.
    - This platform image change complements the deployment-side readiness
      work for `chat-proc` health checks; deployments should still use task
      health checks so service discovery does not route to non-ready tasks.

    Changelog

    - Changed Docker entrypoints to shallow-chown `MANAGED_BUNDLES_ROOT` by
      default.
    - Added `CHOWN_MANAGED_BUNDLES_RECURSIVE=1` opt-in for recursive managed
      app-cache ownership repair.
    - Documented why recursive repair is unsafe as a default startup path on
      shared managed app storage.
config:
  version: "2026.6.24.210"
