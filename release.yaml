platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.17.505"
  description: |
    This release advances the platform runtime, reusable component extraction,
    memory-as-named-service work, canvas/pinboard interop, and scene
    composition contracts that landed after 2026.6.16.320.

    The main product outcome is a more coherent object model across chat,
    canvas, memory, task/provider widgets, and future scene participants.
    Provider-owned objects now move through the UI as canonical refs, scene
    surfaces route object opens through resolver-owned `target_surface`
    decisions, and canvas pins behave as proxies instead of copying or
    rewriting object identity. This release also extends the reusable npm
    component path with a full React chat UI package surface, improves memory
    search and memory object semantics, and documents the generic cross-surface
    drag/drop contract that scenes should implement.

    Highlights

    - Adds the concrete cross-surface context drag contract for scenes:
      source surfaces emit `kdcube-context-drag-start/end`, the scene tracks
      active context by root namespace, the provider resolves
      `object.action(open, object_ref)`, and the scene dispatches the
      provider-approved `ui_event.target_surface`.
    - Updates the standalone pinboard widget so canvas-origin card drags are
      published to the scene broker with canonical context payloads. This lets
      canvas cards route generically to chat, memory, task/provider surfaces,
      and other registered scene targets.
    - Routes scene panel drops to requested surfaces while still preserving the
      provider as the authority for final open effects.
    - Adds scene and canvas documentation that separates widget-local native
      drop handling from the generic scene-brokered path.
    - Expands the memory named-service provider, memory object resolver, and
      memory widget behavior so `mem:record:<id>` objects can participate in
      namespace-service search, open, drag, pin, and ReAct context flows.
    - Adds memory-native search relevance configuration with no-regression
      default scoring, including discoverable factor weights and tests for the
      memory scoring path.
    - Improves canvas pin cards, object-ref flyouts, namespace visual
      treatment, copy affordances, and memory pin display behavior.
    - Simplifies the canvas object contract so a pin keeps one canonical
      object ref and object actions always route through the registered
      resolver for that ref.
    - Adds generic canvas pin search and indexing improvements, including the
      shared hybrid index, vector backend split, FAISS support, and the
      semantic-search economics guard path.
    - Adds a richer extracted React chat UI under the in-repo npm component
      packages, including the chat shell, turn views, composer, file drop,
      markdown, webapp, modal, sidebar, and support utilities.
    - Keeps the current SDK chat widget working while adding package-backed UI
      roots and shared context chip visuals in both the SDK widget and npm
      package sources.
    - Improves `react.patch` diagnostics so agents receive actionable hunk
      mismatch details, expected/actual context, and suggested raw reads.
    - Pins client-side TSX runtime dependencies used by the visualization
      transpiler path.

    Scene and cross-surface interop

    - Documents a concrete scene contract for object drag/drop between
      surfaces. A source surface owns only the drag lifecycle and canonical
      context payload. The scene owns temporary active drag state and drop
      target matching. The namespace provider owns object semantics and open
      effects. The target surface owns only its local open/focus command.
    - Adds a dedicated design document for cross-surface context drag,
      including message shapes, actor responsibilities, provider request and
      response examples, target command examples, namespace style ownership,
      SDK extraction targets, a current-status table, an acceptance matrix, and
      failure modes.
    - Clarifies that native browser `DataTransfer` parsing inside a widget may
      be kept as a convenience, but it is not the generic cross-frame scene
      contract.
    - Clarifies that namespace styles are app/scene configuration keyed by root
      namespace, not canvas-owned or chat-owned metadata.
    - Keeps refs stable as objects move through search results, chat context
      chips, canvas cards, target widget opens, and ReAct context.

    Memory named-service and search

    - Extends the memory subsystem toward the named-service object model. The
      memory provider exposes `mem` and `mem:record` search scopes, memory
      object schema/about metadata, and object actions for open and memory
      lifecycle operations.
    - Moves memory policy/instruction material toward the memory module so
      durable memory guidance is included when memory support is configured,
      instead of being permanently baked into common ReAct instructions.
    - Preserves direct memory tooling compatibility while preparing the
      standard named-service tools to become the primary object interface.
    - Adds timestamp-oriented memory id expectations and tests around memory
      store id behavior.
    - Adds memory-native scoring configuration with defaults matching the
      existing additive weighted-sum model. Factor weights can tune semantic,
      text, label, salience, importance, confidence, freshness, and
      confirmation factors without changing default ordering.
    - Updates memory widget docs and UI behavior around drag/focus, compact and
      expanded layouts, search-by-ref focus, maintenance controls, and memory
      event/detail loading.

    Canvas and pinboard

    - Treats every resolver-backed pin as a proxy to exactly one canonical
      object ref. Canvas owns placement, display cache, descriptions, comments,
      suggestions, bin state, and board revision; the namespace resolver owns
      preview, open, download, rehost, and object semantics.
    - Updates canvas object actions and storage paths so `object_ref` is the
      durable identity used for resolver dispatch.
    - Adds or improves tests around canvas pin search wiring, named-service
      provider routing, pin search indexing, and canvas object contract
      behavior.
    - Improves card UX: object-ref flyouts, copy URI controls, namespace label
      and accent handling, clearer object cards, and memory pin text display.
    - Adds Data Bus/live update and resolver routing refinements for canvas
      actions and scene-open interactions.
    - Adds pinboard runtime settings support for namespace styles and host
      scene configuration handshake fields.

    Search, indexing, and economics

    - Adds the generic SQLite plus vector hybrid index path used by searchable
      collections, with lexical FTS, vector scoring, recency, and reciprocal
      fusion support.
    - Splits FAISS storage out of the SQLite index package and adds a generic
      vector-store interface.
    - Adds FAISS dependency wiring to the chat/proc images and Python
      requirements so canvas pin search can default to the FAISS-backed path
      when available.
    - Adds `CanvasPinSearch` as a reusable canvas search service that derives
      its embedder and economics guard from the host entrypoint.
    - Adds the shared semantic-search guard built on verify-only economic
      preflight so semantic search can downgrade to lexical when spend is not
      allowed.
    - Documents hybrid index, hybrid scoring, canvas search operations, and the
      observed-file-lock lifecycle for search indexing.

    ReAct and tool behavior

    - Adds namespace-specific tool strategy trait support so a namespace can
      override a generic named-service tool's default strategy where the tool
      semantics differ, for example neutral upsert behavior.
    - Improves action-overseer and multi-action tests for neutral/exploitation
      tool combinations.
    - Updates named-service tool docs and runtime metadata paths for search
      scopes, namespace traits, and provider-specific schema information.
    - Improves ReAct workspace/timeline rendering around external context
      events, named-service objects, canvas refs, and memory refs.
    - Improves `react.patch` hunk mismatch reporting with diagnostics that
      identify the first mismatched patch and target lines.

    Reusable components and npm packages

    - Adds a package-backed React chat UI surface under
      `@kdcube/components-react`, including `ChatShell`, turn rendering,
      composer, sidebar, banners, file drop, markdown rendering, artifact
      helpers, and UI support utilities.
    - Adds standalone package examples for the extracted chat UI.
    - Adds shared context chip visuals to the SDK widget and
      `@kdcube/components-core`, keeping namespace/object rendering aligned
      across current and future package consumers.
    - Keeps the package-backed engine/UI path opt-in while preserving current
      SDK widget compatibility.
    - Documents the component extraction path and how chat, canvas, memory, and
      scene pieces should converge on core/headless plus React wrapper package
      boundaries.

    Documentation

    - Adds `docs/sdk/solutions/scene/cross-surface-context-drag-README.md` as
      the concrete design for generic scene object drag/drop.
    - Updates scene composition and surface registry docs with the concrete
      cross-surface drag and drop-to-open journeys.
    - Updates canvas module, pin integration, pin operations, external
      subsystem pins, canvas search, hybrid index, and hybrid scoring docs.
    - Updates memory overview, operational, ReAct integration, and memory
      widget docs for named-service integration and search weighting.
    - Updates React tool docs with the new patch diagnostics behavior.
    - Updates npm component docs around namespace styles, context-pin contract,
      and component package responsibilities.

    Runtime and deployment notes

    - Deployments must point the platform ref at 2026.6.17.505 to receive the
      memory named-service provider, canvas object contract simplification,
      cross-surface drag broker updates, pinboard drag publication, improved
      canvas pin search, FAISS vector backend wiring, package React chat UI
      sources, and ReAct patch diagnostics.
    - Existing widgets that parse native browser drops may keep that fallback,
      but host scenes should rely on canonical scene broker messages for
      cross-surface behavior.
    - New provider namespaces should expose `object.action open`, preserve
      canonical refs, and return `ui_event.target_surface` for any target they
      can open.
    - Surfaces that render context chips or cards should receive namespace
      styles from scene/app configuration keyed by root namespace.

    Changelog

    - Added cross-surface context drag design and scene documentation.
    - Published pinboard card drags to the scene broker.
    - Routed scene panel drops to requested surfaces.
    - Added and tested memory named-service provider behavior.
    - Added memory-native relevance factor weights and scoring tests.
    - Simplified canvas object refs and resolver dispatch.
    - Improved canvas pin cards, object-ref flyouts, and memory pin display.
    - Added canvas pin search, hybrid indexing, and economics guard wiring.
    - Split FAISS vector storage and added dependency wiring.
    - Added extracted React chat UI package sources and standalone example.
    - Added shared context chip visuals across SDK and package paths.
    - Improved ReAct patch mismatch diagnostics.
    - Updated scene, canvas, memory, namespace-service, npm component, and
      ReAct tool documentation.
config:
    version: "2026.6.17.505"
