platform:
  repo: "kdcube-ai-app"
  ref: "2026.4.10.153"
  description: |
    This release makes descriptor-driven local deployment and bundle development much more practical.
    Runtime code can now read non-secret descriptor values directly through `get_plain(...)` and
    `read_plain(...)`, with `assembly.yaml` and `bundles.yaml` mounted into the services as
    first-class runtime inputs. Assembly-backed reads now cover actionable platform settings such as
    storage roots, workspace and Claude session git stores, notifications, routine schedules, and
    the selected secrets provider.

    The local installer path was streamlined substantially. `kdcube-setup` now supports a
    descriptor-complete non-interactive flow via `--descriptors-location`, honors `--latest` and
    `--release` as explicit overrides for `assembly.platform.ref`, stages `secrets.yaml` and
    `bundles.secrets.yaml` correctly for `secrets-file`, and starts the runtime without extra
    prompting when the descriptor set is complete.

    Bundle development on localhost also became faster. The platform now documents and supports a
    clearer host-bundles-root flow, local and git bundle resolution under the same mounted bundles
    storage, and targeted `--bundle-reload` hot reload for descriptor-backed prototyping. Proc-side
    reload behavior was hardened so bundle code changes can be re-imported without flushing
    unrelated bundles.

    Finally, bundles can now mark dependency-heavy leaf helpers with `@venv(...)`. These helpers run
    in a cached per-bundle subprocess virtual environment derived from the runtime Python and rebuilt
    only when the bundle requirements file changes. The bundle and tools documentation was updated
    to explain this execution boundary explicitly, including that proc-bound runtime surfaces such as
    communicators, request context, DB pools, Redis clients, and tool bindings are not available
    inside the `@venv` child process.
config:
    version: "2026.4.10.153"
