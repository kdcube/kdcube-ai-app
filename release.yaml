platform:
  repo: "kdcube-ai-app"
  ref: "2026.4.22.1221"
  description: |
    This release focuses on bundle/runtime contract hardening, descriptor-driven metrics
    configuration, stricter bundle enablement enforcement, chat UI correctness, and clearer
    operator and bundle-author guidance for configuration and secret access.

    Highlights

    - Bundle enablement is now enforced at the resource level. Disabled bundles no longer rely on
      partial or accidental runtime filtering; the enabled configuration is checked explicitly where
      bundle resources are exposed.
    - Metrics service configuration has been moved into descriptor-driven settings. The metrics
      runtime now reads its operational configuration from the normal settings surface instead of
      depending on a separate ad hoc configuration path.
    - Runtime secret resolution is cleaner and more predictable. Secret-backed settings now follow
      the normalized helper contract more consistently, and example-bundle cleanup no longer fails
      noisily when shared filesystem assumptions are not met.
    - Chat interaction behavior is more correct for users. Conversation id generation is now owned
      by the back end, and the chat UI fix removes duplicate-turn creation and the stale input field
      after send.
    - Configuration and secret usage guidance is much clearer for engineers. The runtime
      read/write contract is now documented explicitly, and bundle docs now prohibit raw env,
      direct provider, and hardcoded descriptor-path access outside the narrow iso-runtime
      exception.

    Runtime and deployment work in this release line:

    - Metrics runtime settings are now represented through the descriptor/settings model instead of
      a special-case runtime surface, which makes local, compose, and deployed behavior easier to
      reason about.
    - Secret resolution now favors the normalized helper path for promoted settings, reducing
      inconsistent reads across runtime bootstrap and feature code.
    - Example-bundle shared cleanup was hardened so missing or non-writable shared bundle paths no
      longer break routine cleanup execution.
    - Server-side conversation id generation keeps identity issuance in the back end instead of
      splitting that responsibility across UI and server behavior.

    Bundle/runtime and documentation work:

    - Added a dedicated runtime read/write contract page covering `get_settings()`, `get_secret()`,
      `get_plain()`, bundle props, user props, and user secrets on one page.
    - Bundle authoring docs now make the supported configuration access rules explicit: normal
      bundle code must use the helper contract rather than raw `os.getenv(...)`, direct
      secrets-provider calls, or hardcoded descriptor file paths.
    - Metrics service configuration and export docs were clarified to match the actual runtime
      contract after the descriptor-driven settings move.

    Changelog

    - Added enabled-config enforcement for bundle resources.
    - Moved conversation id generation fully to the back end.
    - Moved metrics service runtime configuration into descriptor-backed settings.
    - Normalized runtime secret resolution and hardened example-bundle cleanup behavior.
    - Fixed duplicate-turn creation and uncleared input after send in the chat UI.
    - Added a one-page runtime read/write contract for helper-based config and secret access.
    - Prohibited raw env, direct secrets-provider, and hardcoded descriptor-path access in bundle
      authoring guidance outside the explicit iso-runtime exception.
