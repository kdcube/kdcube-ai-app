platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.18.414"
  description: |
    This release refines KDCube’s isolated execution story and the bundle/runtime contract around it.
  
    The main change is a cleaner execution-runtime model for bundles. Bundle properties can now define named execution profiles under a single execution.runtime object, and workflow
    code can explicitly select those profiles in a direct way. The built-in with-isoruntime example was updated to demonstrate this clearly, and the platform documentation now
    explicitly describes the reserved bundle properties that drive runtime selection, model roles, economics, and related platform behavior.
  
    On the runtime side, isolated execution delivery was hardened for both local Docker and cloud execution. External runtime environment shaping is now centralized, Docker and Fargate
    use a shared preparation path, and Fargate no longer tries to push the full execution payload through oversized ECS container overrides. Instead, the runtime payload is delivered
    through a secret-backed transport and restored inside the exec container before bootstrap. This also comes with much better diagnostics: Fargate task-state logging is more
    informative, payload hydration is logged explicitly in the exec entrypoint, and runtime failures are surfaced in a clearer way.
  
    This release also improves operational robustness around bundle execution. Bundle entrypoints now have a canonical turn-error propagation path that preserves economics limit
    behavior while making ordinary bundle failures visible to the client. Cached singleton workflows refresh their request-scoped context correctly, avoiding stale user/session state
    across proc requests. Git-backed bundles now hold the local lock through the actual git operation rather than releasing it too early, preventing concurrent pull races. A centralized
    local/CI validation entrypoint was also added so the growing test suite can be run through one shared command path.
