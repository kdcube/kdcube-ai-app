platform:
  repo: "kdcube-ai-app"
  ref: "2026.07.20.444"
  description: |
    This release follows 2026.07.16.140.

    Agent-neutral runtime harness modules now own conversation records, timeline
    projection, event resolution, workspace references, artifact storage, and
    out-of-band file delivery. ReAct and hosted-agent implementations consume
    these shared contracts instead of carrying parallel artifact and timeline
    systems, while conversation-file references remain stable across turns,
    agent frameworks, and materialization boundaries.

    Connection Hub now models delegated access at both agent and external-account
    scope. Per-agent grants can select concrete connected accounts, consent is
    editable in place, provider claims are enforced per account, and denial
    produces a scoped demand that can guide the user back to the correct consent
    surface. Reusable SDK contracts cover credential views, delegated MCP calls,
    consent state, result normalization, and claim-aware authorization without
    coupling application code to the Connection Hub bundle.

    Named services gain agent-neutral discovery and instruction surfaces,
    connected-account routing, explicit provider ownership, and governed MCP
    integration paths. The built-in and ported LangGraph examples demonstrate
    platform services, web tools, conversation and memory access, per-agent
    consent, and bounded output delivery without making Slack or mail mandatory
    defaults.

    ReAct v3 now handles streamed decision feedback, rejected completions,
    final-answer salvage, and retry lineage more deterministically. Lightweight
    instruction profiles retain full protocol signal at smaller prompt sizes.
    The model gateway adds custom-provider streaming, LangChain integration,
    configurable serving context, disconnect cancellation, and a documented
    local Ollama setup.

    CLI initialization and config application now reconcile Cognito and
    application-hosted authentication, Telegram companion settings, CORS, and
    generated descriptors with expanded tests. Shared UI builds survive request
    cancellation and expose clearer save, reload, preload, and retry boundaries.
    User and application property paths are fully asynchronous, and the
    crawler-visible architecture, execution-profile, security, and trust
    documentation now states the deployed boundaries and operator
    responsibilities precisely.
config:
  version: "2026.07.20.444"
