platform:
  repo: "kdcube-ai-app"
  ref: "2026.4.12.318"
  description: |
    This release turns live bundle configuration in AWS-backed deployments into a real persistent
    runtime surface instead of a mostly Redis-only cache. Bundle deployment-scoped props now live
    as grouped per-bundle descriptor documents in AWS Secrets Manager, bundle deployment-scoped
    secrets now live as grouped per-bundle secret documents with `a:` / `b:` namespace lookup, and
    user-scoped non-secret bundle props are now persisted in PostgreSQL. Redis remains a cache and
    notification layer instead of the only durable authority for live bundle changes.

    The CLI and runtime now also support exporting the current effective live bundle state for a
    tenant/project back into `bundles.yaml` and `bundles.secrets.yaml`. That closes the loop
    between runtime admin changes and redeployable descriptors, which is especially important for
    ECS environments where bundles can be added or updated during operational time.

    Bundle authoring guidance was expanded with a dedicated builder skill in `kdcube.copilot`.
    That skill now acts as the bundle-development index for the platform: lifecycle, runtimes,
    authenticated and public APIs, widgets, main UI, storage, props, secrets, `@venv(...)`,
    `@cron(...)`, React v2, Claude Code, and optional multi-runtime composition inside one bundle.

    The SDK now also ships a public Node or TypeScript backend bridge reference. Bundle authors can
    keep KDCube-native lifecycle, props, secrets, and public APIs in Python while delegating
    selected backend logic to a local Node/TS service through a narrow explicit bridge, without
    relying on private customer bundles as the only example.
config:
    version: "2026.4.12.318"
