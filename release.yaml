platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.6.342"
  description: |
    This platform release improves bundle-to-client communication, Data Bus
    transport handling, federated browser-client access, Socket.IO routing,
    and ReAct timeline preview behavior.

    Highlights

    - Adds scoped bundle communication support so bundle operations can target
      connected peers and sessions more consistently.
    - Adds a concrete Data Bus runtime path for durable bundle-owned messages,
      including Redis stream admission, proc-owned workers, handler dispatch,
      partition locking, result records, and focused regression coverage.
    - Adds short-lived federated Data Bus tokens for browser clients that are
      authenticated by a bundle-specific public entrypoint before connecting to
      the platform Socket.IO transport.
    - Keeps Data Bus Socket.IO ingress at the transport boundary: ingress now
      authenticates and enqueues, while proc loads bundle manifests and
      enforces bundle/handler visibility before invoking handlers.
    - Aligns bundle Socket.IO clients and nginx proxy templates on the root
      Socket.IO namespace and standard `/socket.io` path.
    - Refreshes generated local proxy config during `kdcube refresh`, so proxy
      template fixes are applied to existing local workdirs.
    - Improves ReAct dry-run timeline previews by expanding rendered text while
      keeping preview output bounded.
    - Fixes asynchronous integration callback handling.
    - Updates bundle communication and Data Bus documentation with the current
      platform-authenticated and bundle-issued federated client handshakes.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.6.6.342 to receive this
      update.
    - Local deployments that use `kdcube refresh` will refresh the generated
      nginx proxy config from the platform templates.
    - Browser Socket.IO clients should connect on namespace `/` and path
      `/socket.io`.
    - Data Bus publish acknowledgements confirm stream admission only. Handler
      success, visibility failures, and domain conflicts are proc-side results.
    - Bundle-issued federated clients should obtain their token from a bundle
      endpoint that validates the upstream identity before opening Socket.IO.

    Validation and regression coverage:

    - Focused Socket.IO Data Bus ingress tests passed.
    - Focused Data Bus stream/lock tests passed.
    - Python compile checks for updated Data Bus runtime modules passed.
    - TypeScript checks for updated referent bundle UI clients passed.
    - Staged release diff private-name scan must pass before the release
      commit.

    Changelog

    - Added scoped bundle communication support.
    - Added bundle-issued federated Data Bus token support.
    - Added Data Bus runtime worker and stream coverage.
    - Moved Data Bus handler visibility enforcement to proc.
    - Fixed standard Socket.IO route handling in nginx templates and local
      refresh.
    - Fixed bundle Socket.IO namespace defaults.
    - Fixed asynchronous integration callback handling.
    - Improved ReAct dry-run timeline previews.
config:
    version: "2026.6.6.342"
