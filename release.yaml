platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.4.1846"
  description: |
    This release focuses on Telegram and React turn delivery reliability,
    communicator-backed progress streaming, buildable bundle widgets, bundle MCP
    lifecycle fixes, safer user-attachment handling, reusable bundle tool
    primitives, scheduler/backend determinism, async secrets support, and updated
    SDK/bundle documentation.

    Highlights

    - Added communicator activity streaming support so bundle transports can
      subscribe to typed React/tool progress events and surface long-running work
      before the final assistant answer is available.
    - Improved React timeline handling for user attachments and generated
      artifacts, including hosted/base64 attachment hydration and non-PDF binary
      files that should be materialized instead of sent directly to model
      document inputs.
    - Fixed non-PDF attachment handling so PDFs still use document blocks while
      other supported files are represented safely and can be inspected through
      hosted/materialized paths.
    - Added buildable source-folder bundle widget support, widget subpath serving,
      and rebuild fixes for multiple widgets and stale/cached widget build
      inputs.
    - Fixed bundle MCP lifecycle handling and turn payload state propagation so
      FastMCP-backed bundle endpoints and recovered turn logs work reliably.
    - Added reusable bundle tool context primitives and documentation so bundles
      can share consistent scope binding, result envelopes, and structured tool
      diagnostics.
    - Added bundle background job stream support and improved external event
      owner/turn handling for scheduled or background task flows.
    - Applied bundle props to REST operations and fixed bundle tool integration
      rebinding so runtime configuration changes are respected consistently.
    - Added async secrets runtime support for deployment/runtime paths that need
      non-blocking secret resolution.
    - Improved scheduler/backend tests and determinism for processor runtime
      behavior.
    - Cleaned up isolated exec subprocess event-loop shutdown so successful code
      execution does not leave noisy "event loop is closed" warnings.
    - Expanded SDK, bundle builder, chat interface, path topology, and streaming
      documentation around the current React/bundle runtime contracts.

    Runtime work in this release line:

    - Telegram-facing bundle flows can now use communicator activity, hosted
      attachments, recovered turn logs, and generated artifact metadata without
      depending on local turn workspaces that are cleaned after the turn.
    - Buildable widget loading now treats each widget as its own source/build
      contract and avoids stale command/source state when multiple widgets are
      configured in the same bundle.
    - Bundle MCP dispatch now initializes the ASGI/FastMCP lifecycle correctly
      and supports stateless bundle MCP servers.
    - React user inputs are safer across modalities: PDFs remain first-class
      model document inputs, images stay image inputs, and other binary files
      become hosted/materialized artifacts that code/tools can inspect.

    Validation and regression coverage:

    - Added and updated tests for hosted/base64 user attachments, non-PDF
      timeline attachment handling, widget source-folder builds, bundle MCP
      lifecycle behavior, bundle tool context/rebinding, background job streams,
      scheduler/backend determinism, and isolated exec cleanup.
    - Added documentation and contract checks for bundle widget integration,
      bundle release workflow, chat interfaces, and turn path prefix guidance.
    - Focused platform tests were run during the individual fixes in this release
      line.

    Changelog

    - Added communicator-backed activity streaming hooks for bundle transports.
    - Added hosted/base64 user attachment hydration and safer non-PDF handling.
    - Added source-folder buildable bundle widgets and widget subpath support.
    - Fixed multiple-widget rebuild behavior and stale widget build inputs.
    - Fixed bundle MCP lifecycle and stateless bundle MCP compatibility.
    - Added reusable bundle tool context and related SDK documentation.
    - Added bundle background job stream support.
    - Applied bundle props consistently to REST operations.
    - Fixed bundle tool integration rebinding.
    - Added async secrets runtime support.
    - Made processor scheduler/backend tests deterministic.
    - Cleaned up isolated exec subprocess shutdown.
    - Updated SDK/bundle/chat documentation for current runtime contracts.
config:
    version: "2026.5.4.1846"
