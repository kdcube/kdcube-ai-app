platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.10.209"
  description: |
    This release improves local setup and auth configuration:
    - Added auth mode selection (simple vs Cognito) in the CLI wizard.
    - Cognito configs are now generated correctly (authority + client ID), and hardcoded tokens are removed when Cognito is used.
    - Frontend config selection is now auth‑aware (hardcoded or cognito).
    - The nginx proxy runtime config is now patched to match the UI routesPrefix, ensuring consistent routing for custom prefixes.
    - Added support for delegated proxy template (disabled for now) and runtime proxy config selection in compose.
    - Workdir proxy config is now aligned with the selected auth mode and compose runtime file.
  config:
    version: "2026.3.10.209"