platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.24.420"
  description: |
    This documentation-focused platform release updates the communication and
    bundle SDK docs for tenant/project-scoped SSE events and the
    `comm.project_event(...)` primitive.

    Highlights

    - Documents the three bundle-to-client event scopes: direct peer delivery
      through `KDC-Stream-ID`, current-session broadcast through
      `comm.service_event(..., broadcast=True)`, and tenant/project SSE
      broadcast through `comm.project_event(...)`.
    - Adds the `/sse/stream?project_events=true` client contract and the
      bundle-side `comm.project_event(...)` recipe in the bundle client
      communication guide.
    - Updates the comm architecture docs to include the tenant/project
      `chat.events.__project__` channel, opt-in SSE subscription behavior, and
      the guidance that project events are for compact debounced snapshots, not
      raw telemetry or logs.
    - Keeps the signal narrow in Tier 1 bundle-builder docs: the building-block
      map points builders to the detailed contract, while the broader authoring
      docs are not repeated with the full recipe.
    - Removes the stale documentation claim that non-chat bundle live events
      cannot have a tenant/project broadcast path.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.24.420 to receive this
      documentation update.
    - No runtime code or descriptor shape migration is part of this release.
    - Tenant/project SSE event support remains an opt-in client behavior:
      widgets must open `/sse/stream` with `project_events=true`.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - Documentation diff check passed for the scoped release files.
    - Staged OSS private-name scan passed before commit.

    Changelog

    - Added tenant/project SSE event documentation to comm service docs.
    - Added bundle-facing `comm.project_event(...)` usage guidance.
    - Updated the transport map and platform integration scope table.
    - Added a single Tier 1 discovery pointer in the SDK building-block map.
config:
    version: "2026.5.24.420"
