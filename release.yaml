platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.21.145"
  description: |
    This patch release tightens CLI startup behavior, split Docker execution
    logging, and ReAct timeline/runtime behavior after the 2026.5.20.x
    isolated-runtime updates.

    Highlights

    - Prepares Docker Compose log bind directories during CLI start, using the
      generated Compose transport values, so clean installs do not let Docker
      create root-owned log directories.
    - Improves split isolated-runtime log feedback while preserving the
      executor isolation boundary.
    - Orders generated file timeline entries by emission time and shows them
      before final answers.
    - Separates streamed answer content from raw final_answer completion events.
    - Adds per-action step streaming keys and stronger ReAct causality guards
      for multi-action planning.
    - Documents stream families, long-running lifecycle behavior, ECS layout,
      and Claude Code integration notes.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.21.145 to receive the
      CLI start-time Compose log preparation and runtime/timeline fixes.
    - No descriptor shape migration is required.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - Focused CLI descriptor tests passed for generated Compose log directory
      handling.
    - Python syntax validation passed for changed CLI files.
    - Staged OSS private-name scan passed before commit.

    Changelog

    - Fixed CLI Compose log bind preparation during start.
    - Improved isolated execution logging feedback and timeline stream
      rendering behavior.
    - Tightened ReAct causality guidance and protocol guards.
config:
    version: "2026.5.21.145"
