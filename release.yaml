platform:
  repo: "kdcube-ai-app"
  ref: "2026.4.12.500"
  description: |
    This release adds a shareable Claude Code builder plugin marketplace to the SDK. The plugin
    bootstraps a clean one-bundle local descriptor set, defaults local auth to a simple local
    mode, gives Claude Code explicit bundle-authoring guidance, and provides concrete local
    runtime actions for start, reload, stop, and bundle-suite validation.

    The same release line also fixes the new persistent user-props runtime path in ECS and other
    split-service deployments. Ingress, proc, metrics, and exec images now include `psycopg2`,
    which is required by the user props manager introduced in the previous release. Without that
    addition, those services could fail on startup with `ModuleNotFoundError: No module named
    'psycopg2'`.

    The live bundle configuration model from the previous release remains in place: deployment-
    scoped bundle descriptor state and bundle secrets persist in AWS-backed deployments, user-
    scoped non-secret bundle props persist in PostgreSQL, and the runtime can export effective live
    `bundles.yaml` and `bundles.secrets.yaml` for redeployable state capture.
config:
    version: "2026.4.12.500"
