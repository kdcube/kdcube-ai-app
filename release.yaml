platform:
  repo: "kdcube-ai-app"
  ref: "2026.4.21.1656"
  description: |
    This release focuses on descriptor-driven runtime maturity, secret/provider alignment, bundle
    runtime correctness, ingress conversation identity hardening, and improved operational support
    for local and deployed environments.

    Highlights

    - Descriptor-driven runtimes are more robust end-to-end. CLI bootstrap now seeds stronger
      local-first defaults, preserves mounted bundle paths in reused runtimes, reads current AWS
      descriptor values when needed, and precreates metrics log mounts for compose-based runtime
      setups.
    - Bundle runtime behavior was tightened in several places. Runtime inspection and split bundle
      root handling were added, bundle prop writes are now serialized, scheduler-driven bundle prop
      updates are published through the shared store, and shared infrastructure password lookup is
      now driven through the configured secret provider.
    - Gateway/runtime config resolution is more predictable. Descriptor scope placeholders are now
      resolved centrally, and the runtime no longer depends on inconsistent ad hoc expansion paths.
    - Chat ingress now owns conversation identity correctly. New conversations receive a
      server-issued UUID at ingress time, supplied conversation ids are validated against the
      authenticated user, SSE returns the resolved conversation id in the HTTP ack, and Socket.IO
      now returns the same information via an explicit ack payload.
    - Operator workflows were improved around git and resume behavior. Git subprocesses now use a
      centralized repo-local commit identity contract, and Claude Code resume now treats git
      lineage as the authority when deciding whether a session can resume safely.
    - The control plane and proxy integration surface were extended. A single-key Redis delete
      action was added to control-plane tooling, and integrations now expose an exact bundle list
      route for callers that need strict bundle enumeration.

    Runtime and deployment work in this release line:

    - CLI compose runtimes now better preserve runtime-specific bundle mount behavior instead of
      flattening everything back to seed descriptor assumptions.
    - AWS-oriented descriptor flows can now read the currently configured deployment-side AWS keys,
      reducing drift between desired and active configuration.
    - Metrics runtime setup is more reliable in compose mode thanks to precreated log mounts and
      the related bootstrap fixes delivered in this release line.
    - Secret resolution is more consistent across the runtime, especially for infrastructure
      passwords and shared service configuration, because provider lookup has been unified instead
      of split across older code paths.

    Bundle/runtime and documentation work:

    - Bundle storage and runtime documentation were rewritten to reflect actual operational
      behavior, including the contract for mounted bundle paths, runtime descriptor reuse, and
      storage semantics.
    - Local runtime descriptor documentation now matches the shipped bootstrap behavior instead of
      older partial flows.
    - Bundle storage guidance was clarified so the runtime/storage contract is easier to operate and
      support in real deployments.

    Changelog

    - Added local-first descriptor bootstrap defaults for CLI-driven runtimes.
    - Added runtime bundle inspection support and split bundle root handling.
    - Preserved mounted local bundle paths when reusing existing runtimes.
    - Added compose bootstrap support to precreate metrics log mounts.
    - Added descriptor-aware AWS key lookup for CLI deployment flows.
    - Unified secret-provider lookup for shared and infrastructure password resolution.
    - Resolved descriptor scope placeholders centrally in gateway/runtime config handling.
    - Serialized shared bundle prop writes and published scheduler-side prop updates from the shared
      store.
    - Added exact bundle list exposure for proxy/integration consumers.
    - Added control-plane single-key Redis deletion support.
    - Centralized repo-local git commit identity handling.
    - Treated git lineage as the authority for Claude Code resume decisions.
    - Issued conversation ids at ingress, rejected unknown supplied ids, and aligned SSE and
      Socket.IO acknowledgment payloads around the resolved conversation id.
    - Expanded bundle/runtime documentation to match the actual deployment and runtime contract.
config:
    version: "2026.4.21.1656"
