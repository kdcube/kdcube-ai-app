platform:
  repo: "kdcube-ai-app"
  ref: "2026.7.10.1730"
  description: |
    This release follows 2026.7.10.1445 on the same day and carries the ReAct
    doneness semantics and the named-service relay for isolated runtimes.

    The DONE rule is set in stone: an action is done only when its own visible
    successful result record says so — doneness evidence is the action's result,
    never a matching permission, a prerequisite that succeeded, or a nearby
    message. Re-execution requires a current request; ANNOUNCE is specified as a
    snapshot of what holds rather than news, and the rule is distilled to five
    lines in the agent's instructions.

    Isolated runtimes gain a named-service relay: exec-brokered code reaches
    named-service providers over the Data Bus instead of holding direct clients.
    The cross-runtime context documentation adds named-service client policy to
    the portable room, and tier-1 builder docs gain the delegated-to-KDCube
    building block plus a base-dependencies check before @venv use.

    The Connection Hub account row now leads with what was granted.
config:
  version: "2026.7.10.1730"
