platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.22.013"
  description: |
    Compared with `2026.3.21.410`, this release is smaller in scope but fixes an important deployment/runtime correctness problem around built-in bundles on shared ECS storage.

    The main change is that built-in example bundles copied into shared `/bundles` are no longer treated as a single stable directory that survives image upgrades forever.
    Previously, on ECS/EC2 with EFS-backed shared bundle storage, a built-in bundle such as `react.doc@2026-03-02-22-10` could remain stale after a new platform image was deployed,
    because proc reused an already-existing `/bundles/<bundle-id>` copy instead of refreshing it from the image. This made new bundle code and skills invisible even after a
    successful rollout.
    
    This release changes built-in shared bundle materialization to a versioned-path model. Shared example bundles are now copied under paths of the form:
    
    `/bundles/{bundle_id}__{platform.ref}__{content_sha12}`
    
    where `platform.ref` is the deployed release/image tag and `content_sha12` is the content hash of the bundled source. This gives two important guarantees:
      - new proc tasks resolve and load the new bundle code from a new shared directory after rollout
      - already-running requests can continue safely on the old loaded bundle path, without in-place mutation of code under active workers
    
    The loader behavior remains registry-driven. Processor workers and proc-side integration/admin bundle loaders resolve bundles through the current registry entry and therefore
    through the current `BundleSpec.path`, not through a hardcoded `/bundles/<bundle-id>` filesystem shortcut. After a bundle registry update is applied and loader caches are
    cleared, subsequent bundle loads on that worker use the new published shared path automatically. This keeps bundle cutover safe while preserving the current request model.
    
    This release also extends stale-bundle cleanup to these new versioned shared example bundle paths. Old shared built-in bundle copies are now cleaned through the existing bundle
    cleanup flows, using the same active-path tracking and Redis-locked cleanup coordination already used for bundle lifecycle maintenance. That means the system can safely retain
    active bundle paths while eventually removing inactive old bundle versions from shared EFS storage.
    
    On the documentation side, processor architecture documentation was updated to explain current bundle code loading, cutover behavior, and shared built-in bundle versioning/
    cleanup in the context of proc workers and proc-side APIs. The stale ECS metrics component document was also replaced with a current description of how the Metrics service is
    actually deployed on ECS today, including its Fargate service shape, CloudWatch export wiring, and the authoritative service-scale metrics docs and Terraform sources to use.
    
    In practical terms, this release makes built-in bundle upgrades on ECS much more reliable:
      - new bundle code is no longer masked by an older persistent `/bundles` copy
      - rollouts no longer depend on manually deleting stale shared built-in bundle directories
      - old bundle versions can coexist safely during transition and then be cleaned later
      - proc and proc-side APIs continue to load bundle code from the current published registry path
    
    Key areas:
      - Versioned shared built-in bundle paths using `platform.ref` and content hash
      - Safe new-bundle cutover without in-place mutation of active bundle directories
      - Cleanup support for old shared built-in bundle versions on EFS
      - Processor architecture documentation updated for bundle cutover semantics
      - ECS metrics component documentation refreshed to match current deployment reality
