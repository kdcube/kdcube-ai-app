platform:
  repo: "kdcube-ai-app"
  ref: "2026.4.23.17"
  description: |
    This release focuses on making deployment-scoped overrides for built-in and reserved
    bundles durable under the file-backed bundle authority model.

    Highlights

    - Explicitly configured built-in or reserved bundles now keep their deployment-scoped
      descriptor properties when the authoritative bundle store is persisted and reloaded.
    - Bundle admin and deployment-authored prop overrides for reserved bundles no longer disappear
      after file-backed registry rewrites or reload-driven reconciliation.
    - This closes a real regression in the file-backed authority flow where reserved bundle ids
      were accepted on input but were dropped from the persisted authoritative view.

    Runtime work in this release line:

    - The authoritative bundle store now preserves explicitly configured reserved bundle ids when
      computing the persisted registry shape.
    - Reserved bundle prop writes now survive the same save/reload cycle as normal deployment
      bundles, so file-backed authority behavior is consistent across bundle classes.
    - This is especially important for built-in bundles such as
      `kdcube.copilot@2026-04-03-19-05`, where deployment config may override selected role
      models or other non-secret bundle properties.

    Validation and regression coverage:

    - Added regression coverage for reserved bundle props surviving authoritative-store reload.
    - Added regression coverage for later reserved bundle prop updates continuing to persist after
      reload.

    Changelog

    - Preserved explicitly configured reserved bundles in the authoritative descriptor store.
    - Fixed loss of deployment-scoped props for built-in bundles under file-backed authority.
    - Added reserved-bundle persistence regressions to prevent future reload/save regressions.
config:
    version: "2026.4.23.17"
