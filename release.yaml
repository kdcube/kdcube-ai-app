platform:
  repo: "kdcube-ai-app"
  ref: "2026.4.04.318"
  description: |
    This release focuses on making React a much stronger coding and bundle-building agent while
    continuing the broader bundle-interface and custom-UI rollout.

    A major part of this release is the new React SDK workspace model. React now supports two
    explicit workspace backends (`custom` and `git`) behind one stable agent contract based on
    logical refs and explicit activation. Historical or cross-turn workspace content is no longer
    assumed to be present locally: the agent must pull what it needs intentionally through
    `react.pull(...)`, and the runtime enforces that model instead of auto-hydrating old files for
    exec or patch operations.

    The git backend is now a real coding workspace, not just snapshot copying. Current turns start
    as sparse git-backed repos with lineage-isolated history, exact version-ref hydration, end-of-
    turn publish, and branch isolation designed so exec-visible code can only inspect the assigned
    lineage. The workspace model also now distinguishes durable project state in `files/...` from
    non-workspace artifacts in `outputs/...`, supports explicit checkout for rare whole-workspace
    switches, routes hosted binary pulls outside git, and surfaces compact workspace status in
    ANNOUNCE so the agent can continue project scopes more deliberately.

    The surrounding runtime was tightened to match that model: ignored/transient files are excluded
    from workspace publish, publish failures fail the turn, exact ref writes are resolved before
    materialization, and isolated exec supports internal-only artifacts that remain agent-visible
    without being emitted to the user.

    The bundle platform and UI surface also moved forward. The versatile reference bundle now has a
    modularized main-view service layer, KDCube copilot bundle naming was clarified, and the
    gateway/integrations path around guarded widgets and bundle-facing UI workflows was tightened.
    Static and custom bundle UI support remain a first-class path, with decorator-discovered bundle
    interfaces and richer frontend-facing manifests.

    On the documentation side, the React architecture story was expanded substantially. We now have
    design docs for git-backed isolated workspace management, memory architecture, and why React is
    not modeled as pure provider-native tool calling, alongside updated website/docs materials for
    bundle authors and platform users.
