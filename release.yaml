platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.11.2125"
  description: |
    This release focuses on ReAct workspace/materialization correctness,
    safer text artifact previews and patching, configurable ReAct iteration
    limits, built-in bundle compatibility, CLI descriptor initialization, and
    browser-session cleanup consolidation.

    Highlights

    - Added assembly/bundle configuration support for ReAct max rounds so the
      default iteration budget can be configured globally and overridden per
      bundle.
    - Centralized browser-session cleanup at the processor/runtime level and
      added cleanup logging so turn-completion cleanup is visible and auditable.
    - Hardened built-in example bundles after SDK decorator/config changes so
      older bundled workflows no longer break bundle loading or admin views.
    - Fixed CLI descriptor initialization flows so `kdcube init --set-secret`
      writes staged secrets correctly, and delegated-auth placeholders such as
      tenant/project/domain values are concretized during descriptor generation.
    - Clarified the ReAct rg/read/patch workspace contract: `react.rg` searches
      materialized readable artifacts, returns reusable `read_item` ranges, and
      works across `files`, `outputs`, and text attachments once those paths are
      present locally.
    - Improved ReAct workspace materialization signals. Pull/checkout results
      are now compact and model-facing workspace announce text distinguishes the
      current editable workspace from previous saved workspace paths.
    - Added line-numbered text artifact previews in the rendered timeline,
      including explicit guidance that preview line numbers are navigation aids
      and not file content.
    - Hardened `react.patch`: generated unified-diff hunk counts are normalized
      before apply, and patch/full-replacement input copied from line-numbered
      previews is rejected before it can corrupt files.
    - Deduplicated and tightened ReAct v2/v3 instruction surfaces by moving
      common workspace/tool behavior into shared instructions while preserving
      the operational details the model needs.

    Runtime work in this release line:

    - Agents get clearer continuation guidance after cross-turn work:
      historical `files/...` refs should be pulled when needed and checked out
      before editing, while `outputs/...` and attachments remain readable/fetchable
      artifacts.
    - Large or generated text artifacts are easier to inspect safely: line
      windows and line-numbered previews support `react.rg -> react.read ranges
      -> react.patch` without loading whole files into context.
    - Patch failures caused by harmless generated hunk-count drift are reduced,
      while dangerous preview-copy mistakes are blocked explicitly.
    - Browser automation remains turn-scoped, with cleanup handled outside
      bundle workflow code.
    - CLI seed-descriptor workflows preserve explicitly supplied secrets and
      resolve deployment placeholders more predictably.

    Validation and regression coverage:

    - Added focused ReAct patch tests for normalized hunk counts and rejection
      of copied line-numbered preview prefixes in both v2 and v3.
    - Added timeline rendering tests proving small and large text artifacts are
      rendered with line-number metadata while stored artifact content remains
      unchanged.
    - Added and updated ReAct pull/rg/workspace/write tests for compact
      materialization output, readable artifact roots, and workspace announce
      wording.
    - Added runtime configuration tests for ReAct iteration limit overrides.
    - Added CLI descriptor tests for set-secret and delegated placeholder flows.
    - Focused validation was run during the individual changes in this release
      line, including ReAct timeline rendering, patch, workspace announce/model
      prompt, pull, rg, write, CLI descriptor, and py_compile checks.

    Changelog

    - Added configurable ReAct max rounds.
    - Centralized browser-session cleanup in processor/runtime code.
    - Fixed built-in bundle widget/workflow compatibility.
    - Fixed CLI `--set-secret` descriptor initialization.
    - Fixed CLI delegated-auth descriptor placeholder substitution.
    - Clarified ReAct rg/search/read/edit workspace behavior.
    - Compacted `react.pull` and `react.checkout` result payloads.
    - Improved ReAct workspace announce text.
    - Added line-numbered text artifact timeline previews.
    - Added `react.patch` hunk-count normalization.
    - Added `react.patch` guard against copied rendered line numbers.
    - Updated ReAct workspace, tool, artifact discovery, runtime config, and CLI
      documentation.
