platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.20.227"
  description: |
    This patch release fixes shared executor log file permissions in isolated
    Python execution. It builds on the split Docker bind-source preparation in
    2026.5.20.212 by ensuring sandbox log files created during root bootstrap
    remain writable after the executor process drops to its unprivileged user.

    Highlights

    - Marks sandbox log files shared-writable when `EXECUTION_SANDBOX` is set.
    - Prevents root-created executor log files from blocking the dropped
      executor user from opening `/workspace/logs/executor/executor.log`.
    - Keeps the behavior scoped to sandbox runtimes; normal service logs are
      not changed.
    - Adds regression coverage for sandbox log file mode.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.20.227 to receive the
      executor log file permission fix.
    - No descriptor shape migration is required for existing deployments.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - Python syntax validation passed for changed runtime files.
    - Focused split runtime regression tests passed.
    - Staged OSS private-name scan passed before commit.

    Changelog

    - Fixed sandbox log file mode so root bootstrap logging and the
      unprivileged executor can share the same executor log file.
config:
    version: "2026.5.20.227"
