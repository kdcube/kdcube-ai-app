platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.20.212"
  description: |
    This patch release hardens isolated Python execution in split Docker
    runtime deployments. It builds on the 2026.5.20.126 executor log/artifact
    permission fix by preparing the actual Docker bind-source directories when
    translated host paths are opaque from inside chat-proc.

    Highlights

    - Prepares split executor bind-source directories from the Docker daemon
      side when translated host paths are not directly visible inside chat-proc.
    - Creates and normalizes per-execution work, artifact, executor log, and
      supervisor log directories before launching split runtime containers.
    - Keeps the executor container networkless and isolated; the preparation
      helper has no network access and only mounts per-execution workspace
      paths.
    - Preserves existing local/proc-visible permission normalization for
      deployments where the translated paths are directly visible.

    Runtime and deployment notes:

    - Deployments must point the platform ref at 2026.5.20.212 to receive the
      split runtime bind-source preparation fix.
    - No descriptor shape migration is required for existing deployments.
    - No private deployment content is part of this OSS release.

    Validation and regression coverage:

    - Python syntax validation passed for the changed runtime file.
    - Focused split runtime regression tests passed.
    - Staged OSS private-name scan passed before commit.

    Changelog

    - Fixed split Docker isolated runtime permission preparation for
      per-execution bind mounts, including executor log directories.
config:
    version: "2026.5.20.212"
