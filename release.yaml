platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.13.117"
  description: |
    This release focuses on public documentation MCP access, route-aware bundle
    Admin overrides, gateway reload configurability, reference bundle
    maintenance, and operational documentation for building and exposing
    KDCube bundles.

    Highlights

    - Exposes the KDCube documentation knowledge space through the public
      `kdcube-doc` MCP endpoint in the built-in copilot bundle, and documents
      the hosted dev.kdcube.tech endpoint in the repository README.
    - Fixes public MCP document reading so search results and subsequent
      `ks:` reads resolve against the same knowledge root.
    - Adds route-aware API enabled keys in Bundle Admin so public and
      operations APIs may safely share the same alias/method without colliding
      in bundle props.
    - Keeps resource enabled configuration sparse: missing enabled overrides
      now mean the code/decorator default applies, so descriptors do not need
      to enumerate every enabled API, widget, MCP endpoint, or routine.
    - Adds an assembly-level gateway startup override for loading
      `gateway.yaml`, and documents the reload flag for CLI/local deployments.
    - Updates the versatile reference bundle with Telegram hook/webapp
      examples, attachment-to-artifact handling, UI layout under `ui/main` and
      `ui/widgets`, and clearer setup/storage documentation.
    - Updates bundle-builder and website documentation so coding agents can
      discover Telegram, ngrok, UI layout, MCP, and Tier 1 bundle authoring
      guidance without reverse engineering examples.

    Runtime and SDK work in this release line:

    - Bundle Admin reads legacy `enabled.api.<alias>.<METHOD>` values for
      compatibility but writes canonical route-aware keys.
    - Built-in examples and the versatile reference bundle were aligned with
      the current UI source layout and descriptor override semantics.
    - Public MCP endpoints remain bundle-owned auth surfaces; the public
      documentation MCP endpoint intentionally does not require credentials.

    Validation and regression coverage:

    - Added focused regression coverage for route-aware enabled keys and
      versatile public API behavior.
    - Re-ran the focused versatile bundle test suite after the Admin/config
      changes.
    - Re-ran the task-and-memo Telegram webhook/public API regression suite
      before releasing the bundle content.

    Changelog

    - Added README banner for the public KDCube docs MCP endpoint.
    - Renamed the built-in public documentation MCP alias to `kdcube-doc`.
    - Fixed public MCP knowledge-space reads after MCP search.
    - Added route-aware enabled-key handling for API resources.
    - Removed explicit enabled-default clutter from reference bundle config.
    - Exposed gateway startup reload-from-file configuration.
    - Refactored reference bundle UI source layout to `ui/main` and
      `ui/widgets`.
    - Expanded versatile Telegram, storage, setup, and attachment docs.
    - Updated website and Tier 1 bundle-builder documentation for recent SDK
      and CLI flows.
