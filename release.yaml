platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.01.259"
  description: |
    This release focuses on bundle frontend integration, shared bundle state, and more reliable
    bundle-aware conversation APIs.

    The platform now supports loading bundle-provided frontend surfaces more directly, including a
    separate entrypoint for a bundle main index page and the custom bundle UI loader used by the
    new frontend work. The versatile reference bundle was expanded accordingly and now demonstrates
    a real widget wired through the integrations operations API, including request-context-aware
    widget patching, an editable collaborative preferences canvas, and an exec-backed report action.

    Durable user preference data in the versatile bundle now lives in shared bundle storage via
    `AIBundleStorage` instead of the local bundle filesystem. That makes preference capture, canvas
    editing, and bundle-local preference tools compatible with distributed deployment.

    Bundle builder documentation was also strengthened. The bundle platform integration design is
    now documented explicitly, the versatile bundle is positioned as the primary full-feature
    reference bundle, and `react.doc` was further tuned as a bundle-authoring copilot.

    On the API side, conversation routes no longer infer a default bundle id when the caller did
    not provide one. Instead, bundle identity is inferred from stored conversation data, which is
    the correct behavior for tenant-unique conversations and cross-bundle fetch/detail/feedback
    flows.
config:
    version: "2026.3.01.259"
