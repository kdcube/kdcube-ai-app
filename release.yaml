platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.16.1240"
  description: |
    Contents
    - Remove loop.add_signal_handler(SIGTERM) override in api/web_app.py and
      proc/web_app.py — uvicorn now owns SIGTERM and triggers lifespan teardown
      normally
    - Set draining=True at the start of lifespan teardown so /health returns 503
      during the graceful shutdown window, allowing the ALB to deregister the
      target before connections are dropped
    - Remove SIGTERM from faulthandler.register() in both services
    - Add timeout_worker_healthcheck (default 60 s, tunable via
      UVICORN_TIMEOUT_WORKER_HEALTHCHECK) to prevent uvicorn killing workers
      during heavy per-worker lifespan initialisation
    - Bump uvicorn to 0.37.0 (first version with timeout_worker_healthcheck)
  config:
    version: "2026.3.16.1240"