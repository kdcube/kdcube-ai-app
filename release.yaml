platform:
  repo: "kdcube-ai-app"
  ref: "2026.7.5.530"
  description: |
    This release follows 2026.7.4.310 and makes delegated automation access a
    first-class Connection Hub capability while carrying forward the ReAct realm
    refactoring, component source materialization, and economics storage
    cleanups that landed after the previous platform release.

    The main feature is user-created delegated automation access. A signed-in
    KDCube user can mint a short-lived bearer credential for an automation,
    script, or agent. The credential is backed by server-side resource grants
    rather than by claims embedded in the token: each grant record maps a
    resource pattern to the roles/permissions/grants that can be exercised
    there, and managed guards enforce the grant entry that matched the current
    request. Admin users can intentionally create all-surface automation
    credentials, while non-admin credentials remain bounded to configured
    resources.

    Connection Hub now exposes that capability through its connections widget
    and through SDK-owned delegated credential services. The UI gained a
    Delegated Access panel with resource-grant selection, and the backend gained
    automation-access issuance/revocation/listing plus managed REST admission
    support. Managed MCP and managed REST now share the same Connection Hub
    resource-grant model, which keeps delegated access orthogonal to whether the
    target surface is MCP, REST, a platform API, or an application API.

    The release also includes ReAct workspace and realm-reference cleanup. ReAct
    docs and runtime code now use explicit realm refs and workspace paths, the
    chat/event resolver path distinguishes conversation references from file
    drops more reliably, component shared sources are materialized for UI builds,
    and namespace presentation helpers were moved into shared component code.

    Finally, the economics subsystem moves user wallet accounting to a USD/cents
    model and replaces the older wallet token column language with
    user-credit-reservation terminology. The release includes the SQL migration,
    funding-flow updates, and related dashboard/control-plane adjustments.

    Highlights

    - Adds Connection Hub delegated automation access for user-created bearer
      credentials.
    - Adds SDK-backed automation access issuance, listing, revocation, and
      resource-grant storage.
    - Adds managed REST guard support alongside the existing managed MCP guard.
    - Adds the Connection Hub Delegated Access widget panel and resource-grant
      UI.
    - Enforces resource-specific grants instead of a global union of grants.
    - Supports wildcard resource grants for explicit admin all-surface
      automation.
    - Adds recipes for delegated automation access and managed REST protection.
    - Cleans up ReAct realm refs, workspace path handling, and source
      materialization.
    - Distinguishes conversation refs from conversation file drops in chat UI
      and event handling.
    - Moves namespace presentation helpers into shared component code.
    - Converts economics wallet accounting to USD/cents and user credit
      reservations.

    Operational impact

    - Connection Hub descriptors can now define delegated resources that are
      usable by automation tokens as well as by OAuth/MCP delegated clients.
    - Operators should model automation access as resource-grant entries, not as
      unscoped long-lived shared tokens.
    - Managed REST-protected endpoints can admit delegated automation callers
      using the same server-side grant store as managed MCP.
    - Admin all-surface automation is explicit: it should use the wildcard
      resource grant and an admin platform role such as
      kdcube:role:super-admin.
    - Deployments with existing economics data need the wallet USD-native SQL
      migration applied with the platform migration flow.
    - ReAct configuration and documentation should use the new realm-ref and
      workspace-path vocabulary.

    Changelog

    - Added delegated credential automation access services and tests under
      sdk/solutions/connections/delegated_credentials.
    - Extended Connection Hub entrypoint and widget UI for Delegated Access.
    - Added managed REST surface authentication helpers and guard tests.
    - Updated managed MCP/OAuth grant config tests for resource-grant handling.
    - Added Connection Hub docs and recipes for automation tokens and managed
      REST.
    - Updated ReAct docs, runtime, tools, workspace, and event-source code for
      realm refs and source materialization.
    - Updated chat/conversation presentation and drop handling around
      conversation refs and files.
    - Updated economics funding flow, wallet/user-budget code, SQL migrations,
      and UI dashboards for USD-native user credits.
config:
  version: "2026.7.5.530"
