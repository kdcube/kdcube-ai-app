platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.17.126"
  description: |
    This release fixes an ECS ingress regression in descriptor-backed
    deployments and tightens bundle/widget diagnostics after the
    2026.5.16.1704 platform release.

    Highlights

    - Fixes chat ingress failures where descriptor-backed deployments tried to
      create `/config/.bundles.yaml.lock` while reading the active bundle
      registry from a read-only ECS config mount.
    - Separates ingress and proc responsibilities for bundle registry access:
      ingress now reads only the Redis-published registry metadata snapshot,
      while proc remains responsible for descriptor refresh, git/built-in
      bundle materialization, bundle preload, and `on_bundle_load()` hooks.
    - Adds a writable fallback lock location for file-backed bundle descriptors
      so legitimate proc/admin descriptor operations still work when the
      descriptor itself is mounted read-only.
    - Downgrades ECS host-path warnings for managed bundle directories to DEBUG
      because host-side EFS paths are not expected to exist inside application
      containers.
    - Improves widget load diagnostics and removes the silent admin-bundle
      fallback when a requested bundle fails to load, so widget lookup errors
      report the actual requested bundle/workflow state.
    - Adds preload registry snapshot logging to make built-in and git-backed
      bundle startup behavior easier to verify in ECS logs.
    - Expands the public KDCube capabilities overview with clearer coverage of
      hot reload, ReAct followups/steer, ANNOUNCE, MCP tools, custom skills,
      multimodality, and ISO runtime usage beyond ReAct.

    Runtime and deployment notes:

    - Ingress does not import bundles, run bundle hooks, resolve git bundles,
      or reread descriptor files. It only validates bundle ids/defaults from
      the cached registry snapshot and enqueues work for proc.
    - Proc remains the owner of active descriptor refresh and must publish the
      Redis registry snapshot before ingress can accept chat requests.
    - The previous noisy
      `HOST_MANAGED_BUNDLES_PATH points to missing path ...` ECS message is no
      longer emitted at WARNING level.

    Validation and regression coverage:

    - Re-ran Python compile checks for bundle registry/store, git bundle path
      resolution, proc startup, and integrations routes.
    - Re-ran the focused bundle registry runtime-context test module with
      explicit `PYTHONPATH`; all 7 tests passed.
    - Re-ran `git diff --check` for the committed hotfix files.

    Changelog

    - Fixed ingress registry reads to use Redis metadata only on non-proc
      components.
    - Added read-only descriptor lock fallback for file-backed bundle
      descriptors.
    - Reduced ECS managed-bundle host-path warning noise.
    - Added bundle preload and widget mismatch diagnostics.
    - Removed silent admin fallback from requested bundle load failures.
    - Updated KDCube public capabilities documentation.
config:
    version: "2026.5.17.126"
