platform:
  repo: "kdcube-ai-app"
  ref: "2026.6.15.1942"
  description: |
    This release strengthens KDCube's namespace-service integration across
    chat, canvas, pinboard, ReAct, and composed scene surfaces. Provider-owned
    objects can now travel through common UI surfaces as generic object
    references while the owning provider remains responsible for resolving,
    previewing, opening, downloading, and mutating those objects.

    The main product outcome is that app-owned namespaces such as tasks,
    files, memories, canvas objects, and future domain objects can participate
    in the same drag, pin, click, and tool flows without embedding
    namespace-specific behavior in the common components. Canvas and chat route
    object actions through resolver/provider contracts; providers define what
    an object can do.

    Highlights

    - Adds a shared SDK URL helper for browser-callable bundle operations.
      Providers can return auth-bound operation URLs for actions such as
      downloads instead of pushing file bytes through JSON responses.
    - Updates canvas object action handling so resolver responses can expose
      `download_url` alongside existing UI-event and preview responses.
      Canvas logs now distinguish download URLs from legacy base64 payloads.
    - Adds a binary download operation path for the Versatile canvas service.
      Canvas artifact refs are resolved by the canvas artifact resolver and
      streamed back through a normal bundle operation response.
    - Updates canvas artifact resolution so downloads return metadata and a
      provider/consumer URL, not embedded `content_base64`. The resolver still
      owns byte lookup, filename selection, MIME metadata, and missing-ref
      errors.
    - Improves canvas rehosting of `cnv:` refs by using the same artifact
      resolver path that powers object actions. This keeps rehosting,
      downloads, and resolver behavior aligned.
    - Extends the shared canvas component to expose provider object
      attachments in expanded card views. Attachments discovered from a
      provider preview become draggable context rows that can be sent to chat
      or pinned onto canvas.
    - Adds `hosted_uri`/`download_url` awareness to canvas and chat API types
      so object-action results can travel cleanly through frontend clients.
    - Updates the pinboard host integration to subscribe to canvas patch
      notifications over the Data Bus and apply live canvas updates when other
      surfaces mutate the same board.
    - Hardens Data Bus result typing so frontend consumers do not assume every
      service envelope `data` payload is already an object map.
    - Adds tests for Data Bus stream/lock behavior affected by the stronger
      typing.
    - Normalizes named-service host-file artifact paths in ReAct so hosted
      file operations can find user-provided files under runtime output/work
      roots instead of failing on prompt-scoped display paths.
    - Hardens ReAct timeline rendering when a tool result stores `error` as a
      string instead of a structured error object. The timeline now renders
      those failures instead of crashing during the next decision prompt.
    - Updates ReAct event-reference resolution so file/object actions can use
      provider-owned download URLs where available.
    - Updates named-service provider tests to cover the new object action and
      download response shapes.

    Namespace-service contract

    - Providers own object semantics for their namespace. A provider resolver
      declares capabilities, resolves previews/details, returns default open
      effects, handles object actions, and provides download URLs or binary
      operation endpoints where appropriate.
    - Consumers such as chat, canvas, pinboard, scene, and ReAct should not
      hardcode behavior for a namespace. They pass object refs and requested
      actions to the provider contract, then execute the generic response
      shape.
    - Common UI surfaces can show object chips, context rows, and canvas cards
      using generic metadata: kind, label, summary, ref, logical path,
      `hosted_uri`, MIME type, capabilities, and provider action responses.
    - Provider-owned downloads should prefer an auth-bound download URL or
      binary bundle operation. JSON `content_base64` remains a compatibility
      path, but it is no longer the primary path for provider object downloads.

    Canvas and pinboard behavior

    - Canvas card actions now follow the provider/consumer split:
      the user clicks or downloads a card, the consumer bundle operation routes
      through its resolver registry, and the provider/resolver returns the
      response the UI should execute.
    - Provider object previews can include attachment objects. The shared
      canvas component renders those attachments in the expanded card flyout
      and makes them draggable without learning provider-specific rules.
    - Pinboard listens for canvas patch results over the Data Bus, so a board
      open in one surface can update when another surface applies a patch.

    ReAct and tool behavior

    - ReAct named-service tools and event ref actions now align with the same
      provider-owned object model used by canvas. ReAct should pass
      namespace/object refs to named-service operations rather than inventing
      file-system paths for provider-owned objects.
    - String-shaped tool errors are rendered safely in the timeline, avoiding a
      graph failure when the next decision prompt includes a failed tool
      result.
    - Host-file artifact path normalization lets provider host-file operations
      resolve user attachments from runtime artifact roots.

    Documentation

    - Expands the namespace-service provider documentation with provider
      execution surfaces, binary download expectations, and provider-owned
      object action responsibilities.
    - Expands the namespace-service client documentation with consumer
      execution surfaces and the meaning of a consumer operation such as
      `canvas_object_action`.
    - Adds detailed integration diagrams for canvas card actions and ReAct
      named-service tool calls, including which code executes each step and
      which parts are customized by the consumer or provider.
    - Updates canvas pin/action docs and chat widget docs to describe
      draggable context objects, object action responses, and provider-owned
      downloads.

    Runtime and deployment notes

    - Deployments must point the platform ref at 2026.6.15.1942 to receive
      these namespace-service, canvas, chat, and ReAct fixes.
    - Apps that provide object namespaces should implement provider resolvers
      for capabilities, preview/details, object actions, and provider-owned
      downloads where the namespace exposes files or artifacts.
    - Apps that consume object namespaces should route through the resolver
      registry or named-service tools rather than adding namespace-specific
      behavior to common components.
    - Existing canvas and chat flows remain compatible with older object-action
      responses. New providers should prefer `download_url` or binary
      operation responses over base64-in-JSON for downloads.

    Changelog

    - Added `bundle_operation_url(...)` SDK helper and tests.
    - Added canvas artifact resolver download URL support and tests.
    - Added Versatile canvas binary object-download operation.
    - Added provider attachment rendering and dragging in shared canvas card
      flyouts.
    - Added frontend `download_url` and `hosted_uri` response handling in
      canvas/chat-related types.
    - Added pinboard Data Bus subscription for live canvas patch updates.
    - Strengthened Data Bus envelope typing and tests.
    - Normalized named-service host-file artifact paths for ReAct.
    - Hardened ReAct timeline rendering for string-shaped tool errors.
    - Updated namespace-service, canvas, and chat documentation for provider
      object action flows.
config:
