platform:
  repo: "kdcube-ai-app"
  ref: "2026.4.02.357"
  description: |
    This release focuses on bundle platform ergonomics, declarative bundle interfaces, and the
    versatile reference bundle as the primary end-to-end example for bundle authors.

    The platform now supports declarative bundle interface metadata through bundle entrypoint
    decorators. Bundles can describe API methods, widgets, message entrypoints, and UI surfaces in
    code, and the integrations controller can expose bundle manifests, widgets, and API operations
    from that metadata while remaining backward compatible with legacy method lookup.

    Bundle runtime and client communication were also clarified and improved. The processor now
    accepts a configurable stream-id header so REST-originated bundle operations can target a
    specific connected peer instead of only broadcasting to the whole session. Runtime bootstrap for
    bundle tools was standardized across in-process and isolated execution, and the SDK docs now
    explain communicator usage, SSE/Socket.IO delivery semantics, headers, cookies, and bundle
    client integration much more explicitly.

    The versatile reference bundle was expanded substantially. It now demonstrates shared
    bundle-storage-backed user preferences, a much simpler notebook-style collaborative preferences
    widget, Excel import/export, exec-backed report generation, downloadable report payloads, bundle
    props and secrets usage, built-in web tools, and stronger preference-memory guidance for agent
    behavior. The reference widget and tool tests were moved into the bundle itself, and the SDK now
    includes a runner that combines the shared bundle harness with bundle-local tests.

    Bundle delivery and UI loading were also hardened. Static bundle UI can now build on first
    request, bundle-specific frontend code receives the resolved bundle id during build, and bundle
    operations routes support both explicit bundle-id paths and the backward-compatible default form.
    Git-backed bundle synchronization is now stricter for both exact refs and branch refs, avoiding
    invalid detached-HEAD pull behavior and making fetch/reset failures fatal.
config:
    version: "2026.4.02.357"
