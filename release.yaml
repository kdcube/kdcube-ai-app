platform:
  repo: "kdcube-ai-app"
  ref: "2026.07.15.415"
  description: |
    This release follows 2026.7.15.150.

    Application identity is now preserved throughout bundle loading. BundleSpec
    has one authoritative immutable shape with a required id, every runtime
    construction path supplies that id, and loader cache keys include it. This
    prevents applications that share a code location from colliding and restores
    application-hosted site initialization, including property-default loading,
    without the prior missing-id failure.

    Focused regression coverage now checks identity propagation, static
    entrypoint loading, singleton request context, and cache eviction. Bundle
    lifecycle and processor architecture documentation describe the identity
    contract, while the repository README more clearly presents KDCube as the
    runtime around an application's own agent or the built-in KDCube ReAct Agent.
config:
  version: "2026.07.15.415"
