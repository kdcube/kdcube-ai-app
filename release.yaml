platform:
  repo: "kdcube-ai-app"
  ref: "2026.3.16.127"
  description: |
    This release fixes the secrets backend configuration model so it matches the intended descriptor boundaries.
  
    Secrets provider selection is now driven by assembly.yaml instead of gateway config. The runtime no longer reads secrets backend settings from GATEWAY_CONFIG_JSON, the local
    installer now reads assembly.yaml.secrets.provider and renders SECRETS_PROVIDER into service env files, and ECS Terraform reads the same field and injects it into task envs. This
    keeps gateway config limited to gateway concerns only, while actual secret values continue to come only from secrets.yaml, bundles.secrets.yaml, and AWS Secrets Manager.
  
    The release also keeps provider handling backward-compatible where practical: legacy local still maps to the local secrets-service sidecar, and local CLI sidecar injection now only
    runs when the selected provider is actually secrets-service. Documentation and the default assembly template were updated so the new source of truth is explicit.
  config:
    version: "2026.3.16.127"