platform:
  repo: "kdcube-ai-app"
  ref: "2026.5.18.0344"
  description: |
    This release tightens the built-in bundle UI surfaces after the previous
    layout pass. The widgets and the Versatile main view now follow a cleaner
    application style with flat panels, compact controls, neutral borders, and
    restrained use of brand color.

    Highlights

    - Moves the shared memory widget, Copilot widget, Versatile widget, and
      Versatile main view to a GitHub-like visual baseline: white surfaces,
      thin neutral borders, smaller radii, and minimal shadows.
    - Removes decorative page textures and translucent panels from the affected
      built-in surfaces so the UI reads as a professional application rather
      than an illustrated demo.
    - Keeps the platform palette for meaningful accents only: status chips,
      warnings, errors, success states, selected tabs, and primary actions.
    - Uses steel-blue controls and focus rings for primary actions while
      keeping teal, gold, green, purple, and pink as lightweight semantic
      accents.
    - Updates Versatile main-view timeline, code, links, files, web search,
      web fetch, execution, and thinking blocks to use light bordered panels
      instead of heavy dark or semi-transparent containers.
    - Makes the Versatile composer more compact with smaller controls and a
      shorter default input height.

    Runtime and deployment notes:

    - This is an OSS UI/runtime release. It does not require descriptor changes
      by itself, but deployments must point at this platform ref to receive the
      updated built-in surfaces.
    - No backend contract changes are introduced.
    - No private deployment or organization-specific content is part of this
      release.

    Validation and regression coverage:

    - Shared memory widget production build passed.
    - Copilot widget production build passed.
    - Versatile widget production build passed.
    - Versatile main view production build passed.
    - Staged OSS private-name scan passed.

    Changelog

    - Polished built-in widget styling toward clean application chrome.
    - Flattened Versatile main-view panels and subsystem blocks.
    - Normalized borders, radii, shadows, focus states, and primary actions
      across affected built-in UI components.
